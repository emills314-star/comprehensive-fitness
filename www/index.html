      function exerciseProgressSeries(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const byWeek = new Map();
        scoped.sets.filter((set) => set.completed && set.reps > 0).forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session) return;
          const week = startOfWeekIso(session.date);
          const bucket = byWeek.get(week) || { week, e1rm: 0, volume: 0, repsByWeight: new Map() };
          bucket.e1rm = Math.max(bucket.e1rm, estimatedOneRepMax(set));
          bucket.volume += set.weight * set.reps;
          const weightKey = String(set.weight || 0);
          bucket.repsByWeight.set(weightKey, Math.max(bucket.repsByWeight.get(weightKey) || 0, set.reps));
          byWeek.set(week, bucket);
        });
        const weeks = Array.from(byWeek.values()).sort((a, b) => a.week.localeCompare(b.week)).slice(-16);
        const allWeights = new Map();
        weeks.forEach((week) => week.repsByWeight.forEach((reps, weight) => allWeights.set(weight, (allWeights.get(weight) || 0) + 1)));
        const commonWeight = Array.from(allWeights.entries()).sort((a, b) => b[1] - a[1] || Number(b[0]) - Number(a[0]))[0]?.[0] || "0";
        return {
          e1rm: weeks.map((week) => ({ label: week.week.slice(5), value: Math.round(week.e1rm * 10) / 10 })),
          volume: weeks.map((week) => ({ label: week.week.slice(5), value: Math.round(week.volume) })),
          repsAtWeight: weeks.map((week) => ({ label: week.week.slice(5), value: week.repsByWeight.get(commonWeight) || 0 })),
          commonWeight: Number(commonWeight)
        };
      }

      function renderChart(title, points, emptyText) {
        const values = points.map((point) => point.value).filter((value) => value > 0);
        if (!values.length) return '<div class="chart-card"><header><strong>' + escapeHtml(title) + '</strong></header><small>' + escapeHtml(emptyText) + '</small></div>';
        const max = Math.max(...values);
        const min = Math.min(...values);
        const spread = Math.max(1, max - min);
        const width = 320;
        const height = 100;
        const chartPoints = points.map((point, index) => {
          const x = points.length === 1 ? width / 2 : (index / (points.length - 1)) * width;
          const y = height - ((point.value - min) / spread) * 78 - 11;
          return { ...point, x, y };
        });
        const polyline = chartPoints.filter((point) => point.value > 0).map((point) => point.x.toFixed(1) + "," + point.y.toFixed(1)).join(" ");
        return `
          <div class="chart-card">
            <header><strong>${escapeHtml(title)}</strong><span class="status-pill">${values.length} points</span></header>
            <div class="chart-svg">
              <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(title)} chart">
                <polyline points="${polyline}" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
                ${chartPoints.filter((point) => point.value > 0).map((point) => '<circle cx="' + point.x.toFixed(1) + '" cy="' + point.y.toFixed(1) + '" r="4" fill="var(--green-2)"></circle>').join("")}
              </svg>
            </div>
            <small>${escapeHtml(points[0]?.label || "")} to ${escapeHtml(points[points.length - 1]?.label || "")}. Range ${min}-${max}.</small>
          </div>
        `;
      }

        session.templateId = template.id;
        const recoveryAdvice = recoveryRecommendationForSession(session);
        const exercises = [];

        template.exercises.forEach((templateExercise, index) => {

          exercise.notes = "Coach target: " + target.text;
          exercises.push(exercise);
          for (let setNumber = 1; setNumber <= target.sets; setNumber += 1) {
            sets.push(createSet(exercise.id, setNumber, { reps: target.reps, weight: target.weight, weightUnit: target.weightUnit, isBodyweight: target.isBodyweight, rpe: target.rpe, completed: true }));

        });
        activeSessionId = session.id;
        view = "workout";
        if (replaceCurrent) {

          commit({

      function moveExercise(exerciseId, direction) {
        const session = activeSession();
        const exercises = activeExercises();
        const index = exercises.findIndex((exercise) => exercise.id === exerciseId);
        const nextIndex = index + Number(direction);
        if (!session || index < 0 || nextIndex < 0 || nextIndex >= exercises.length) return;
        const reordered = [...exercises];
        const [moved] = reordered.splice(index, 1);
        reordered.splice(nextIndex, 0, moved);
        const orderMap = new Map(reordered.map((exercise, order) => [exercise.id, order]));
        commit({ ...data, exercises: data.exercises.map((exercise) => exercise.sessionId === session.id ? { ...exercise, order: orderMap.get(exercise.id) ?? exercise.order } : exercise) });

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];
          if (char === '"' && quoted && next === '"') {
            cell += '"';
            index += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            row.push(cell);
            cell = "";
          } else if ((char === "\n" || char === "\r") && !quoted) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell);
            if (row.some((value) => value !== "")) rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell);
        if (row.some((value) => value !== "")) rows.push(row);
        const headers = rows.shift()?.map((header) => header.trim()) || [];
        return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""])));
      }

      function numberFrom(value, fallback = 0) {
        if (value === "" || value == null) return fallback;
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      const muscleTargets = {
        novice: { low: 8, high: 12 },
        intermediate: { low: 10, high: 18 },
        advanced: { low: 12, high: 22 }
      };

      const muscleGroups = ["Chest", "Back", "Quads", "Hamstrings", "Glutes", "Shoulders", "Biceps", "Triceps", "Calves", "Core"];

      function targetRangeForMuscle() {
        return muscleTargets[data.settings.trainingStatus] || muscleTargets.intermediate;
      }

      function musclesForExercise(name) {
        const key = exerciseKey(name);
        const matches = [];
        const add = (muscle, weight = 1) => matches.push({ muscle, weight });
        if (/bench|chest|push up|dip|fly|pec/.test(key)) add("Chest");
        if (/row|pulldown|pull up|chin|lat pulldown|shrug|\blat\b/.test(key)) add("Back");
        if (/squat|leg press|lunge|split squat|leg extension/.test(key)) add("Quads");
        if (/deadlift|rdl|romanian|leg curl|hamstring|good morning/.test(key)) add("Hamstrings");
        if (/hip thrust|glute|bridge|deadlift|rdl|squat|lunge|split squat/.test(key)) add("Glutes", /hip thrust|glute|bridge/.test(key) ? 1 : 0.5);
        if (/shoulder|overhead|lateral raise|rear delt|face pull|upright row/.test(key)) add("Shoulders");
        if (/curl|chin|pulldown|row/.test(key)) add("Biceps", /curl/.test(key) ? 1 : 0.5);
        if (/tricep|pushdown|extension|skull|dip|bench|press/.test(key)) add("Triceps", /tricep|pushdown|extension|skull/.test(key) ? 1 : 0.5);
        if (/calf/.test(key)) add("Calves");
        if (/plank|crunch|leg raise|hanging raise|knee raise|ab|core|pallof|carry/.test(key)) add("Core");
        const merged = new Map();
        matches.forEach((item) => merged.set(item.muscle, Math.max(merged.get(item.muscle) || 0, item.weight)));
        return Array.from(merged.entries()).map(([muscle, weight]) => ({ muscle, weight }));
      }

      function completedWorkoutEntries() {
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const exerciseById = new Map(data.exercises.map((exercise) => [exercise.id, exercise]));
        return data.sets
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return exercise && session ? { set, exercise, session } : null;
          })
          .filter((entry) => entry && entry.set.completed && entry.set.reps > 0);
      }

      function weeklyMuscleVolume(weekStart = startOfWeekIso(todayIso())) {
        const buckets = new Map(muscleGroups.map((muscle) => [muscle, { muscle, sets: 0, highRpeSets: 0, failedSets: 0, exercises: new Set(), exerciseDetails: new Map() }]));
        const end = new Date(weekStart + "T00:00:00");
        end.setDate(end.getDate() + 7);
        const endIso = end.toISOString().slice(0, 10);
        completedWorkoutEntries().forEach((entry) => {
          if (entry.session.date < weekStart || entry.session.date >= endIso) return;
          musclesForExercise(entry.exercise.name).forEach(({ muscle, weight }) => {
            const bucket = buckets.get(muscle);
            if (!bucket) return;
            bucket.sets += weight;
            if (entry.set.rpe >= 9) bucket.highRpeSets += weight;
            bucket.exercises.add(entry.exercise.name);
            const detail = bucket.exerciseDetails.get(entry.exercise.name) || { name: entry.exercise.name, sets: 0, sessions: new Set(), dates: new Set() };
            detail.sets += weight;
            detail.sessions.add(entry.session.title || "Workout");
            detail.dates.add(entry.session.date);
            bucket.exerciseDetails.set(entry.exercise.name, detail);
          });
        });
        data.sets.filter((set) => !set.completed).forEach((set) => {
          const exercise = data.exercises.find((item) => item.id === set.exerciseId);
          const session = exercise ? data.sessions.find((item) => item.id === exercise.sessionId) : null;
          if (!exercise || !session || session.date < weekStart || session.date >= endIso) return;
          musclesForExercise(exercise.name).forEach(({ muscle, weight }) => {
            const bucket = buckets.get(muscle);
            if (bucket) bucket.failedSets += weight;
          });
        });
        const target = targetRangeForMuscle();
        return Array.from(buckets.values()).map((bucket) => {
          const status = bucket.sets < target.low ? "low" : bucket.sets > target.high ? "over" : "good";
          const details = Array.from(bucket.exerciseDetails.values()).map((detail) => ({
            name: detail.name,
            sets: detail.sets,
            sessions: Array.from(detail.sessions),
            dates: Array.from(detail.dates).sort()
          })).sort((a, b) => b.sets - a.sets || a.name.localeCompare(b.name));
          return { ...bucket, details, exerciseCount: bucket.exercises.size, targetLow: target.low, targetHigh: target.high, status };
        });
      }

      function fatigueFlags() {
        const flags = [];
        getExerciseNames().forEach((name) => {
          const weeks = summarizeExerciseByWeek(name);
          const current = weeks[0];
          const previous = weeks[1];
          if (!current) return;
          const drop = previous && current.bestEstimatedOneRepMax > 0 && current.bestEstimatedOneRepMax < previous.bestEstimatedOneRepMax * 0.93;
          if (current.failedSets >= 2) flags.push({ scope: "Lift", name, level: "over", reason: "Multiple missed sets were logged this week." });
          else if (current.averageRpe >= 9.2 && current.completedSets >= 2) flags.push({ scope: "Lift", name, level: "caution", reason: "Recent work averaged above RPE 9, so progression may be noisy." });
          else if (drop) flags.push({ scope: "Lift", name, level: "caution", reason: "Estimated 1RM fell more than 7% versus the previous logged week." });
        });
        weeklyMuscleVolume().forEach((bucket) => {
          if (bucket.sets > bucket.targetHigh) flags.push({ scope: "Muscle", name: bucket.muscle, level: "over", reason: "Weekly volume is above the target range." });
          else if (bucket.highRpeSets >= 4) flags.push({ scope: "Muscle", name: bucket.muscle, level: "caution", reason: "Several sets for this muscle were logged at RPE 9+." });
          else if (bucket.failedSets >= 2) flags.push({ scope: "Muscle", name: bucket.muscle, level: "caution", reason: "Missed sets appeared in this muscle group." });
        });
        return flags;
      }

      function readinessBaseline() {
        return { ...defaultReadinessBaseline, ...(data.settings.readinessBaseline || {}) };
      }

      function readinessScore(markers, baseline = readinessBaseline()) {
        const sleepBase = numberFrom(baseline.sleepHours, 7.5);
        const sleepQualityBase = numberFrom(baseline.sleepQuality, 4);
        const sorenessBase = numberFrom(baseline.soreness, 2);
        const stressBase = numberFrom(baseline.stress, 2);
        const energyBase = numberFrom(baseline.energy, 4);
        const hrvBase = numberFrom(baseline.hrv, 0);
        const restingHrBase = numberFrom(baseline.restingHr, 0);
        const sleep = numberFrom(markers.sleepHours, sleepBase);
        const sleepQuality = numberFrom(markers.sleepQuality, sleepQualityBase);
        const soreness = numberFrom(markers.soreness, sorenessBase);
        const stress = numberFrom(markers.stress, stressBase);
        const energy = numberFrom(markers.energy, energyBase);
        const hrv = numberFrom(markers.hrv, hrvBase);
        const restingHr = numberFrom(markers.restingHr, restingHrBase);
        let score = 70;
        score += (sleep - sleepBase) * 5;
        score += (sleepQuality - sleepQualityBase) * 4;
        score += (energy - energyBase) * 4;
        score -= (soreness - sorenessBase) * 4;
        score -= (stress - stressBase) * 4;
        if (hrvBase > 0 && hrv > 0) score += ((hrv - hrvBase) / hrvBase) * 35;
        if (restingHrBase > 0 && restingHr > 0) score -= (restingHr - restingHrBase) * 1.5;
        if (markers.illness) score -= 25;
        return Math.max(0, Math.min(100, Math.round(score)));
      }

      function priorReadinessDeviations(session) {
        const baseline = readinessBaseline();
        const center = readinessScore(baseline, baseline);
        const band = numberFrom(baseline.band, 8);
        return [...data.sessions]
          .filter((item) => item.id !== session?.id && item.date <= (session?.date || todayIso()) && item.recovery)
          .sort((a, b) => b.date.localeCompare(a.date))
          .slice(0, 3)
          .map((item) => readinessScore(sessionRecovery(item), baseline) - center)
          .filter((value) => Math.abs(value) > band);
      }

      function readinessBandStatus(session) {
        const baseline = readinessBaseline();
        const recovery = sessionRecovery(session);
        const center = readinessScore(baseline, baseline);
        const score = readinessScore(recovery, baseline);
        const band = Math.max(3, numberFrom(baseline.band, 8));
        const deviation = score - center;
        const repeated = priorReadinessDeviations(session).filter((value) => Math.sign(value) === Math.sign(deviation)).length >= 2 && Math.abs(deviation) > band * 0.6;
        const manualOutside = Boolean(recovery.outsideBand || String(recovery.outsideBandNote || "").trim());
        const outside = manualOutside || Math.abs(deviation) > band || repeated;
        const direction = deviation >= 0 ? "high" : "low";
        return { baseline, center, score, band, deviation, outside, repeated, manualOutside, direction };
      }

      function recoveryRecommendationForSession(session) {
        const recovery = sessionRecovery(session);
        const band = readinessBandStatus(session);
        const logged = ["sleepHours", "sleepQuality", "hrv", "restingHr", "soreness", "stress", "energy"].some((key) => recovery[key] !== "" && recovery[key] != null) || recovery.illness || recovery.outsideBandNote;
        const evidence = [
          "Rule: baseline score " + band.center + ", normal band " + (band.center - band.band) + "-" + (band.center + band.band) + ", today " + band.score + ".",
          band.outside ? "Today is outside your normal readiness band." : "Today is inside your normal readiness band; treat it as normal fluctuation."
        ];
        if (!logged) evidence.push("No daily markers entered, so the app uses your typical average readiness as today.");
        if (band.manualOutside) evidence.push("Your note/override marked today outside the band.");
        if (band.repeated) evidence.push("Repeated deviation suggests this is a real trend, not a one-off swing.");
        if (recovery.illness) evidence.push("Illness or unusual pain is a rest warning.");
        if (recovery.outsideBandNote) evidence.push("Note: " + recovery.outsideBandNote);
        if (!band.outside && !recovery.illness) {
          return { decision: "hold", label: "Inside readiness band", action: "Train the plan as written. Do not change load just for normal day-to-day fluctuation.", score: band.score, evidence, band };
        }
        if (recovery.illness || (band.direction === "low" && band.deviation <= -band.band * 2)) {
          return { decision: "rest", label: "Low outside-band readiness", action: "Rest or keep technique work very light. Hard loading is not the target today.", score: band.score, evidence, band };
        }
        if (band.direction === "low") {
          return { decision: "deload", label: "Low outside-band readiness", action: "Reduce load 10-15% and volume 30-50%, aiming around RPE 6-7.", score: band.score, evidence, band };
        }
        return { decision: "progress", label: "High outside-band readiness", action: "You may take the planned progression if warmups move normally; do not force a max.", score: band.score, evidence, band };
      }

      function adjustTargetForRecovery(target, recoveryAdvice) {
        const reducedWeight = (multiplier) => target.weight > 0 ? roundToIncrement(target.weight * multiplier, data.settings.weightUnit === "kg" ? 2.5 : 5) : 0;
        if (recoveryAdvice.decision === "rest") {
          const adjusted = { ...target, sets: Math.max(1, Math.ceil(target.sets * 0.5)), weight: reducedWeight(0.85), rpe: 6 };
          return { ...adjusted, text: targetText(adjusted, "Recovery override: rest is preferred; if you train, keep this very easy.") };
        }
        if (recoveryAdvice.decision === "deload") {
          const adjusted = { ...target, sets: Math.max(1, Math.ceil(target.sets * 0.65)), weight: reducedWeight(0.9), rpe: 7 };
          return { ...adjusted, text: targetText(adjusted, "Recovery override: deload today.") };
        }
        if (recoveryAdvice.decision === "hold") {
          return { ...target, text: targetText(target, "Recovery note: hold today unless warmups feel excellent.") };
        }
        return target;
      }

      function createTemplatesFromStrongSessions(importedSessions, importedExercises, importedSets) {
        const existingTemplateNames = new Set(data.templates.map((template) => template.name.trim().toLowerCase()));
        const exercisesBySession = new Map();
        const setsByExercise = new Map();
        importedExercises.forEach((exercise) => {
          if (!exercisesBySession.has(exercise.sessionId)) exercisesBySession.set(exercise.sessionId, []);
          exercisesBySession.get(exercise.sessionId).push(exercise);
        });
        importedSets.forEach((set) => {
          if (!setsByExercise.has(set.exerciseId)) setsByExercise.set(set.exerciseId, []);
          setsByExercise.get(set.exerciseId).push(set);
        });
        const sessionsByWorkoutName = new Map();
        importedSessions.forEach((session) => {
          const name = (session.title || "Strong Workout").trim() || "Strong Workout";
          const current = sessionsByWorkoutName.get(name);
          if (!current || session.date > current.date) sessionsByWorkoutName.set(name, session);
        });
        return Array.from(sessionsByWorkoutName.entries()).map(([name, session]) => {
          if (existingTemplateNames.has(name.toLowerCase())) return null;
          existingTemplateNames.add(name.toLowerCase());
          const sessionExercises = (exercisesBySession.get(session.id) || []).slice().sort((a, b) => a.order - b.order);
          const templateExercises = sessionExercises.map((exercise) => {
            const exerciseSets = (setsByExercise.get(exercise.id) || []).slice().sort((a, b) => a.setNumber - b.setNumber);
            const completedSets = exerciseSets.filter((set) => set.completed && set.reps > 0);
            const representativeReps = completedSets.length
              ? Math.round(completedSets.reduce((sum, set) => sum + set.reps, 0) / completedSets.length)
              : 8;
            return {
              id: id(),
              name: exercise.name,
              sets: Math.max(completedSets.length || exerciseSets.length, 1),
              reps: Math.max(representativeReps, 1)
            };
          });
          if (!templateExercises.length) return null;
          return { id: id(), name, notes: "Imported from Strong workout name.", exercises: templateExercises, createdAt: isoNow(), updatedAt: isoNow() };
        }).filter(Boolean);
      }

      function parseStrongDate(rawDate) {
        const trimmed = String(rawDate || "").trim();
        const match = trimmed.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
        if (match) {
          const month = Number(match[1]) - 1;
          const day = Number(match[2]);
          const year = Number(match[3]);
          const hour = Number(match[4] || 0);
          const minute = Number(match[5] || 0);
          const parsed = new Date(year, month, day, hour, minute);
          if (!Number.isNaN(parsed.getTime())) {
            return { date: parsed.toISOString().slice(0, 10), createdAt: parsed.toISOString() };
          }
        }
        const parsed = new Date(trimmed.replace(" ", "T"));
        if (!Number.isNaN(parsed.getTime())) return { date: parsed.toISOString().slice(0, 10), createdAt: parsed.toISOString() };
        return { date: todayIso(), createdAt: isoNow() };
      }

      function isStrongWorkSet(row) {
        const setOrder = String(row["Set Order"] || "").trim().toLowerCase();
        if (!setOrder || setOrder.includes("rest")) return false;
        return numberFrom(row.Reps) > 0 || numberFrom(row.Weight) > 0 || numberFrom(row.Distance) > 0 || numberFrom(row.Seconds) > 0;
      }

      function importStrongCsv(text) {
        const rows = parseCsv(text).filter((row) => row.Date && row["Exercise Name"] && isStrongWorkSet(row));
        if (!rows.length) throw new Error("No Strong workout rows found.");
        const existingSessionIds = new Set(data.sessions.map((session) => session.externalId).filter(Boolean));
        const sessions = [];
        const exercises = [];
        const sets = [];
        const sessionMap = new Map();
        const exerciseMap = new Map();
        const setCountsByExercise = new Map();
        const exerciseCountsBySession = new Map();
        const importStamp = Date.now().toString(36);
        let importCounter = 0;
        const importedId = (prefix) => prefix + importStamp + (importCounter += 1).toString(36);

        rows.forEach((row) => {
          const rawDate = row.Date.trim();
          const workoutName = (row["Workout Name"] || "Strong Workout").trim() || "Strong Workout";
          const sessionExternalId = "strong:" + rawDate + "|" + workoutName;
          if (existingSessionIds.has(sessionExternalId)) return;
          let session = sessionMap.get(sessionExternalId);
          if (!session) {
            const parsedDate = parseStrongDate(rawDate);
            session = {
              id: importedId("s"),
              externalId: sessionExternalId,
              source: "strong",
              date: parsedDate.date,
              title: workoutName,
              isTravel: false,
              notes: row["Workout Notes"] || "",
              createdAt: parsedDate.createdAt,
              updatedAt: isoNow()
            };
            sessionMap.set(sessionExternalId, session);
            sessions.push(session);
            exerciseCountsBySession.set(session.id, 0);
          }
          const exerciseName = (row["Exercise Name"] || "Exercise").trim() || "Exercise";
          const exerciseExternalId = sessionExternalId + "|" + exerciseName;
          let exercise = exerciseMap.get(exerciseExternalId);
          if (!exercise) {
            const exerciseOrder = exerciseCountsBySession.get(session.id) || 0;
            exercise = { id: importedId("e"), externalId: exerciseExternalId, source: "strong", sessionId: session.id, name: exerciseName, notes: row.Notes || "", order: exerciseOrder };
            exerciseMap.set(exerciseExternalId, exercise);
            exercises.push(exercise);
            exerciseCountsBySession.set(session.id, exerciseOrder + 1);
            setCountsByExercise.set(exercise.id, 0);
          } else if (!exercise.notes && row.Notes) {
            exercise.notes = row.Notes;
          }
          const reps = numberFrom(row.Reps);
          const weight = numberFrom(row.Weight);
          const nextSetNumber = (setCountsByExercise.get(exercise.id) || 0) + 1;
          setCountsByExercise.set(exercise.id, nextSetNumber);
          sets.push({
            id: importedId("t"),
            exerciseId: exercise.id,
            setNumber: numberFrom(row["Set Order"], nextSetNumber),
            reps,
            weight,
            weightUnit: data.settings.weightUnit,
            isBodyweight: weight === 0,
            rpe: numberFrom(row.RPE),
            completed: true
          });
        });

        if (!sessions.length) {
          const templates = createTemplatesFromStrongSessions(
            data.sessions.filter((session) => session.source === "strong"),
            data.exercises.filter((exercise) => exercise.source === "strong"),
            data.sets
          );
          if (templates.length) {
            commit({ ...data, templates: [...templates, ...data.templates] }, false);
            settingsMessage = "Strong CSV already imported. Added " + templates.length + " templates from workout names.";
          } else {
            settingsMessage = "Strong CSV already imported.";
          }
          render();
          return;
        }
        const templates = createTemplatesFromStrongSessions(sessions, exercises, sets);
        commit({
          ...data,
          sessions: [...sessions, ...data.sessions],
          exercises: [...data.exercises, ...exercises],
          sets: [...data.sets, ...sets],
          templates: [...templates, ...data.templates]
        }, false);
        activeSessionId = sessions.sort((a, b) => b.date.localeCompare(a.date))[0]?.id || activeSessionId;
        settingsMessage = "Imported " + sessions.length + " Strong workouts, " + exercises.length + " exercises, " + sets.length + " sets, and " + templates.length + " templates.";
        render();
      }

      function importDataFile(file) {
        if (importInProgress) return;
        importInProgress = true;
        settingsMessage = "Importing " + file.name + "...";
        render();
        file.text().then((text) => {
          window.setTimeout(() => {
          try {
            if (file.name.toLowerCase().endsWith(".csv") || text.startsWith("Date,Workout Name,Duration,Exercise Name")) {
              importStrongCsv(text);
              return;
            }
            const imported = JSON.parse(text);
            if (!Array.isArray(imported.sessions) || !Array.isArray(imported.exercises) || !Array.isArray(imported.sets)) throw new Error("Import must include sessions, exercises, and sets arrays.");
            data = { ...emptyData(), ...imported, settings: { ...defaultSettings, ...imported.settings } };
            data.settings.readinessBaseline = { ...defaultReadinessBaseline, ...(data.settings.readinessBaseline || {}) };
            data.templates = Array.isArray(data.templates) ? data.templates : [];
            activeSessionId = data.sessions[0]?.id || "";
            settingsMessage = "Import complete.";
            saveData();
            render();
          } catch (error) {
            settingsMessage = error instanceof Error ? error.message : "Import failed.";
            render();
          } finally {
            importInProgress = false;
            render();
          }
          }, 20);
        }).catch(() => {
          importInProgress = false;
          settingsMessage = "The selected file could not be read. Try exporting it from Strong again, then import the fresh CSV.";
          render();
        });
      }

      function isNumericEditAction(action) {
        return ["set-reps", "set-weight", "set-rpe", "template-exercise-sets", "template-exercise-reps", "rest-seconds", "recovery-sleep-hours", "recovery-hrv", "recovery-resting-hr", "baseline-sleep-hours", "baseline-sleep-quality", "baseline-hrv", "baseline-resting-hr", "baseline-soreness", "baseline-stress", "baseline-energy", "baseline-band"].includes(action);
      }

      root.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (target.tagName === "INPUT" && isNumericEditAction(action)) {
          target.dataset.replaceOnNextInput = "true";
          target.dataset.previousValue = target.value;
          target.select();
        }
        if (action === "set-view") { view = target.dataset.view; render(); }
        if (action === "toggle-theme") commit({ ...data, settings: { ...data.settings, theme: data.settings.theme === "light" ? "dark" : "light" } });
        if (action === "new-session") addSession();
        if (action === "new-template") addTemplate();
        if (action === "save-template") saveActiveSessionAsTemplate();
        if (action === "start-template") startTemplate(target.dataset.templateId);
        if (action === "add-template-exercise") addTemplateExercise(target.dataset.templateId);
        if (action === "toggle-volume-muscle") {
          expandedVolumeMuscle = expandedVolumeMuscle === target.dataset.muscle ? "" : target.dataset.muscle;
          render();
        }
        if (action === "request-delete-template") {
          pendingDeleteTemplateId = target.dataset.templateId;
          render();
        }
        if (action === "cancel-delete-template") {
          pendingDeleteTemplateId = "";
          render();
        }
        if (action === "confirm-delete-template") {
          const templateId = target.dataset.templateId;
          pendingDeleteTemplateId = "";
          commit({ ...data, templates: data.templates.filter((template) => template.id !== templateId) });
        }
        if (action === "delete-template-exercise") {
          commit({
            ...data,
            templates: data.templates.map((template) => template.id === target.dataset.templateId
              ? { ...template, exercises: template.exercises.filter((exercise) => exercise.id !== target.dataset.templateExerciseId), updatedAt: isoNow() }
              : template)
          });
        }
        if (action === "add-exercise") addExercise();
        if (action === "move-exercise") moveExercise(target.dataset.exerciseId, target.dataset.direction);
        if (action === "delete-exercise") commit({ ...data, exercises: data.exercises.filter((exercise) => exercise.id !== target.dataset.exerciseId), sets: data.sets.filter((set) => set.exerciseId !== target.dataset.exerciseId) });
        if (action === "add-set") addSet(target.dataset.exerciseId, false);
        if (action === "duplicate-set") addSet(target.dataset.exerciseId, true);
        if (action === "delete-set") commit({ ...data, sets: data.sets.filter((set) => set.id !== target.dataset.setId) });
        if (action === "toggle-set") {
          const set = data.sets.find((item) => item.id === target.dataset.setId);
          if (set) patchSet(set.id, { completed: !set.completed });
        }
        if (action === "start-timer") startTimer(target.dataset.exerciseId);
        if (action === "toggle-timer" && timer) { timer.isPaused = !timer.isPaused; render(); }
        if (action === "clear-timer") { timer = null; render(); }
        if (action === "open-session") { activeSessionId = target.dataset.sessionId; view = "workout"; render(); }
        if (action === "export-data") exportData();
        if (action === "clear-data") { pendingClearData = true; render(); }
        if (action === "cancel-clear-data") { pendingClearData = false; render(); }
        if (action === "confirm-clear-data") {
          const session = createSession();
          activeSessionId = session.id;
          pendingClearData = false;
          exportText = "";
          commit({ ...emptyData(), sessions: [session] });
        }
      });

      root.addEventListener("change", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (action === "change-session") { activeSessionId = target.value; render(); }
        if (action === "session-date") patchSession({ date: target.value });
        if (action === "session-travel") patchSession({ isTravel: target.checked });
        if (action === "set-bodyweight") patchSet(target.dataset.setId, { isBodyweight: target.checked });
        if (action === "set-reps") patchSet(target.dataset.setId, { reps: Number(target.value) });
        if (action === "set-weight") patchSet(target.dataset.setId, { weight: Number(target.value) });
        if (action === "set-rpe") patchSet(target.dataset.setId, { rpe: Number(target.value) });
        if (action === "review-exercise") { selectedExercise = target.value; selectedWeek = ""; render(); }
        if (action === "review-week") { selectedWeek = target.value; render(); }
        if (action === "weight-unit") commit({ ...data, settings: { ...data.settings, weightUnit: target.value } });
        if (action === "theme-mode") commit({ ...data, settings: { ...data.settings, theme: target.value } });
        if (action === "training-goal") commit({ ...data, settings: { ...data.settings, goal: target.value } });
        if (action === "training-status") commit({ ...data, settings: { ...data.settings, trainingStatus: target.value } });
        if (action === "recovery-sleep-quality") patchRecovery({ sleepQuality: target.value });
        if (action === "recovery-soreness") patchRecovery({ soreness: target.value });
        if (action === "recovery-stress") patchRecovery({ stress: target.value });
        if (action === "recovery-energy") patchRecovery({ energy: target.value });
        if (action === "recovery-outside-band") patchRecovery({ outsideBand: target.checked });
        if (action === "recovery-illness") patchRecovery({ illness: target.checked });
        if (action === "recovery-outside-note") patchRecovery({ outsideBandNote: target.value });
        if (action === "recovery-sleep-hours") patchRecovery({ sleepHours: target.value });
        if (action === "recovery-hrv") patchRecovery({ hrv: target.value });
        if (action === "recovery-resting-hr") patchRecovery({ restingHr: target.value });
        if (action === "baseline-sleep-hours") patchReadinessBaseline({ sleepHours: target.value });
        if (action === "baseline-sleep-quality") patchReadinessBaseline({ sleepQuality: target.value });
        if (action === "baseline-hrv") patchReadinessBaseline({ hrv: target.value });
        if (action === "baseline-resting-hr") patchReadinessBaseline({ restingHr: target.value });
        if (action === "baseline-soreness") patchReadinessBaseline({ soreness: target.value });
        if (action === "baseline-stress") patchReadinessBaseline({ stress: target.value });
        if (action === "baseline-energy") patchReadinessBaseline({ energy: target.value });
        if (action === "baseline-band") patchReadinessBaseline({ band: target.value });
        if (action === "import-data" && target.files[0]) importDataFile(target.files[0]);
      });

      root.addEventListener("focusin", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT") return;
        if (isNumericEditAction(target.dataset.action)) {
          target.dataset.replaceOnNextInput = "true";
          target.dataset.previousValue = target.value;
          target.select();
        }
      });

      root.addEventListener("focusout", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT" || !isNumericEditAction(target.dataset.action)) return;
        const nextTarget = event.relatedTarget?.closest?.("[data-action]");
        if (nextTarget && isNumericEditAction(nextTarget.dataset.action)) return;
        const action = target.dataset.action;
        if (action === "set-reps") patchSet(target.dataset.setId, { reps: Number(target.value) });
        if (action === "set-weight") patchSet(target.dataset.setId, { weight: Number(target.value) });
        if (action === "set-rpe") patchSet(target.dataset.setId, { rpe: Number(target.value) });
        if (action === "recovery-sleep-hours") patchRecovery({ sleepHours: target.value });
        if (action === "recovery-hrv") patchRecovery({ hrv: target.value });
        if (action === "recovery-resting-hr") patchRecovery({ restingHr: target.value });
        if (action === "baseline-sleep-hours") patchReadinessBaseline({ sleepHours: target.value });
        if (action === "baseline-sleep-quality") patchReadinessBaseline({ sleepQuality: target.value });
        if (action === "baseline-hrv") patchReadinessBaseline({ hrv: target.value });
        if (action === "baseline-resting-hr") patchReadinessBaseline({ restingHr: target.value });
        if (action === "baseline-soreness") patchReadinessBaseline({ soreness: target.value });
        if (action === "baseline-stress") patchReadinessBaseline({ stress: target.value });
        if (action === "baseline-energy") patchReadinessBaseline({ energy: target.value });
        if (action === "baseline-band") patchReadinessBaseline({ band: target.value });
      });

      root.addEventListener("beforeinput", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT" || !isNumericEditAction(target.dataset.action)) return;
        if (target.dataset.replaceOnNextInput === "true" && event.inputType && event.inputType.startsWith("insert")) {
          event.preventDefault();
          target.value = event.data || "";
          target.dataset.replaceOnNextInput = "false";
          target.dispatchEvent(new Event("input", { bubbles: true }));
        } else {
          target.dataset.replaceOnNextInput = "false";
        }
      });

      root.addEventListener("keydown", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT" || !isNumericEditAction(target.dataset.action)) return;
        if (target.dataset.replaceOnNextInput !== "true") return;
        if (event.ctrlKey || event.metaKey || event.altKey || event.key.length !== 1 || !/[\d.]/.test(event.key)) {
          target.dataset.replaceOnNextInput = "false";
          return;
        }
        event.preventDefault();
        target.value = event.key;
        target.dataset.replaceOnNextInput = "false";
        target.dispatchEvent(new Event("input", { bubbles: true }));
      });

      root.addEventListener("input", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (target.tagName === "INPUT" && isNumericEditAction(action) && target.dataset.replaceOnNextInput === "true") {
          const previousValue = target.dataset.previousValue || "";
          let replacement = target.value;
          if (previousValue && replacement.length > previousValue.length && replacement.startsWith(previousValue)) replacement = replacement.slice(previousValue.length);
          target.value = replacement;
          target.dataset.replaceOnNextInput = "false";
        }
        if (action === "add-exercise-draft") addExerciseDraft = target.value;
        if (action === "session-title") patchSession({ title: target.value }, false);
        if (action === "session-notes") patchSession({ notes: target.value }, false);
        if (action === "exercise-name") patchExercise(target.dataset.exerciseId, { name: target.value }, false);
        if (action === "exercise-notes") patchExercise(target.dataset.exerciseId, { notes: target.value }, false);
        if (action === "set-reps") patchSet(target.dataset.setId, { reps: Number(target.value) }, false);
        if (action === "set-weight") patchSet(target.dataset.setId, { weight: Number(target.value) }, false);
        if (action === "set-rpe") patchSet(target.dataset.setId, { rpe: Number(target.value) }, false);
        if (action === "template-name") patchTemplate(target.dataset.templateId, { name: target.value }, false);
        if (action === "template-exercise-name") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { name: target.value }, false);
        if (action === "template-exercise-sets") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { sets: Number(target.value) }, false);
        if (action === "template-exercise-reps") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { reps: Number(target.value) }, false);
        if (action === "rest-seconds") commit({ ...data, settings: { ...data.settings, defaultRestSeconds: Number(target.value) } }, false);
        if (action === "recovery-sleep-hours") patchRecovery({ sleepHours: target.value }, false);
        if (action === "recovery-hrv") patchRecovery({ hrv: target.value }, false);
        if (action === "recovery-resting-hr") patchRecovery({ restingHr: target.value }, false);
        if (action === "recovery-outside-note") patchRecovery({ outsideBandNote: target.value }, false);
        if (action === "baseline-sleep-hours") patchReadinessBaseline({ sleepHours: target.value }, false);
        if (action === "baseline-sleep-quality") patchReadinessBaseline({ sleepQuality: target.value }, false);
        if (action === "baseline-hrv") patchReadinessBaseline({ hrv: target.value }, false);
        if (action === "baseline-resting-hr") patchReadinessBaseline({ restingHr: target.value }, false);
        if (action === "baseline-soreness") patchReadinessBaseline({ soreness: target.value }, false);
        if (action === "baseline-stress") patchReadinessBaseline({ stress: target.value }, false);
        if (action === "baseline-energy") patchReadinessBaseline({ energy: target.value }, false);
        if (action === "baseline-band") patchReadinessBaseline({ band: target.value }, false);
      });

      loadData();
      saveData();
      render();

      window.addEventListener("pagehide", saveData);
      window.addEventListener("beforeunload", saveData);

      if ("serviceWorker" in navigator && window.isSecureContext) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => undefined);
        });
      }
    </script>
  </body>
</html>
