<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Track strength workouts, rest timers, travel sessions, and transparent lift progression guidance." />
    <meta name="theme-color" content="#f4f8fb" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Comprehensive Fitness" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/resources/icon-180.png" />
    <link rel="apple-touch-startup-image" href="/resources/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="icon" type="image/png" sizes="192x192" href="/resources/icon-192.png" />
    <title>Comprehensive Fitness</title>
    <style>
      :root {
        --bg: #081015;
        --bg-soft: #101a21;
        --panel: rgba(13, 22, 29, 0.72);
        --panel-2: rgba(16, 28, 36, 0.7);
        --panel-3: rgba(24, 38, 48, 0.78);
        --line: rgba(132, 162, 184, 0.22);
        --line-strong: rgba(135, 181, 215, 0.42);
        --text: #edf7ff;
        --muted: #9fb4c3;
        --muted-2: #6f8797;
        --green: #4aa3ff;
        --green-2: #a9d7ff;
        --green-dark: rgba(74, 163, 255, 0.13);
        --amber: #ffbc4a;
        --rest-accent: #ffd23f;
        --rest-text: #ffe47a;
        --red: #ff7e72;
        --success: #43d17a;
        --success-dark: rgba(67, 209, 122, 0.15);
        --current: #2589ff;
        --current-dark: rgba(37, 137, 255, 0.17);
        --surface: rgba(255, 255, 255, 0.035);
        --surface-strong: rgba(255, 255, 255, 0.07);
        --input-bg: rgba(5, 13, 18, 0.72);
        --nav-bg: rgba(7, 14, 18, 0.9);
        --shadow: none;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [data-theme="light"] {
        --bg: #f4f8fb;
        --bg-soft: #e9f1f7;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-2: rgba(255, 255, 255, 0.66);
        --panel-3: rgba(235, 244, 250, 0.92);
        --line: rgba(54, 92, 118, 0.18);
        --line-strong: rgba(32, 112, 178, 0.38);
        --text: #0b1b27;
        --muted: #526a7b;
        --muted-2: #7891a1;
        --green: #086fc7;
        --green-2: #0d8bff;
        --green-dark: rgba(8, 111, 199, 0.1);
        --amber: #a76200;
        --rest-accent: #e3a400;
        --rest-text: #9a6700;
        --red: #c84337;
        --success: #148a46;
        --success-dark: rgba(20, 138, 70, 0.11);
        --current: #005bd8;
        --current-dark: #e2efff;
        --surface: rgba(255, 255, 255, 0.66);
        --surface-strong: rgba(255, 255, 255, 0.9);
        --input-bg: rgba(255, 255, 255, 0.92);
        --nav-bg: rgba(246, 251, 255, 0.9);
      }

      * { box-sizing: border-box; }

      html { background: var(--bg); }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(180deg, var(--bg-soft), var(--bg) 36%),
          var(--bg);
      }

      button, input, select, textarea { font: inherit; }

      button {
        align-items: center;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
        transition: border-color 140ms ease, color 140ms ease, transform 140ms ease, background 140ms ease;
      }

      button:hover { border-color: var(--green); }
      button:active { transform: translateY(1px); }
      button:disabled { cursor: not-allowed; opacity: .45; transform: none; }

      input, select, textarea {
        background: var(--input-bg);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        color: var(--text);
        min-height: 48px;
        padding: 12px 6px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus, button:focus-visible {
        border-color: var(--green);
        box-shadow: 0 1px 0 var(--green);
        outline: none;
      }

      input[type="number"] {
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      h1, h2, p { margin-top: 0; }
      h1 {
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        letter-spacing: 0;
        margin-bottom: 2px;
      }
      h2 { letter-spacing: 0; }

      .app-shell {
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding-bottom: 104px;
      }

      .brand-bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: auto 1fr auto auto;
        margin: 0 14px;
        min-height: 76px;
        padding: max(14px, env(safe-area-inset-top)) 0 14px;
      }

      .brand-mark {
        align-items: center;
        background: var(--green-dark);
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        color: var(--green-2);
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 1000;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .brand-mark { overflow: hidden; }
      .brand-mark img { height: 100%; object-fit: cover; object-position: 50% 29%; transform: scale(1.55); width: 100%; }

      .brand-title {
        display: grid;
        font-size: 0.92rem;
        font-weight: 1000;
        letter-spacing: 0.03em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .brand-title span {
        color: var(--green);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
      }

      .brand-action {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--green);
        display: inline-flex;
        font-weight: 1000;
        gap: 6px;
        min-height: 38px;
        padding: 0 12px;
      }

      .theme-toggle {
        border-color: var(--line-strong);
        color: var(--green);
        min-height: 38px;
        padding: 0 10px;
      }

      .app-main { padding: 16px 14px 0; }
      .loading, .empty-state {
        color: var(--muted);
        padding: 24px;
      }

      .empty-state {
        background: transparent;
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
      }

      .view { display: grid; gap: 16px; }

      .section-kicker {
        color: var(--green);
        font-size: 0.76rem;
        font-weight: 1000;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .session-header {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .split { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .grid { display: grid; gap: 10px; }
      .two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

      .toggle-line, .bodyweight {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 0.92rem;
        font-weight: 800;
        gap: 9px;
        min-height: 36px;
        padding: 5px 0;
      }

      .deload-toggle {
        align-items: center;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 900;
        gap: 8px;
        padding: 6px 0 10px;
        width: fit-content;
      }

      .deload-toggle input { height: 20px; width: 20px; }
      .deload-toggle.active { border-color: var(--amber); color: var(--amber); }
      .deload-toggle span { font-size: 0.72rem; text-transform: uppercase; }

      .toggle-line input[type="checkbox"], .bodyweight input[type="checkbox"], .deload-toggle input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        background: var(--input-bg);
        border: 1.5px solid color-mix(in srgb, var(--muted) 55%, transparent);
        border-radius: 6px;
        box-shadow: inset 0 0 0 1px color-mix(in srgb, white 35%, transparent);
        display: inline-grid;
        flex: 0 0 auto;
        height: 22px;
        min-height: 22px;
        margin: 0;
        place-content: center;
        transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
        width: 22px;
      }

      .toggle-line input[type="checkbox"]::before, .bodyweight input[type="checkbox"]::before, .deload-toggle input[type="checkbox"]::before {
        background: white;
        clip-path: polygon(14% 48%, 0 64%, 40% 100%, 100% 20%, 83% 5%, 38% 72%);
        content: "";
        height: 10px;
        transform: scale(0);
        transition: transform 120ms ease;
        width: 12px;
      }

      .toggle-line input[type="checkbox"]:checked, .bodyweight input[type="checkbox"]:checked {
        background: var(--current);
        border-color: var(--current);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--current) 18%, transparent);
      }

      .deload-toggle input[type="checkbox"]:checked { background: var(--amber); border-color: var(--amber); }
      .toggle-line input[type="checkbox"]:checked::before, .bodyweight input[type="checkbox"]:checked::before, .deload-toggle input[type="checkbox"]:checked::before { transform: scale(1); }
      .toggle-line input[type="checkbox"]:focus-visible, .bodyweight input[type="checkbox"]:focus-visible, .deload-toggle input[type="checkbox"]:focus-visible { outline: 2px solid var(--current); outline-offset: 2px; }

      .exercise-card, .settings-panel, .recommendation, .template-card, .inline-panel, .workout-advice {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .exercise-card {
        gap: 14px;
        overflow: hidden;
        position: relative;
      }

      .exercise-card::before,
      .workout-advice::before,
      .recovery-panel::before {
        background: var(--green);
        content: "";
        height: calc(100% - 22px);
        left: 0;
        opacity: 0.52;
        position: absolute;
        top: 11px;
        width: 1px;
      }

      .exercise-guidance {
        background: transparent;
        border: 1px solid var(--line);
        border-left-color: var(--green);
        border-radius: 0;
        color: var(--muted);
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .exercise-guidance strong {
        color: var(--green-2);
        font-size: 0.92rem;
      }

      .guidance-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      }

      .guidance-pill {
        background: var(--surface);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        display: grid;
        gap: 3px;
        padding: 9px;
      }

      .guidance-pill span {
        color: var(--muted-2);
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .guidance-pill b {
        color: var(--text);
        font-size: 0.92rem;
      }

      .muscle-select-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      }

      .muscle-select-grid label {
        color: var(--muted);
        display: grid;
        font-size: 0.78rem;
        font-weight: 900;
        gap: 4px;
      }

      .muscle-select-grid select {
        min-height: 42px;
        padding: 8px 4px;
      }

      .cue-list {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .exercise-name {
        background: transparent;
        border-color: transparent;
        font-size: 1.08rem;
        font-weight: 1000;
        min-width: 0;
        padding-left: 0;
      }

      .exercise-name:focus { background: var(--input-bg); padding-left: 12px; }

      .icon-button {
        aspect-ratio: 1;
        justify-content: center;
        min-width: 48px;
        padding: 8px;
        width: 48px;
      }

      .danger, .danger-button {
        border-color: rgba(255, 127, 107, 0.46);
        color: var(--red);
      }

      .set-head, .set-row, .trend-head, .trend-row {
        align-items: center;
        display: grid;
        gap: 7px;
      }

      .set-head, .set-row {
        grid-template-columns: 36px minmax(56px, 1fr) minmax(76px, 1.35fr) minmax(56px, 1fr) 48px;
      }

      .set-head, .trend-head {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .set-row {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        padding: 7px 0;
        transition: background 160ms ease, border-color 160ms ease, opacity 160ms ease;
      }

      .set-row.warmup { border-left: 3px solid var(--amber); padding-left: 8px; }
      .set-row.warmup strong { color: var(--amber); font-size: 0.72rem; }
      .set-block { border-left: 3px solid transparent; display: grid; }
      .set-block.completed {
        background: var(--success-dark);
        border-left-color: var(--success);
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--success) 46%, transparent);
      }
      .set-block.completed .set-row { border-top-color: color-mix(in srgb, var(--success) 58%, var(--line)); }
      .set-block.completed .set-row strong { color: var(--success); }
      .set-block.completed input { color: var(--text); }
      .set-row.completed { background: transparent; border-color: transparent; }
      .set-row.pending { border-left: 3px solid transparent; }
      .set-actions { align-items: center; display: flex; flex-wrap: wrap; gap: 6px; padding: 0 7px 8px 43px; }
      .set-actions .mini-button { min-height: 32px; padding: 5px 9px; }
      .set-rest-button { border-color: color-mix(in srgb, var(--amber) 58%, var(--line)); color: var(--amber); }
      .rest-control { align-items: center; color: var(--muted); display: flex; font-size: 0.78rem; font-weight: 800; gap: 7px; }
      .rest-control input { min-height: 38px; padding: 6px; width: 72px; }
      .session-submitted, .summary-muted { border: 1px solid var(--line); color: var(--muted); padding: 12px; }
      .submit-confirmation, .completed-summary { background: var(--surface-strong); border: 1px solid var(--green); display: grid; gap: 10px; padding: 16px; }
      .submit-confirmation span, .completed-summary p { color: var(--muted); margin: 0; }
      .pr-celebration { background: var(--green-dark); border-left: 3px solid var(--green-2); display: grid; gap: 6px; padding: 12px; }
      .pr-celebration strong { color: var(--green-2); }
      .pr-celebration span, .summary-lifts span { color: var(--muted); font-size: 0.9rem; }
      .summary-lifts { display: grid; gap: 10px; }
      .summary-lifts div { border-bottom: 1px solid var(--line); display: grid; gap: 3px; padding-bottom: 8px; }
      .template-warmups { border-top: 1px solid var(--line); color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; padding-top: 8px; }
      .template-warmups strong { color: var(--text); width: 100%; }

      .set-row strong {
        color: var(--green);
        font-size: 1.1rem;
        text-align: center;
      }

      .set-row input {
        border-radius: 0;
        min-height: 46px;
        padding: 8px;
      }

      .mini-button {
        color: var(--muted);
        font-size: 0.82rem;
        min-height: 38px;
        padding: 8px 10px;
      }

      .check-button {
        aspect-ratio: 1;
        border-radius: 10px;
        color: var(--muted-2);
        justify-content: center;
        min-height: 44px;
        padding: 6px;
      }

      .check-button.checked {
        background: var(--success);
        border-color: var(--success);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 22%, transparent);
        color: #06150b;
      }

      .exercise-level-controls { align-items: center; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; gap: 14px; padding-bottom: 8px; }
      .exercise-level-controls .deload-toggle { border: 0; padding: 0; }
      .exercise-level-controls .bodyweight { color: var(--text); }

      .primary-action {
        background: var(--green);
        border-color: var(--green);
        box-shadow: 0 14px 28px rgba(74, 163, 255, 0.2);
        color: var(--bg);
        font-size: 1rem;
        font-weight: 1000;
        justify-content: center;
        min-height: 58px;
        text-transform: uppercase;
      }

      .secondary-action {
        color: var(--green);
        justify-content: center;
      }

      .template-card { text-align: left; }

      .template-card h2,
      .workout-advice h2,
      .inline-panel h2 {
        font-size: 1.12rem;
        margin: 0;
      }

      .workout-advice {
        border-color: rgba(74, 163, 255, 0.58);
        position: relative;
      }

      .workout-advice h2 {
        color: var(--green-2);
        font-size: 1.28rem;
      }

      .recovery-panel {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
        position: relative;
      }

      .recovery-panel h2 {
        margin: 0;
      }

      .recovery-status {
        border-radius: 0;
        display: grid;
        gap: 5px;
        padding: 11px 0;
      }

      .recovery-status.progress { border-bottom: 1px solid rgba(74, 163, 255, 0.5); }
      .recovery-status.hold { border-bottom: 1px solid rgba(255, 177, 43, 0.46); }
      .recovery-status.deload, .recovery-status.rest { border-bottom: 1px solid rgba(255, 127, 107, 0.46); }

      .recovery-status strong {
        color: var(--text);
      }

      .recovery-status span {
        color: var(--muted);
        line-height: 1.4;
      }

      .recovery-inputs {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      }

      .recovery-inputs label {
        color: var(--muted);
        display: grid;
        font-size: 0.82rem;
        font-weight: 800;
        gap: 5px;
      }

      .dashboard-grid,
      .plan-list,
      .flag-list,
      .chart-list {
        display: grid;
        gap: 10px;
      }

      .volume-card,
      .plan-card,
      .flag-card,
      .chart-card,
      .rule-card {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      button.volume-card {
        color: var(--text);
        text-align: left;
        width: 100%;
      }

      .volume-detail {
        border-top: 1px solid var(--line);
        display: grid;
        gap: 8px;
        padding-top: 9px;
      }

      .volume-detail div {
        display: grid;
        gap: 3px;
      }

      .volume-detail strong {
        color: var(--text);
        font-size: 0.92rem;
      }

      .volume-detail span,
      .volume-detail.empty {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .volume-card header,
      .plan-card header,
      .chart-card header {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .status-pill {
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 1000;
        padding: 4px 8px;
        text-transform: uppercase;
      }

      .status-pill.low,
      .status-pill.caution,
      .flag-card.caution { border-color: var(--amber); color: var(--amber); }
      .status-pill.high,
      .status-pill.over,
      .flag-card.over { border-color: var(--red); color: var(--red); }
      .status-pill.good,
      .status-pill.inside,
      .flag-card.good { border-color: var(--green); color: var(--green-2); }

      .meter {
        background: var(--surface-strong);
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
      }

      .meter span {
        background: linear-gradient(90deg, var(--green), var(--green-2));
        display: block;
        height: 100%;
        width: var(--meter, 0%);
      }

      .plan-meta,
      .flag-card span,
      .chart-card small,
      .rule-card {
        color: var(--muted);
        line-height: 1.4;
      }

      .plan-targets {
        display: grid;
        gap: 7px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .plan-targets span {
        background: var(--surface);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 900;
        padding: 8px;
        text-align: center;
      }

      .chart-svg {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--green);
        height: 176px;
        overflow: hidden;
        width: 100%;
      }

      .chart-svg svg {
        display: block;
        height: 100%;
        width: 100%;
      }

      .chart-grid-line { stroke: color-mix(in srgb, var(--muted) 18%, transparent); stroke-width: 1; }
      .chart-axis-label { fill: var(--muted); font-size: 8px; font-weight: 700; }

  </head>
  <body>
    <div id="root"></div>
    <script>
      const STORAGE_KEY = "comprehensive-fitness-data-v1";
      const RUNTIME_KEY = "comprehensive-fitness-runtime-v1";
      const IDENTITY_KEY = "comprehensive-fitness-installation-v1";
      const DB_NAME = "comprehensive-fitness";
      const DB_VERSION = 1;
      const DB_STORE = "state";
      const root = document.getElementById("root");
      const defaultReadinessBaseline = { sleepHours: 7.5, sleepQuality: 4, hrv: "", restingHr: "", soreness: 2, band: 8 };
      const defaultSettings = {
        weightUnit: "lb",
        goal: "hypertrophy",
        trainingStatus: "intermediate",
        theme: "light",
        timerSound: true,
        timerVibration: true,
        timerNotifications: true,
        defaultRestSeconds: 90,
        notificationMessageDetail: "exercise-set",
        autoStartRestTimer: true,
        autoHighlightNextSet: true,
        autoScrollNextSet: true,
        installGuideDismissed: false,
        setupSoundConfirmed: false,
        readinessBaseline: { ...defaultReadinessBaseline }
      };
      const researchRules = {
        volume: {
          novice: "8-12 hard sets per muscle weekly",
          intermediate: "12-18 hard sets per muscle weekly",
          advanced: "15-25 hard sets per muscle weekly"
        },
        frequency: "Train each muscle at least 2x/week when possible; frequency mainly helps distribute weekly volume.",
        effort: "Most productive hypertrophy sets should land around 0-5 reps in reserve, roughly RPE 7-10.",
        rest: "Rest at least 90 seconds on compound lifts and at least 60 seconds on isolation lifts to preserve volume load.",
        progression: "Progress by adding load or reps when target work is completed with manageable RPE; hold or deload when performance drops or fatigue accumulates.",
        deload: "After repeated misses, performance drops, or 4-8 hard weeks, reduce volume 30-50% and/or load 10-20% for about one week.",
        protein: "For hypertrophy/recomposition, the evidence-based daily protein range is about 1.6-2.2 g/kg; higher may help during aggressive cuts.",
        recomposition: "For recomposition, keep resistance training, high protein, and a moderate deficit; deficits over about 500 kcal/day tend to impair lean-mass gain.",
        sleep: "Sleep under 7 hours can limit recovery; 7-9 hours is the practical adult target."
      };
      let data = emptyData();
      let view = "workout";
      let activeSessionId = "";
      let timer = null;
      let timerInterval = 0;
      let timerCompleteNotice = null;
      let timerAudioContext = null;
      let timerWakeLock = null;
      let activeSetId = "";
      let pendingNextSetId = "";
      let activeSetAcknowledged = false;
      let activeSetNotice = "";
      let notificationMessage = "";
      let pushIdentity = null;
      let pushConfig = null;
      let installPromptEvent = null;
      let updateRegistration = null;
      let updateAvailable = false;
      let persistenceReady = false;
      let syncFlushTimer = 0;
      let selectedExercise = "";
      let selectedWeek = "";
      let addExerciseDraft = "";
      let addExercisePrimaryMuscle = "";
      let addExerciseSecondaryMuscle = "";
      let exportText = "";
      let pendingClearData = false;
      let pendingDeleteTemplateId = "";
      let expandedVolumeMuscle = "";
      let dashboardWeekStart = startOfWeekIso(todayIso());
      let dashboardDetail = null;
      let dashboardReturnScroll = 0;
      let settingsMessage = "";
      let importInProgress = false;
      let saveTimer = 0;
      let pendingSubmitSessionId = "";
      let completedSummarySessionId = "";
      let chartDetailPoint = null;
      let templateStartFlow = null;

      const icon = {
        workout: "Lift",
        dashboard: "Dash",
        templates: "Plan",
        history: "Past",
        review: "Chart",
        settings: "Data",
        add: "+",
        clock: "Rest",
        done: "&#10003;",
        delete: "X",
        pause: "&#10074;&#10074;",
        play: "&#9654;",
        duplicate: "Copy",
        download: "Export",
        upload: "Import"
      };

      function emptyData() {
        return { sessions: [], exercises: [], sets: [], templates: [], settings: { ...defaultSettings } };
      }

      function openFitnessDb() {
        return new Promise((resolve, reject) => {
          if (!("indexedDB" in window)) return reject(new Error("IndexedDB is unavailable."));
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: "key" });
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error("IndexedDB could not be opened."));
        });
      }

      async function readIndexedValue(key) {
        const db = await openFitnessDb();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(DB_STORE, "readonly");
          const request = transaction.objectStore(DB_STORE).get(key);
          request.onsuccess = () => resolve(request.result?.value ?? null);
          request.onerror = () => reject(request.error || new Error("IndexedDB read failed."));
          transaction.oncomplete = () => db.close();
        });
      }

      async function writeIndexedValue(key, value) {
        const db = await openFitnessDb();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(DB_STORE, "readwrite");
          transaction.objectStore(DB_STORE).put({ key, value, updatedAt: isoNow() });
          transaction.oncomplete = () => { db.close(); resolve(true); };
          transaction.onerror = () => { db.close(); reject(transaction.error || new Error("IndexedDB write failed.")); };
        });
      }

      function todayIso() {
        return localDateIso(new Date());
      }

      function localDateIso(date) {
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0") + "-" + String(date.getDate()).padStart(2, "0");
      }

      function isoNow() {
        return new Date().toISOString();
      }

      function startOfWeekIso(dateIso) {
        const date = new Date(dateIso + "T00:00:00");
        const day = date.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        date.setDate(date.getDate() + diff);
        return localDateIso(date);
      }

      function formatDate(dateIso) {
        if (!dateIso) return "";
        const parsed = new Date(String(dateIso).slice(0, 10) + "T00:00:00");
        if (Number.isNaN(parsed.getTime())) return String(dateIso);
        return new Intl.DateTimeFormat("en-US", { month: "long", day: "numeric" }).format(parsed);
      }

      function formatWeek(dateIso) {
        return "Week of " + formatDate(startOfWeekIso(dateIso));
      }

      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function cleanReadinessBaseline(source = {}) {
        return {
          sleepHours: source.sleepHours ?? defaultReadinessBaseline.sleepHours,
          sleepQuality: source.sleepQuality ?? defaultReadinessBaseline.sleepQuality,
          hrv: source.hrv ?? defaultReadinessBaseline.hrv,
          restingHr: source.restingHr ?? defaultReadinessBaseline.restingHr,
          soreness: source.soreness ?? defaultReadinessBaseline.soreness,
          band: source.band ?? defaultReadinessBaseline.band
        };
      }

      function cleanRecovery(source = {}) {
        return {
          sleepHours: source.sleepHours ?? "",
          sleepQuality: source.sleepQuality ?? "",
          hrv: source.hrv ?? "",
          restingHr: source.restingHr ?? "",
          soreness: source.soreness ?? "",
          outsideBandNote: source.outsideBandNote ?? "",
          illness: Boolean(source.illness)
        };
      }

      function normalizeLoadedData(model) {
        const storedSettings = model.settings || {};
        const safeSettings = {
          weightUnit: storedSettings.weightUnit,
          goal: storedSettings.goal,
          trainingStatus: storedSettings.trainingStatus,
          theme: storedSettings.theme,
          timerSound: storedSettings.timerSound,
          timerVibration: storedSettings.timerVibration,
          timerNotifications: storedSettings.timerNotifications,
          defaultRestSeconds: storedSettings.defaultRestSeconds,
          notificationMessageDetail: storedSettings.notificationMessageDetail,
          autoStartRestTimer: storedSettings.autoStartRestTimer,
          autoHighlightNextSet: storedSettings.autoHighlightNextSet,
          autoScrollNextSet: storedSettings.autoScrollNextSet,
          installGuideDismissed: storedSettings.installGuideDismissed,
          setupSoundConfirmed: storedSettings.setupSoundConfirmed
        };
        model.settings = { ...defaultSettings, ...Object.fromEntries(Object.entries(safeSettings).filter(([, value]) => value != null)), readinessBaseline: cleanReadinessBaseline(storedSettings.readinessBaseline || {}) };
        model.sessions = (Array.isArray(model.sessions) ? model.sessions : []).map((session) => ({ ...session, recovery: cleanRecovery(session.recovery || {}) }));
        model.exercises = Array.isArray(model.exercises) ? model.exercises : [];
        model.sets = Array.isArray(model.sets) ? model.sets : [];
        model.sets = model.sets.map((set) => ({ ...set, skipped: Boolean(set.skipped), edited: Boolean(set.edited) }));
        model.exercises = model.exercises.map((exercise) => {
          const exerciseSets = model.sets.filter((set) => set.exerciseId === exercise.id);
          const legacyBodyweight = exerciseSets.length > 0 && exerciseSets.every((set) => Boolean(set.isBodyweight)) && isBodyweightExerciseName(exercise.name);
          return { ...exercise, isBodyweight: exercise.isBodyweight ?? legacyBodyweight };
        });
        model.templates = (Array.isArray(model.templates) ? model.templates : []).map((template) => ({
          ...template,
          exercises: (Array.isArray(template.exercises) ? template.exercises : []).map((exercise) => ({ ...exercise, isBodyweight: exercise.isBodyweight ?? isBodyweightExerciseName(exercise.name), targetRpe: Number(exercise.targetRpe || 0) || "", increment: Number(exercise.increment || 0) || "" }))
        }));
        return model;
      }

      async function loadData() {
        let stored = null;
        try {
          stored = await readIndexedValue("app-data");
          persistenceReady = true;
        } catch {
          persistenceReady = false;
        }
        if (!stored) {
          try {
            stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          } catch {
            stored = null;
          }
        }
        data = stored ? { ...emptyData(), ...stored, settings: { ...defaultSettings, ...stored.settings } } : emptyData();
        data = normalizeLoadedData(data);
        applyTheme();
        if (data.sessions.length === 0) data.sessions.push(createSession());
        activeSessionId = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date))[0].id;
        await restoreRuntime();
        await restorePushIdentity();
        if (persistenceReady && stored) writeIndexedValue("app-data", data).catch(() => undefined);
      }

      function saveData() {
        window.clearTimeout(saveTimer);
        writeIndexedValue("app-data", data).then(() => {
          persistenceReady = true;
          try { localStorage.removeItem(STORAGE_KEY); } catch { /* IndexedDB remains primary. */ }
          queueActiveWorkoutSync();
        }).catch(() => {
          persistenceReady = false;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
          catch { settingsMessage = "Storage is full on this device. Export a backup, clear old data, or import a smaller file."; }
        });
        saveRuntime();
        return true;
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveData, 500);
      }

      function saveRuntime() {
        const runtime = { activeSessionId, timer, activeSetId, pendingNextSetId, activeSetAcknowledged, activeSetNotice };
        writeIndexedValue("runtime", runtime).catch(() => {
          try { localStorage.setItem(RUNTIME_KEY, JSON.stringify(runtime)); } catch { return false; }
        });
        return true;
      }

      async function restoreRuntime() {
        let runtime = null;
        try {
          runtime = await readIndexedValue("runtime");
        } catch {
          try { runtime = JSON.parse(localStorage.getItem(RUNTIME_KEY) || "null"); } catch { runtime = null; }
        }
        if (!runtime) return;
        if (data.sessions.some((session) => session.id === runtime.activeSessionId)) activeSessionId = runtime.activeSessionId;
        if (data.sets.some((set) => set.id === runtime.activeSetId)) {
          activeSetId = runtime.activeSetId;
          activeSetAcknowledged = Boolean(runtime.activeSetAcknowledged);
          activeSetNotice = runtime.activeSetNotice || "";
        }
        if (data.sets.some((set) => set.id === runtime.pendingNextSetId)) pendingNextSetId = runtime.pendingNextSetId;
        if (runtime.timer && data.sets.some((set) => set.id === runtime.timer.setId)) {
          timer = { id: runtime.timer.id || id(), pendingNextSetId: runtime.timer.pendingNextSetId || runtime.pendingNextSetId || "", ...runtime.timer };
          pendingNextSetId = timer.pendingNextSetId || pendingNextSetId;
          if (timer.isActive && !timer.isPaused) {
            timer.remainingSeconds = Math.max(0, Math.ceil((Number(timer.endsAt || 0) - Date.now()) / 1000));
            if (timer.remainingSeconds > 0) startTimerInterval();
            else window.setTimeout(completeTimer, 0);
          }
        }
      }

      function commit(nextData, shouldRender = true) {
        data = nextData;
        applyTheme();
        if (shouldRender) saveData();
        else scheduleSave();
        if (shouldRender) render();
      }

      function applyTheme() {
        const theme = data.settings?.theme === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f4f8fb" : "#081015");
      }

      function themeLabel() {
        return data.settings.theme === "light" ? "Light" : "Dark";
      }

      function createSession(title) {
        const now = isoNow();
        const sameDayCount = data.sessions.filter((session) => session.date === todayIso()).length + 1;
        return { id: id(), date: todayIso(), title: title || "Workout " + sameDayCount, isTravel: false, notes: "", recovery: defaultRecovery(), submitted: false, startedAt: now, createdAt: now, updatedAt: now };
      }

      function defaultRecovery() {
        return cleanRecovery();
      }

      function sessionRecovery(session) {
        return cleanRecovery(session?.recovery || {});
      }

      function createSet(exerciseId, setNumber, previous) {
        const exercise = data.exercises.find((item) => item.id === exerciseId);
        return {
          id: id(),
          exerciseId,
          setNumber,
          reps: previous?.reps ?? 8,
          weight: previous?.weight ?? 0,
          weightUnit: previous?.weightUnit ?? data.settings.weightUnit,
          isBodyweight: previous?.isBodyweight ?? exercise?.isBodyweight ?? false,
          rpe: previous?.rpe ?? 8,
          completed: previous?.completed ?? false,
          isWarmup: previous?.isWarmup ?? false,
          skipped: previous?.skipped ?? false,
          edited: previous?.edited ?? false,
          targetReps: previous?.targetReps ?? previous?.reps,
          targetWeight: previous?.targetWeight ?? previous?.weight,
          targetRpe: previous?.targetRpe ?? previous?.rpe,
          prescriptionReason: previous?.prescriptionReason || "",
          prescriptionMode: previous?.prescriptionMode || "",
          prescriptionConfidence: previous?.prescriptionConfidence || ""
        };
      }

      function isSessionSubmitted(session) {
        return session && session.submitted !== false;
      }

      function activeSession() {
        return data.sessions.find((session) => session.id === activeSessionId) || data.sessions[0];
      }

      function activeExercises() {
        const session = activeSession();
        return session ? data.exercises.filter((exercise) => exercise.sessionId === session.id).sort((a, b) => a.order - b.order) : [];
      }

      function workoutSessionOptions(session) {
        const recent = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 60);
        return Array.from(new Map([session, ...recent].filter(Boolean).map((item) => [item.id, item])).values());
      }

      function setsForExercise(exerciseId) {
        return data.sets.filter((set) => set.exerciseId === exerciseId).sort((a, b) => a.setNumber - b.setNumber);
      }

      function orderedActiveSets() {
        return activeExercises().flatMap((exercise) => setsForExercise(exercise.id));
      }

      function setVisualState(set) {
        if (set.skipped) return "skipped";
        if (set.completed) return "completed";
        if (set.id === activeSetId) return "current";
        if (set.edited) return "edited";
        return "future";
      }

      function ensureActiveSet() {
        if (timer?.isActive) {
          activeSetId = "";
          return;
        }
        const current = data.sets.find((set) => set.id === activeSetId);
        const activeSetIds = new Set(orderedActiveSets().map((set) => set.id));
        if (current && activeSetIds.has(current.id) && !current.completed && !current.skipped) {
          if (!activeSetAcknowledged) activeSetNotice = "Set " + (current.isWarmup ? "WU" : current.setNumber) + " is ready";
          return;
        }
        const next = orderedActiveSets().find((set) => !set.completed && !set.skipped) || null;
        activeSetId = next?.id || "";
        activeSetAcknowledged = false;
        activeSetNotice = next ? "Set " + (next.isWarmup ? "WU" : next.setNumber) + " is ready" : "";
      }

      function nextIncompleteSet(afterSetId) {
        const ordered = orderedActiveSets();
        const index = ordered.findIndex((set) => set.id === afterSetId);
        return ordered.slice(Math.max(0, index + 1)).find((set) => !set.completed && !set.skipped)
          || ordered.find((set) => set.id !== afterSetId && !set.completed && !set.skipped)
          || null;
      }

      function setActiveSet(setId, notice = "", acknowledged = false) {
        activeSetId = setId || "";
        if (activeSetId && pendingNextSetId === activeSetId) pendingNextSetId = "";
        activeSetNotice = notice;
        activeSetAcknowledged = acknowledged;
        saveRuntime();
      }

      function acknowledgeActiveSet(setId) {
        if (!setId || setId !== activeSetId || activeSetAcknowledged) return;
        activeSetAcknowledged = true;
        activeSetNotice = "";
        saveRuntime();
        const block = document.getElementById("set-" + setId);
        block?.classList.add("acknowledged");
        const label = block?.querySelector(".next-set-banner span:last-child");
        if (label) label.textContent = "Current set";
      }

      function estimatedOneRepMax(set) {
        if (set.weight <= 0 || set.reps <= 0) return 0;
        return set.weight * (1 + set.reps / 30);
      }

      function roundToIncrement(value, increment) {
        return Math.max(increment, Math.round(value / increment) * increment);
      }

      function getExerciseNames() {
        return Array.from(new Set(data.exercises.map((exercise) => exercise.name.trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      }

      function exerciseKey(name) {
        return String(name || "")
          .toLowerCase()
          .replace(/\([^)]*\)/g, "")
          .replace(/\b(barbell|dumbbell|machine|cable|bodyweight)\b/g, "")
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      function exerciseMatches(storedName, requestedName) {
        const stored = String(storedName || "").trim().toLowerCase();
        const requested = String(requestedName || "").trim().toLowerCase();
        return stored === requested || exerciseKey(storedName) === exerciseKey(requestedName);
      }

      function isBodyweightExerciseName(name) {
        return /body ?weight|push up|pushup|pull up|pullup|chin up|chinup|\bdip\b|inverted row|air squat|pistol squat|plank|crunch|sit up|sit-up|hanging raise|knee raise|ab wheel|burpee/.test(exerciseKey(name));
      }

      function getExerciseSets(exerciseName) {
        const exercises = data.exercises.filter((exercise) => exerciseMatches(exercise.name, exerciseName));
        const ids = new Set(exercises.map((exercise) => exercise.id));
        return { exercises, sets: data.sets.filter((set) => ids.has(set.exerciseId)) };
      }

      function progressionProfileForExercise(name) {
        const key = exerciseKey(name);
        const unit = data.settings.weightUnit;
        const small = unit === "kg" ? 1 : 2.5;
        const standard = unit === "kg" ? 2.5 : 5;
        if (/leg extension|leg curl|pulldown|machine row|seated row/.test(key)) {
          return { kind: "machine", increment: standard, lowerRep: 8, upperRep: 15, maxJumpRatio: 0.12 };
        }
        if (/lateral raise|rear delt|fly|crossover|pec deck|bicep curl|hammer curl|pushdown|tricep extension|calf|neck/.test(key)) {
          return { kind: "isolation", increment: small, lowerRep: /lateral raise|rear delt/.test(key) ? 12 : 10, upperRep: 20, maxJumpRatio: 0.18 };
        }
        return { kind: "compound", increment: standard, lowerRep: 5, upperRep: 12, maxJumpRatio: 0.25 };
      }

      function recommendedRestSeconds(exerciseName, options = {}) {
        const profile = progressionProfileForExercise(exerciseName);
        const reps = Number(options.reps || 8);
        const rpe = Number(options.rpe || 8);
        let seconds = profile.kind === "compound" ? 180 : profile.kind === "machine" ? 120 : 75;
        if (reps <= 5 || rpe >= 9) seconds += profile.kind === "isolation" ? 15 : 30;
        if (reps >= 15 && profile.kind === "isolation") seconds = Math.min(seconds, 75);
        const recentDurations = data.exercises
          .filter((exercise) => exerciseMatches(exercise.name, exerciseName) && Number(exercise.restSeconds) > 0)
          .map((exercise) => Number(exercise.restSeconds))
          .sort((a, b) => a - b)
          .slice(-6);
        if (recentDurations.length) {
          const historical = recentDurations[Math.floor(recentDurations.length / 2)];
          seconds = Math.round((seconds * 2 + historical) / 3);
        }
        const latestWeek = summarizeExerciseByWeek(exerciseName, options)[0];
        if (latestWeek && (latestWeek.failedSets >= 2 || (latestWeek.averageRpe >= 9.2 && latestWeek.completedSets >= 2))) seconds += 30;
        return Math.max(60, Math.min(300, Math.round(seconds / 15) * 15));
      }

      function restRecommendationReason(exerciseName, options = {}) {
        const profile = progressionProfileForExercise(exerciseName);
        const seconds = recommendedRestSeconds(exerciseName, options);
        const type = profile.kind === "compound" ? "compound lift" : profile.kind === "machine" ? "machine movement" : "isolation lift";
        const history = summarizeExerciseByWeek(exerciseName, options)[0];
        const historyNote = history && (history.failedSets >= 2 || history.averageRpe >= 9.2) ? " Recent hard or missed sets added recovery time." : "";
        return seconds + " seconds for this " + type + " at the planned rep range." + historyNote;
      }

      function nextLoadForExercise(name, currentWeight, incrementOverride) {
        const profile = progressionProfileForExercise(name);
        const increment = Number(incrementOverride || profile.increment);
        if (currentWeight <= 0) return 0;
        const raw = currentWeight + increment;
        const rounded = roundToIncrement(raw, increment);
        const jumpRatio = (rounded - currentWeight) / currentWeight;
        return jumpRatio > profile.maxJumpRatio ? currentWeight : rounded;
      }

      function summarizeExerciseByWeek(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const grouped = new Map();
        scoped.sets.forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session || !isSessionSubmitted(session) || set.isWarmup) return;
          if (options.excludeSessionId && session.id === options.excludeSessionId) return;
          const week = startOfWeekIso(session.date);
          const bucket = grouped.get(week) || { sessions: new Set(), travelCount: 0, sets: [], deloadFlags: [] };
          if (!bucket.sessions.has(session.id) && session.isTravel) bucket.travelCount += 1;
          bucket.sessions.add(session.id);
          bucket.sets.push(set);
          bucket.deloadFlags.push(Boolean(exercise.isDeload));
          grouped.set(week, bucket);
        });
        const summaries = Array.from(grouped.entries()).map(([weekStart, bucket]) => {
          const completed = bucket.sets.filter((set) => set.completed);
          const rpeSets = bucket.sets.filter((set) => set.rpe > 0);
          const topWeight = Math.max(0, ...completed.map((set) => set.weight));
          const topWeightSets = completed.filter((set) => set.weight === topWeight);
          const setsBelowTopWeight = topWeight > 0 ? completed.filter((set) => set.weight > 0 && set.weight < topWeight).length : 0;
          const topWeightRpeSets = topWeightSets.filter((set) => set.rpe > 0);
          return {
            weekStart,
            travelCount: bucket.travelCount,
            isDeload: bucket.deloadFlags.length > 0 && bucket.deloadFlags.every(Boolean),
            topWeight,
            topWeightSetCount: topWeightSets.length,
            setsBelowTopWeight,
            maxRepsAtTopWeight: Math.max(0, ...topWeightSets.map((set) => set.reps)),
            minRepsAtTopWeight: topWeightSets.length ? Math.min(...topWeightSets.map((set) => set.reps)) : 0,
            averageRpeAtTopWeight: topWeightRpeSets.length
              ? topWeightRpeSets.reduce((sum, set) => sum + set.rpe, 0) / topWeightRpeSets.length
              : 0,
            completedSets: completed.length,
            failedSets: bucket.sets.filter((set) => !set.completed && !set.skipped).length,
            averageRpe: rpeSets.length ? rpeSets.reduce((sum, set) => sum + set.rpe, 0) / rpeSets.length : 0,
            bestEstimatedOneRepMax: Math.max(0, ...completed.map(estimatedOneRepMax))
          };
        }).sort((a, b) => b.weekStart.localeCompare(a.weekStart));
        summaries.forEach((summary, index) => {
          const previous = summaries[index + 1];
          summary.isLikelyDeload = summary.isDeload;
          summary.deloadBaselineWeek = summary.isDeload ? previous?.weekStart || "" : "";
        });
        return summaries;
      }

      function deloadEvidence(deloadWeek, baselineWeek) {
        if (!deloadWeek || !baselineWeek) return "";
        const loadText = deloadWeek.topWeight > 0 && baselineWeek.topWeight > 0
          ? " load moved from " + baselineWeek.topWeight + " to " + deloadWeek.topWeight + " " + data.settings.weightUnit + ","
          : "";
        return "You marked " + formatWeek(deloadWeek.weekStart).toLowerCase() + " as a deload/recovery week:" + loadText + " it is skipped as the baseline and " + formatWeek(baselineWeek.weekStart).toLowerCase() + " is used for the next target.";
      }

      function recommendForExerciseWeek(exerciseName, weekStart, options = {}) {
        const summaries = summarizeExerciseByWeek(exerciseName, options);
        const selectedIndex = summaries.findIndex((summary) => summary.weekStart === weekStart);
        const rawIndex = selectedIndex >= 0 ? selectedIndex : 0;
        const rawCurrent = summaries[rawIndex];
        const skippedDeload = rawCurrent?.isLikelyDeload ? rawCurrent : null;
        const effectiveIndex = skippedDeload
          ? summaries.findIndex((summary, index) => index > rawIndex && !summary.isLikelyDeload)
          : rawIndex;
        const current = summaries[effectiveIndex >= 0 ? effectiveIndex : rawIndex];
        const previous = summaries.slice((effectiveIndex >= 0 ? effectiveIndex : rawIndex) + 1).find((summary) => !summary.isLikelyDeload);
        const older = summaries.slice((effectiveIndex >= 0 ? effectiveIndex : rawIndex) + 1, (effectiveIndex >= 0 ? effectiveIndex : rawIndex) + 6).filter((summary) => !summary.isLikelyDeload);
        const profile = progressionProfileForExercise(exerciseName);
        const increment = profile.increment;
        if (!current) {
          return {
            decision: "hold",
            label: "Need more data",
            reason: "There is not enough history for this lift yet.",
            action: "Log at least one complete session, then review again.",
            evidence: ["No completed sets found for the selected exercise."],
            confidence: "low"
          };
        }
        const travelAdjusted = current.travelCount > 0;
        const hardWeek = current.averageRpe >= 9;
        const failedMultipleSets = current.failedSets >= 2;
        const performanceDrop = previous && current.bestEstimatedOneRepMax > 0 && current.bestEstimatedOneRepMax < previous.bestEstimatedOneRepMax * 0.92;
        const repeatedFailures = older.filter((week) => week.failedSets > 0 || week.averageRpe >= 9.5).length >= 2 && current.failedSets > 0;
        const flatWeeks = older.length >= 3 && older.every((week) => Math.abs(week.bestEstimatedOneRepMax - current.bestEstimatedOneRepMax) <= current.bestEstimatedOneRepMax * 0.025);
        const evidence = [
          current.completedSets + " completed set" + (current.completedSets === 1 ? "" : "s") + " and " + current.failedSets + " missed set" + (current.failedSets === 1 ? "" : "s") + ".",
          "Average RPE " + (current.averageRpe ? current.averageRpe.toFixed(1) : "not logged") + ".",
          "Best estimated 1RM " + (current.bestEstimatedOneRepMax ? current.bestEstimatedOneRepMax.toFixed(1) : "not available") + ".",
          current.topWeight > 0 ? current.topWeightSetCount + " of " + current.completedSets + " completed sets used the top load of " + current.topWeight + " " + data.settings.weightUnit + "." : "No weighted top load found."
        ];
        if (skippedDeload && skippedDeload !== current) evidence.unshift(deloadEvidence(skippedDeload, current));
        if (travelAdjusted) evidence.push("Travel was logged this week, so the recommendation is less punitive for a dip.");
        if (skippedDeload && skippedDeload !== current) {
          const targetLoad = current.topWeight > 0 ? current.topWeight + " " + data.settings.weightUnit : "the prior normal load";
          const targetReps = current.maxRepsAtTopWeight > 0 ? " for about " + current.maxRepsAtTopWeight + " reps" : "";
          return {
            decision: "hold",
            label: "Return from deload",
            reason: "The latest work looks like a planned recovery break, so it should not reset your working weights downward.",
            action: "Use the prior normal baseline next time: " + targetLoad + targetReps + ". Keep RPE controlled, then resume progression after that session confirms performance.",
            evidence,
            confidence: "high"
          };
        }
        if (flatWeeks && (hardWeek || repeatedFailures)) {
          return { decision: "change", label: "Consider changing variation", reason: "This lift looks stalled across several recent weeks.", action: "Swap to a close variation for 4-6 weeks, then retest the original lift.", evidence, confidence: "medium" };
        }
        if ((failedMultipleSets || repeatedFailures || performanceDrop) && !travelAdjusted) {
          const target = roundToIncrement(current.topWeight * 0.9, increment);
          return { decision: "deload", label: "Deload", reason: "Recent performance suggests fatigue or an overly aggressive load.", action: "Reduce working weight about 10% next time, aiming near " + target + " " + data.settings.weightUnit + ", and keep 1-3 reps in reserve.", evidence, confidence: "high" };
        }
        if (hardWeek || current.failedSets > 0 || current.completedSets < 3 || travelAdjusted) {
          return { decision: "hold", label: "Hold", reason: travelAdjusted ? "The travel context makes this a good week to repeat before judging progress." : "The work was close enough to the limit that repeating is the cleaner next step.", action: "Repeat the same load and rep target next time; progress only if RPE settles below 9.", evidence, confidence: travelAdjusted ? "medium" : "high" };
        }
        if (current.topWeight > 0 && current.setsBelowTopWeight > 0 && (profile.kind === "isolation" || current.topWeightSetCount < Math.max(2, current.completedSets - 1))) {
          return {
            decision: "hold",
            label: "Consolidate load",
            reason: "Your top set is ahead of your back-off sets, so the next progression is making the current load repeatable.",
            action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " as the top load and work later sets up to that load before adding weight.",
            evidence,
            confidence: "high"
          };
        }
        const canAddLoad = current.topWeight > 0 && current.maxRepsAtTopWeight >= profile.upperRep && current.averageRpeAtTopWeight > 0 && current.averageRpeAtTopWeight <= 8.5;
        const nextWeight = nextLoadForExercise(exerciseName, current.topWeight);
        if (profile.kind === "isolation" && !canAddLoad) {
          const nextReps = Math.min(profile.upperRep, Math.max(profile.lowerRep, current.maxRepsAtTopWeight + 1));
          return { decision: "progress", label: "Progress reps", reason: "You completed the work, but this is an isolation lift where load jumps are large.", action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " and add reps first, targeting about " + nextReps + " reps before increasing load.", evidence, confidence: previous ? "high" : "medium" };
        }
        if (nextWeight === current.topWeight && current.topWeight > 0) {
          const nextReps = Math.min(profile.upperRep, Math.max(profile.lowerRep, current.maxRepsAtTopWeight + 1));
          return { decision: "progress", label: "Progress reps", reason: "The next load jump is too large relative to the current working weight.", action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " and add reps toward " + nextReps + "-" + profile.upperRep + " before increasing load.", evidence, confidence: previous ? "high" : "medium" };
        }
        return { decision: "progress", label: "Progress load", reason: "You completed the work without a high-RPE warning or repeated misses.", action: current.topWeight > 0 ? "Add " + increment + " " + data.settings.weightUnit + " next time, targeting about " + nextWeight + " " + data.settings.weightUnit + "." : "Add reps or a harder bodyweight variation next time.", evidence, confidence: previous ? "high" : "medium" };
      }

      function templateExerciseCount(template) {
        return template.exercises.reduce((sum, exercise) => sum + Number(exercise.sets || 0), 0);
      }

      function researchVolumeTarget() {
        return researchRules.volume[data.settings.trainingStatus] || researchRules.volume.intermediate;
      }

      function goalContext() {
        if (data.settings.goal === "recomposition") return researchRules.recomposition;
        if (data.settings.goal === "cut") return "During a cut, protect performance with high protein, controlled volume, and conservative progression.";
        if (data.settings.goal === "maintain") return "For maintenance, prioritize consistency, sufficient effort, and avoiding unnecessary fatigue.";
        return "For hypertrophy, prioritize enough weekly hard sets, progressive overload, and recovery.";
      }

      function getLastCompletedSet(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const deloadWeeks = options.includeDeloads ? new Set() : new Set(summarizeExerciseByWeek(exerciseName, options).filter((week) => week.isLikelyDeload).map((week) => week.weekStart));
        return scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .filter((entry) => isSessionSubmitted(entry.session) && !entry.set.isWarmup)
          .filter((entry) => !options.excludeSessionId || entry.session.id !== options.excludeSessionId)
          .filter((entry) => !deloadWeeks.has(startOfWeekIso(entry.session.date)))
          .sort((a, b) => b.session.date.localeCompare(a.session.date))[0];
      }

      function getMostRecentWorkoutSets(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const deloadWeeks = options.includeDeloads ? new Set() : new Set(summarizeExerciseByWeek(exerciseName, options).filter((week) => week.isLikelyDeload).map((week) => week.weekStart));
        const completed = scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .filter((entry) => isSessionSubmitted(entry.session) && !entry.set.isWarmup)
          .filter((entry) => !options.excludeSessionId || entry.session.id !== options.excludeSessionId)
          .filter((entry) => !deloadWeeks.has(startOfWeekIso(entry.session.date)))
          .sort((a, b) => b.session.date.localeCompare(a.session.date) || a.set.setNumber - b.set.setNumber);
        const latestSessionId = completed[0]?.session.id;
        return latestSessionId ? completed.filter((entry) => entry.session.id === latestSessionId).map((entry) => entry.set).sort((a, b) => a.setNumber - b.setNumber) : [];
      }

      function latestSkippedDeloadForExercise(exerciseName, options = {}) {
        const weeks = summarizeExerciseByWeek(exerciseName, options);
        if (!weeks[0]?.isLikelyDeload) return null;
        const baseline = weeks.slice(1).find((week) => !week.isLikelyDeload);
        return baseline ? { deload: weeks[0], baseline } : null;
      }

      function coachTargetForTemplateExercise(templateExercise, options = {}) {
        const targetReps = Number(templateExercise.reps || 8);
        const plannedSets = Number(templateExercise.sets || 1);
        const profile = progressionProfileForExercise(templateExercise.name);
        const weeks = summarizeExerciseByWeek(templateExercise.name, options);
        const recommendation = weeks[0] ? recommendForExerciseWeek(templateExercise.name, weeks[0].weekStart, options) : null;
        const recentSets = getMostRecentWorkoutSets(templateExercise.name, options);
        const last = getLastCompletedSet(templateExercise.name, options);
        const skippedDeload = latestSkippedDeloadForExercise(templateExercise.name, options);
        const increment = Number(templateExercise.increment || profile.increment);
        const recentTop = Math.max(0, ...recentSets.map((set) => set.weight), last?.set?.weight || 0);
        const topSets = recentSets.filter((set) => set.weight === recentTop);
        const recentReps = Math.max(0, ...topSets.map((set) => set.reps), last?.set?.reps || 0);
        const representativeSet = topSets.slice().sort((a, b) => b.reps - a.reps || (a.rpe || 99) - (b.rpe || 99))[0] || last?.set;
        const recentRpe = Number(representativeSet?.rpe || 0);
        const knownBodyweight = Boolean(templateExercise.isBodyweight || (recentSets.length > 0 && recentSets.every((set) => set.isBodyweight)) || last?.set?.isBodyweight);
        const sessionType = sessionTypeForTemplate(options.template);
        const daysSinceLast = last?.session?.date ? Math.floor((Date.now() - new Date(last.session.date + "T12:00:00").getTime()) / 86400000) : 0;
        let sets = plannedSets;
        let reps = Math.max(profile.lowerRep, Math.min(profile.upperRep, recentReps || targetReps));
        let weight = recentTop;
        let rpe = programmedRpeForExercise(templateExercise, profile, sessionType, recentRpe);
        let mode = recentSets.length ? "maintenance" : "baseline";
        let reason = "No prior completed sets found. Use a controlled load near RPE 7-8.";

        if (sessionType === "deload") {
          mode = "deload";
          reason = "Planned deload: reduce fatigue with lower load, fewer sets, and lower effort.";
          weight = recentTop > 0 ? roundToIncrement(recentTop * 0.9, increment) : 0;
          sets = Math.max(1, Math.ceil(plannedSets * 0.65));
          reps = Math.max(profile.lowerRep, Math.min(targetReps, profile.upperRep));
          rpe = Number(templateExercise.targetRpe || 6.5);
        } else if (sessionType === "light" || sessionType === "technique") {
          mode = sessionType;
          reason = sessionType === "light" ? "Programmed light session: preserve movement quality while limiting fatigue." : "Technique-focused session: prioritize repeatable positions and bar path over loading.";
          weight = recentTop > 0 ? roundToIncrement(recentTop * 0.9, increment) : 0;
          rpe = Number(templateExercise.targetRpe || 6.5);
        } else if (daysSinceLast >= 35 && recentTop > 0) {
          mode = "return";
          reason = "Return from a training gap of " + daysSinceLast + " days: use a small ramp-in before resuming normal progression.";
          weight = roundToIncrement(recentTop * 0.95, increment);
          sets = Math.max(1, plannedSets - 1);
          rpe = Number(templateExercise.targetRpe || 7.5);
        } else if (skippedDeload) {
          mode = "return-from-deload";
          reason = "The most recent week looks like a deload/recovery break, so this target skips that reduced week and returns to the prior normal training baseline before progressing again.";
        } else if (recommendation?.decision === "progress") {
          const loadCandidate = nextLoadForExercise(templateExercise.name, recentTop, increment);
          const shouldAddLoad = profile.kind !== "isolation" && recentTop > 0 && recentReps >= profile.upperRep && recentRpe > 0 && recentRpe <= 8.5 && loadCandidate > recentTop;
          if (shouldAddLoad) {
            mode = "load-progression";
            reason = "You reached the top of the programmed rep range at a manageable RPE, so the next available load increment is appropriate.";
            weight = loadCandidate;
            reps = Math.max(profile.lowerRep, Math.min(profile.upperRep, targetReps - Math.max(2, Math.round((profile.upperRep - profile.lowerRep) * 0.35))));
          } else {
            mode = "rep-progression";
            reason = profile.kind === "isolation"
              ? "Progress this lift by adding reps first; load jumps are large for isolation work."
              : "Progress by adding reps before taking the next load jump.";
            reps = Math.min(profile.upperRep, Math.max(profile.lowerRep, recentReps + 1, targetReps));
          }
        } else if (recommendation?.decision === "deload") {
          mode = "deload";
          reason = "Recent work suggests fatigue or misses. Reduce load and volume.";
          weight = recentTop > 0 ? roundToIncrement(recentTop * 0.9, increment) : 0;
          sets = Math.max(1, Math.ceil(plannedSets * 0.65));
          reps = Math.max(profile.lowerRep, Math.min(reps, profile.upperRep));
          rpe = Number(templateExercise.targetRpe || 6.5);
        } else if (recommendation?.decision === "change") {
          mode = "substitution";
          reason = "This pattern looks stalled. Consider swapping the lift for 4-6 weeks.";
        } else if (recommendation) {
          mode = "maintenance";
          reason = recentTop > 0
            ? "Repeat the prior top performance and aim for cleaner execution or a lower achieved RPE before adding load."
            : "Repeat the target and make it cleaner before adding workload.";
        }
        let target = validatePrescription({
          decision: recommendation?.decision || "hold",
          mode,
          sets,
          reps,
          repLow: profile.lowerRep,
          repHigh: profile.upperRep,
          weight,
          rpe,
          weightUnit: data.settings.weightUnit,
          isBodyweight: knownBodyweight,
          isDeload: mode === "deload",
          reason,
          increment,
          confidence: prescriptionConfidence(weeks, daysSinceLast)
        }, recentSets, profile);
        target.text = targetText(target, target.reason);
        return target;
      }

      function sessionTypeForTemplate(template) {
        const text = ((template?.name || "") + " " + (template?.notes || "")).toLowerCase();
        if (/deload/.test(text)) return "deload";
        if (/recovery|restoration/.test(text)) return "light";
        if (/technique|skill|form/.test(text)) return "technique";
        if (/light|easy/.test(text)) return "light";
        if (/heavy|strength/.test(text)) return "heavy";
        return "normal";
      }

      function programmedRpeForExercise(templateExercise, profile, sessionType, recentRpe) {
        const explicit = Number(templateExercise.targetRpe || 0);
        if (explicit > 0) return explicit;
        if (sessionType === "deload" || sessionType === "light" || sessionType === "technique") return 6.5;
        if (sessionType === "heavy" && profile.kind === "compound") return 8.5;
        if (recentRpe >= 7 && recentRpe <= 9) return Math.round(recentRpe * 2) / 2;
        return profile.kind === "isolation" ? 8.5 : 8;
      }

      function prescriptionConfidence(weeks, daysSinceLast) {
        if (daysSinceLast >= 35 || weeks.length < 1) return "low";
        if (weeks.length < 3) return "moderate";
        return "high";
      }

      function validatePrescription(target, recentSets, profile) {
        const result = { ...target };
        const recentTop = Math.max(0, ...recentSets.map((set) => Number(set.weight || 0)));
        const recentTopSets = recentSets.filter((set) => Number(set.weight || 0) === recentTop);
        const recentBest = recentTopSets.slice().sort((a, b) => b.reps - a.reps)[0];
        const intentionalRegression = ["deload", "light", "technique", "return"].includes(result.mode);
        const guardrails = [];
        result.reps = Math.max(profile.lowerRep, Math.min(profile.upperRep, Number(result.reps || profile.lowerRep)));
        if (recentBest && !intentionalRegression) {
          const loadDrop = recentTop > 0 && result.weight > 0 ? 1 - result.weight / recentTop : 0;
          const loweredEffort = recentBest.rpe > 0 && result.rpe < recentBest.rpe;
          if (loadDrop > 0.1 && result.reps >= recentBest.reps - 1) {
            result.weight = recentTop;
            guardrails.push("prevented an unexplained load reduction greater than 10% after the prior successful top set");
          }
          if (result.weight < recentTop && loweredEffort && result.reps >= recentBest.reps - 1) {
            result.weight = recentTop;
            guardrails.push("prevented load and effort from both regressing in a normal session");
          }
        }
        if (guardrails.length) result.reason += " Guardrail: " + guardrails.join("; ") + ".";
        return result;
      }

      function targetText(target, reason) {
        const weightText = target.isBodyweight ? "body weight" : target.weight > 0 ? target.weight + " " + (target.weightUnit || data.settings.weightUnit) : "a controlled starting load";
        return "Target " + target.sets + " x " + target.reps + " @ " + weightText + ", aim RPE " + target.rpe + ". " + reason;
      }

      function exerciseGuidanceFor(name) {
        const key = exerciseKey(name);
        const base = {
          sets: "2-4 hard sets",
          reps: "6-15 reps",
          effort: "RPE 7-9, 1-3 reps in reserve",
          cues: [
            "Use a controlled eccentric and pause if momentum creeps in.",
            "Stop the set when positions break, not when pride says one more.",
            "Progress only after target reps look repeatable and controlled."
          ]
        };
        const patterns = [
          { match: /neck curl|neck flexion|neck extension|neck harness|neck lateral/, sets: "2-4 controlled sets", reps: "10-20 reps", cues: ["Move slowly through a comfortable range.", "Keep the jaw relaxed and avoid jerking into end range.", "Progress conservatively; small muscles do not need big jumps."] },
          { match: /seated leg curl|lying leg curl|standing leg curl|nordic curl|hamstring curl|leg curl/, sets: "2-5 hard sets", reps: "8-15 reps", cues: ["Keep hips pinned and control the stretched position.", "Curl without letting the low back or hips pop up.", "Add reps before load when the contraction gets sloppy."] },
          { match: /squat|leg press|lunge|split squat/, sets: "3-5 hard sets", reps: "5-12 reps", cues: ["Brace before the descent and keep pressure through midfoot.", "Let knees track with toes; do not dive-bomb the bottom.", "Use a depth you can repeat without lumbar rounding."] },
          { match: /deadlift|rdl|romanian|hinge|good morning/, sets: "2-4 hard sets", reps: "5-10 reps", cues: ["Start by pushing hips back, not by squatting the weight.", "Keep lats tight and the load close to the body.", "End the set when back position or hamstring tension breaks."] },
          { match: /bench|chest press|push up|pushup|dip|chest|pec/, sets: "3-5 hard sets", reps: "6-12 reps", cues: ["Set shoulder blades before the first rep and keep wrists stacked.", "Lower under control to a consistent touch point or depth.", "Press without bouncing or letting shoulders roll forward."] },
          { match: /row|pulldown|pull up|chin|lat pulldown|\blat\b/, sets: "3-5 hard sets", reps: "6-15 reps", cues: ["Lead with elbows and keep ribs down.", "Pause briefly in the shortened position instead of yanking.", "Control the stretch without losing shoulder position."] },
          { match: /shoulder|overhead|lateral raise|rear delt/, sets: "2-5 hard sets", reps: "8-20 reps", cues: ["Keep ribs stacked and avoid turning it into a low-back lift.", "Use a smooth path and stop before joint irritation.", "For raises, chase tension and control rather than load."] },
          { match: /curl|tricep|extension|pushdown|skull/, sets: "2-4 hard sets", reps: "8-20 reps", cues: ["Pin the upper arm and move through the elbow.", "Use full range you can control without swinging.", "Add reps before load when jumps are large."] },
          { match: /calf/, sets: "3-5 hard sets", reps: "8-20 reps", cues: ["Use a full stretch and hard top contraction.", "Pause instead of bouncing through the ankle.", "Keep reps consistent before adding load."] },
          { match: /plank|crunch|leg raise|hanging raise|knee raise|ab|core/, sets: "2-4 hard sets", reps: "8-20 reps or timed sets", cues: ["Brace as if resisting motion, not just chasing burn.", "Keep pelvis controlled and avoid low-back takeover.", "Make the range harder before making it sloppy."] }
        ];
        const found = patterns.find((item) => item.match.test(key));
        return found ? { ...base, ...found } : base;
      }

      function renderExerciseGuidance(exercise) {
        const guidance = exerciseGuidanceFor(exercise.name);
        return `
          <div class="exercise-guidance">
            <strong>Execution target</strong>
            <div class="guidance-grid">
              <div class="guidance-pill"><span>Sets</span><b>${escapeHtml(guidance.sets)}</b></div>
              <div class="guidance-pill"><span>Reps</span><b>${escapeHtml(guidance.reps)}</b></div>
              <div class="guidance-pill"><span>Effort</span><b>${escapeHtml(guidance.effort)}</b></div>
            </div>
            <ul class="cue-list">${guidance.cues.map((cue) => "<li>" + escapeHtml(cue) + "</li>").join("")}</ul>
          </div>
        `;
      }

      function muscleOptions(selectedValue, includeAuto = false, autoLabel = "Auto") {
        const selected = selectedValue || "";
        const options = includeAuto ? ['<option value="" ' + (selected === "" ? "selected" : "") + ">" + escapeHtml(autoLabel) + "</option>"] : [];
        return options.concat(muscleGroups.map((muscle) => '<option value="' + escapeHtml(muscle) + '" ' + (selected === muscle ? "selected" : "") + ">" + escapeHtml(muscle) + "</option>")).join("");
      }

      function renderMuscleSelectors(exercise) {
        const auto = musclesForExercise(exercise.name, { ignoreManual: true });
        const autoText = auto.length ? auto.map((item) => item.muscle + " " + item.weight + "x").join(", ") : "Unclassified";
        return `
          <div class="muscle-select-grid">
            <label>Primary muscle
              <select data-action="exercise-primary-muscle" data-exercise-id="${exercise.id}" aria-label="Primary muscle for ${escapeHtml(exercise.name)}">
                ${muscleOptions(exercise.primaryMuscle || "", true, "Auto: " + autoText)}
              </select>
            </label>
            <label>Secondary muscle
              <select data-action="exercise-secondary-muscle" data-exercise-id="${exercise.id}" aria-label="Secondary muscle for ${escapeHtml(exercise.name)}">

              </select>
            </label>
          </div>
