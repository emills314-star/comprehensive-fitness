<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track strength workouts, rest timers, travel sessions, and transparent lift progression guidance." />
    <meta name="theme-color" content="#090d0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Comprehensive Fitness" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/resources/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/resources/icon-192.png" />
    <title>Comprehensive Fitness</title>
    <style>
      :root {
        --bg: #081015;
        --bg-soft: #101a21;
        --panel: rgba(13, 22, 29, 0.72);
        --panel-2: rgba(16, 28, 36, 0.7);
        --panel-3: rgba(24, 38, 48, 0.78);
        --line: rgba(132, 162, 184, 0.22);
        --line-strong: rgba(135, 181, 215, 0.42);
        --text: #edf7ff;
        --muted: #9fb4c3;
        --muted-2: #6f8797;
        --green: #4aa3ff;
        --green-2: #a9d7ff;
        --green-dark: rgba(74, 163, 255, 0.13);
        --amber: #ffbc4a;
        --red: #ff7e72;
        --surface: rgba(255, 255, 255, 0.035);
        --surface-strong: rgba(255, 255, 255, 0.07);
        --input-bg: rgba(5, 13, 18, 0.72);
        --nav-bg: rgba(7, 14, 18, 0.9);
        --shadow: none;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [data-theme="light"] {
        --bg: #f4f8fb;
        --bg-soft: #e9f1f7;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-2: rgba(255, 255, 255, 0.66);
        --panel-3: rgba(235, 244, 250, 0.92);
        --line: rgba(54, 92, 118, 0.18);
        --line-strong: rgba(32, 112, 178, 0.38);
        --text: #0b1b27;
        --muted: #526a7b;
        --muted-2: #7891a1;
        --green: #086fc7;
        --green-2: #0d8bff;
        --green-dark: rgba(8, 111, 199, 0.1);
        --amber: #a76200;
        --red: #c84337;
        --surface: rgba(255, 255, 255, 0.66);
        --surface-strong: rgba(255, 255, 255, 0.9);
        --input-bg: rgba(255, 255, 255, 0.92);
        --nav-bg: rgba(246, 251, 255, 0.9);
      }

      * { box-sizing: border-box; }

      html { background: var(--bg); }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(180deg, var(--bg-soft), var(--bg) 36%),
          var(--bg);
      }

      button, input, select, textarea { font: inherit; }

      button {
        align-items: center;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
        transition: border-color 140ms ease, color 140ms ease, transform 140ms ease, background 140ms ease;
      }

      button:hover { border-color: var(--green); }
      button:active { transform: translateY(1px); }

      input, select, textarea {
        background: var(--input-bg);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        color: var(--text);
        min-height: 48px;
        padding: 12px 6px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus, button:focus-visible {
        border-color: var(--green);
        box-shadow: 0 1px 0 var(--green);
        outline: none;
      }

      input[type="number"] {
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      h1, h2, p { margin-top: 0; }
      h1 {
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        letter-spacing: 0;
        margin-bottom: 2px;
      }
      h2 { letter-spacing: 0; }

      .app-shell {
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding-bottom: 104px;
      }

      .brand-bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: auto 1fr auto auto;
        margin: 0 14px;
        min-height: 76px;
        padding: max(14px, env(safe-area-inset-top)) 0 14px;
      }

      .brand-mark {
        align-items: center;
        background: var(--green-dark);
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        color: var(--green-2);
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 1000;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .brand-title {
        display: grid;
        font-size: 0.92rem;
        font-weight: 1000;
        letter-spacing: 0.03em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .brand-title span {
        color: var(--green);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
      }

      .brand-action {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--green);
        display: inline-flex;
        font-weight: 1000;
        gap: 6px;
        min-height: 38px;
        padding: 0 12px;
      }

      .theme-toggle {
        border-color: var(--line-strong);
        color: var(--green);
        min-height: 38px;
        padding: 0 10px;
      }

      .app-main { padding: 16px 14px 0; }
      .loading, .empty-state {
        color: var(--muted);
        padding: 24px;
      }

      .empty-state {
        background: transparent;
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
      }

      .view { display: grid; gap: 16px; }

      .section-kicker {
        color: var(--green);
        font-size: 0.76rem;
        font-weight: 1000;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .session-header {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .split { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .grid { display: grid; gap: 10px; }
      .two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

      .toggle-line, .bodyweight {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 0.92rem;
        font-weight: 800;
        gap: 9px;
      }

      .toggle-line input, .bodyweight input {
        accent-color: var(--green);
        height: 22px;
        min-height: 22px;
        width: 22px;
      }

      .exercise-card, .settings-panel, .recommendation, .template-card, .inline-panel, .workout-advice {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .exercise-card {
        gap: 14px;
        overflow: hidden;
        position: relative;
      }

      .exercise-card::before,
      .workout-advice::before,
      .recovery-panel::before {
        background: var(--green);
        content: "";
        height: calc(100% - 22px);
        left: 0;
        opacity: 0.52;
        position: absolute;
        top: 11px;
        width: 1px;
      }

      .exercise-guidance {
        background: transparent;
        border: 1px solid var(--line);
        border-left-color: var(--green);
        border-radius: 0;
        color: var(--muted);
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .exercise-guidance strong {
        color: var(--green-2);
        font-size: 0.92rem;
      }

      .guidance-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      }

      .guidance-pill {
        background: var(--surface);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        display: grid;
        gap: 3px;
        padding: 9px;
      }

      .guidance-pill span {
        color: var(--muted-2);
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .guidance-pill b {
        color: var(--text);
        font-size: 0.92rem;
      }

      .cue-list {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .exercise-name {
        background: transparent;
        border-color: transparent;
        font-size: 1.08rem;
        font-weight: 1000;
        padding-left: 0;
      }

      .exercise-name:focus { background: var(--input-bg); padding-left: 12px; }

      .icon-button {
        aspect-ratio: 1;
        justify-content: center;
        min-width: 48px;
        padding: 8px;
        width: 48px;
      }

      .danger, .danger-button {
        border-color: rgba(255, 127, 107, 0.46);
        color: var(--red);
      }

      .set-head, .set-row, .trend-head, .trend-row {
        align-items: center;
        display: grid;
        gap: 7px;
      }

      .set-head, .set-row {
        grid-template-columns: 36px minmax(56px, 1fr) minmax(76px, 1.35fr) minmax(56px, 1fr) 48px;
      }

      .set-head, .trend-head {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .set-row {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        padding: 7px 0;
      }

      .set-row strong {
        color: var(--green);
        font-size: 1.1rem;
        text-align: center;
      }

      .set-row input {
        border-radius: 0;
        min-height: 46px;
        padding: 8px;
      }

      .set-row .bodyweight, .set-row .mini-button { grid-column: span 2; }

      .mini-button {
        color: var(--muted);
        font-size: 0.82rem;
        min-height: 38px;
        padding: 8px 10px;
      }

      .check-button {
        aspect-ratio: 1;
        border-radius: 10px;
        color: var(--muted-2);
        justify-content: center;
        min-height: 44px;
        padding: 6px;
      }

      .check-button.checked {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      .primary-action {
        background: var(--green);
        border-color: var(--green);
        box-shadow: 0 14px 28px rgba(74, 163, 255, 0.2);
        color: var(--bg);
        font-size: 1rem;
        font-weight: 1000;
        justify-content: center;
        min-height: 58px;
        text-transform: uppercase;
      }

      .secondary-action {
        color: var(--green);
        justify-content: center;
      }

      .template-card { text-align: left; }

      .template-card h2,
      .workout-advice h2,
      .inline-panel h2 {
        font-size: 1.12rem;
        margin: 0;
      }

      .workout-advice {
        border-color: rgba(74, 163, 255, 0.58);
        position: relative;
      }

      .workout-advice h2 {
        color: var(--green-2);
        font-size: 1.28rem;
      }

      .recovery-panel {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
        position: relative;
      }

      .recovery-panel h2 {
        margin: 0;
      }

      .recovery-status {
        border-radius: 0;
        display: grid;
        gap: 5px;
        padding: 11px 0;
      }

      .recovery-status.progress { border-bottom: 1px solid rgba(74, 163, 255, 0.5); }
      .recovery-status.hold { border-bottom: 1px solid rgba(255, 177, 43, 0.46); }
      .recovery-status.deload, .recovery-status.rest { border-bottom: 1px solid rgba(255, 127, 107, 0.46); }

      .recovery-status strong {
        color: var(--text);
      }

      .recovery-status span {
        color: var(--muted);
        line-height: 1.4;
      }

      .recovery-inputs {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      }

      .recovery-inputs label {
        color: var(--muted);
        display: grid;
        font-size: 0.82rem;
        font-weight: 800;
        gap: 5px;
      }

      .dashboard-grid,
      .plan-list,
      .flag-list,
      .chart-list {
        display: grid;
        gap: 10px;
      }

      .volume-card,
      .plan-card,
      .flag-card,
      .chart-card,
      .rule-card {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      button.volume-card {
        color: var(--text);
        text-align: left;
        width: 100%;
      }

      .volume-detail {
        border-top: 1px solid var(--line);
        display: grid;
        gap: 8px;
        padding-top: 9px;
      }

      .volume-detail div {
        display: grid;
        gap: 3px;
      }

      .volume-detail strong {
        color: var(--text);
        font-size: 0.92rem;
      }

      .volume-detail span,
      .volume-detail.empty {
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .volume-card header,
      .plan-card header,
      .chart-card header {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .status-pill {
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 1000;
        padding: 4px 8px;
        text-transform: uppercase;
      }

      .status-pill.low,
      .status-pill.caution,
      .flag-card.caution { border-color: var(--amber); color: var(--amber); }
      .status-pill.high,
      .status-pill.over,
      .flag-card.over { border-color: var(--red); color: var(--red); }
      .status-pill.good,
      .status-pill.inside,
      .flag-card.good { border-color: var(--green); color: var(--green-2); }

      .meter {
        background: var(--surface-strong);
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
      }

      .meter span {
        background: linear-gradient(90deg, var(--green), var(--green-2));
        display: block;
        height: 100%;
        width: var(--meter, 0%);
      }

      .plan-meta,
      .flag-card span,
      .chart-card small,
      .rule-card {
        color: var(--muted);
        line-height: 1.4;
      }

      .plan-targets {
        display: grid;
        gap: 7px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .plan-targets span {
        background: var(--surface);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 900;
        padding: 8px;
        text-align: center;
      }

      .chart-svg {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 0;
        color: var(--green);
        height: 132px;
        overflow: hidden;
        width: 100%;
      }

      .chart-svg svg {
        display: block;
        height: 100%;
        width: 100%;
      }

      .quick-template-strip {
        display: grid;
        gap: 10px;
      }

      .quick-template-list {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      }

      .quick-template-card {
        align-items: stretch;
        background: transparent;
        border-color: rgba(74, 163, 255, 0.5);
        border-radius: 0;
        display: grid;
        gap: 7px;
        min-height: 126px;
        padding: 13px;
        text-align: left;
      }

      .quick-template-card strong {
        color: var(--text);
        font-size: 1rem;
      }

      .quick-template-card small,
      .quick-template-card span {
        color: var(--muted);
        line-height: 1.35;
      }

      .quick-template-card span {
        color: var(--text);
        font-size: 0.86rem;
      }

      .template-meta,
      .advice-detail,
      .template-card small {
        color: var(--muted);
      }

      .advice-detail {
        line-height: 1.45;
        margin: 0;
      }

      .template-list,
      .advice-list {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 0;
      }

      .template-list li,
      .advice-list li {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        display: grid;
        gap: 6px;
        list-style: none;
        padding: 11px;
      }

      .advice-list strong { color: var(--text); }
      .advice-list span { color: var(--muted); line-height: 1.4; }

      .inline-panel {
        border-color: rgba(74, 163, 255, 0.56);
      }

      .inline-actions {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .export-box {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        min-height: 180px;
      }

      .timer-bar {
        align-items: center;
        background: var(--nav-bg);
        border: 1px solid rgba(255, 177, 43, 0.78);
        border-radius: 12px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 48px 48px;
        left: 14px;
        margin: 0 auto;
        max-width: 892px;
        padding: 12px;
        position: fixed;
        right: 14px;
        z-index: 5;
      }

      .timer-bar strong {
        color: var(--amber);
        display: block;
        font-size: 1.75rem;
        line-height: 1;
      }

      .timer-bar span {
        color: var(--amber);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .timer-bar.complete { border-color: var(--green); }

      .session-card {
        align-items: stretch;
        border-radius: 18px;
        display: grid;
        gap: 7px;
        text-align: left;
      }

      .session-card p, .session-card small {
        color: var(--muted);
        margin: 0;
      }

      .recommendation span {
        background: var(--surface-strong);
        border-radius: 999px;
        color: var(--text);
        font-size: 0.76rem;
        font-weight: 900;
        justify-self: start;
        padding: 5px 9px;
      }

      .recommendation h2 { margin: 0; }
      .recommendation p { color: var(--muted); margin: 0; }
      .recommendation strong { color: var(--text); line-height: 1.35; }
      .recommendation ul { color: var(--text); margin: 0; padding-left: 18px; }
      .recommendation.progress { border-color: var(--green); }
      .recommendation.hold { border-color: var(--amber); }
      .recommendation.deload, .recommendation.change { border-color: var(--red); }

      .trend-table {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 0;
        overflow: hidden;
      }

      .trend-head, .trend-row {
        grid-template-columns: 1.55fr 0.7fr 0.7fr 0.65fr;
        padding: 11px;
      }

      .trend-row {
        border-top: 1px solid var(--line);
        color: var(--text);
      }

      .settings-panel label {
        color: var(--text);
        display: grid;
        gap: 7px;
      }

      .settings-note,
      .settings-links {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
        margin: 0;
      }

      .settings-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .settings-links a { color: var(--green); }

      .import-button {
        align-items: center;
        background: transparent;
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        cursor: pointer;
        display: inline-flex;
        flex-direction: row;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
      }

      .import-button input { display: none; }

      .bottom-nav {
        background: var(--nav-bg);
        border-top: 1px solid var(--line);
        bottom: 0;
        display: grid;
        gap: 4px;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        left: 0;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        position: fixed;
        right: 0;
        z-index: 4;
      }

      .nav-button {
        background: transparent;
        border-color: transparent;
        border-radius: 14px;
        color: var(--muted);
        flex-direction: column;
        font-size: 0.68rem;
        font-weight: 900;
        gap: 3px;
        justify-content: center;
        min-height: 64px;
        padding: 7px 4px;
      }

      .nav-icon {
        align-items: center;
        border: 1px solid rgba(119, 130, 126, 0.28);
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.66rem;
        height: 28px;
        justify-content: center;
        min-width: 28px;
        padding: 0 7px;
      }

      .nav-button.active {
        color: var(--green-2);
      }

      .nav-button.active .nav-icon {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      @media (max-width: 390px) {
        .two { grid-template-columns: 1fr; }
        .set-head, .set-row {

      const defaultSettings = { weightUnit: "lb", defaultRestSeconds: 120, goal: "hypertrophy", trainingStatus: "intermediate", theme: "dark", readinessBaseline: { ...defaultReadinessBaseline } };
      const researchRules = {

        progression: "Progress by adding load or reps when target work is completed with manageable RPE; hold or deload when performance drops or fatigue accumulates.",

      };
      let data = emptyData();
      let view = "workout";
      let activeSessionId = "";
      let timer = null;
      let timerInterval = 0;
      let selectedExercise = "";
      let selectedWeek = "";
      let addExerciseDraft = "";
      let exportText = "";
      let pendingClearData = false;
      let pendingDeleteTemplateId = "";
      let expandedVolumeMuscle = "";
      let settingsMessage = "";
      let importInProgress = false;

      const icon = {
        workout: "Lift",
        dashboard: "Dash",
        templates: "Plan",
        history: "Past",
        review: "Chart",
        settings: "Data",
        add: "+",
        clock: "Rest",
        done: "OK",
        delete: "X",
        pause: "Pause",
        play: "Start",
        duplicate: "Copy",
        download: "Export",
        upload: "Import"
      };

      function emptyData() {
        return { sessions: [], exercises: [], sets: [], templates: [], settings: { ...defaultSettings } };
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function isoNow() {
        return new Date().toISOString();
      }

      function startOfWeekIso(dateIso) {
        const date = new Date(dateIso + "T00:00:00");
        const day = date.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        date.setDate(date.getDate() + diff);
        return date.toISOString().slice(0, 10);
      }

      function formatDate(dateIso) {
        return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" }).format(new Date(dateIso + "T00:00:00"));
      }

      function formatWeek(dateIso) {
        return "Week of " + formatDate(startOfWeekIso(dateIso));
      }

      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function loadData() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          data = stored ? { ...emptyData(), ...stored, settings: { ...defaultSettings, ...stored.settings } } : emptyData();
        } catch {
          data = emptyData();
        }
        data.settings.readinessBaseline = { ...defaultReadinessBaseline, ...(data.settings.readinessBaseline || {}) };
        data.templates = Array.isArray(data.templates) ? data.templates : [];
        applyTheme();
        if (data.sessions.length === 0) data.sessions.push(createSession());
        activeSessionId = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date))[0].id;
      }

      function saveData() {
        window.clearTimeout(saveTimer);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          return true;
        } catch (error) {
          settingsMessage = "Storage is full on this device. Export a backup, clear old data, or import a smaller file.";
          return false;
        }
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveData, 500);
      }

      function commit(nextData, shouldRender = true) {
        data = nextData;
        applyTheme();
        if (shouldRender) saveData();
        else scheduleSave();
        if (shouldRender) render();
      }

      function applyTheme() {
        const theme = data.settings?.theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", theme === "light" ? "#f4f8fb" : "#081015");
      }

      function themeLabel() {
        return data.settings.theme === "light" ? "Light" : "Dark";
      }

      function createSession(title) {
        const now = isoNow();
        const sameDayCount = data.sessions.filter((session) => session.date === todayIso()).length + 1;
        return { id: id(), date: todayIso(), title: title || "Workout " + sameDayCount, isTravel: false, notes: "", recovery: defaultRecovery(), createdAt: now, updatedAt: now };
      }

      function defaultRecovery() {
        return { sleepHours: "", sleepQuality: "", hrv: "", restingHr: "", soreness: "", stress: "", energy: "", outsideBand: false, outsideBandNote: "", illness: false };
      }

      function sessionRecovery(session) {
        return { ...defaultRecovery(), ...(session?.recovery || {}) };
      }

      function createSet(exerciseId, setNumber, previous) {
        return {
          id: id(),
          exerciseId,
          setNumber,
          reps: previous?.reps ?? 8,
          weight: previous?.weight ?? 0,
          weightUnit: previous?.weightUnit ?? data.settings.weightUnit,
          isBodyweight: previous?.isBodyweight ?? false,
          rpe: previous?.rpe ?? 7,
          completed: previous?.completed ?? true
        };
      }

      function activeSession() {
        return data.sessions.find((session) => session.id === activeSessionId) || data.sessions[0];
      }

      function activeExercises() {
        const session = activeSession();
        return session ? data.exercises.filter((exercise) => exercise.sessionId === session.id).sort((a, b) => a.order - b.order) : [];
      }

      function workoutSessionOptions(session) {
        const recent = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 60);
        return Array.from(new Map([session, ...recent].filter(Boolean).map((item) => [item.id, item])).values());
      }

      function setsForExercise(exerciseId) {
        return data.sets.filter((set) => set.exerciseId === exerciseId).sort((a, b) => a.setNumber - b.setNumber);
      }

      function estimatedOneRepMax(set) {
        if (set.weight <= 0 || set.reps <= 0) return 0;
        return set.weight * (1 + set.reps / 30);
      }

      function roundToIncrement(value, increment) {
        return Math.max(increment, Math.round(value / increment) * increment);
      }

      function getExerciseNames() {
        return Array.from(new Set(data.exercises.map((exercise) => exercise.name.trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      }

      function exerciseKey(name) {
        return String(name || "")
          .toLowerCase()
          .replace(/\([^)]*\)/g, "")
          .replace(/\b(barbell|dumbbell|machine|cable|bodyweight)\b/g, "")
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      function exerciseMatches(storedName, requestedName) {
        const stored = String(storedName || "").trim().toLowerCase();
        const requested = String(requestedName || "").trim().toLowerCase();
        return stored === requested || exerciseKey(storedName) === exerciseKey(requestedName);
      }

      function getExerciseSets(exerciseName) {
        const exercises = data.exercises.filter((exercise) => exerciseMatches(exercise.name, exerciseName));
        const ids = new Set(exercises.map((exercise) => exercise.id));
        return { exercises, sets: data.sets.filter((set) => ids.has(set.exerciseId)) };
      }

      function progressionProfileForExercise(name) {
        const key = exerciseKey(name);
        const unit = data.settings.weightUnit;
        const small = unit === "kg" ? 1 : 2.5;
        const standard = unit === "kg" ? 2.5 : 5;
        if (/lateral raise|rear delt|fly|curl|pushdown|tricep|extension|calf|neck/.test(key)) {
          return { kind: "isolation", increment: small, lowerRep: /lateral raise|rear delt/.test(key) ? 12 : 10, upperRep: 20, maxJumpRatio: 0.18 };
        }
        if (/leg extension|leg curl|pulldown|row/.test(key)) {
          return { kind: "machine", increment: standard, lowerRep: 8, upperRep: 15, maxJumpRatio: 0.22 };
        }
        return { kind: "compound", increment: standard, lowerRep: 5, upperRep: 12, maxJumpRatio: 0.25 };
      }

      function nextLoadForExercise(name, currentWeight) {
        const profile = progressionProfileForExercise(name);
        if (currentWeight <= 0) return 0;
        const raw = currentWeight + profile.increment;
        const rounded = roundToIncrement(raw, profile.increment);
        const jumpRatio = (rounded - currentWeight) / currentWeight;
        return jumpRatio > profile.maxJumpRatio ? currentWeight : rounded;
      }

      function summarizeExerciseByWeek(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const grouped = new Map();
        scoped.sets.forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session) return;
          if (options.excludeSessionId && session.id === options.excludeSessionId) return;
          const week = startOfWeekIso(session.date);
          const bucket = grouped.get(week) || { sessions: new Set(), travelCount: 0, sets: [] };
          if (!bucket.sessions.has(session.id) && session.isTravel) bucket.travelCount += 1;
          bucket.sessions.add(session.id);
          bucket.sets.push(set);
          grouped.set(week, bucket);
        });
        return Array.from(grouped.entries()).map(([weekStart, bucket]) => {
          const completed = bucket.sets.filter((set) => set.completed);
          const rpeSets = bucket.sets.filter((set) => set.rpe > 0);
          const topWeight = Math.max(0, ...completed.map((set) => set.weight));
          const topWeightSets = completed.filter((set) => set.weight === topWeight);
          const setsBelowTopWeight = topWeight > 0 ? completed.filter((set) => set.weight > 0 && set.weight < topWeight).length : 0;
          const topWeightRpeSets = topWeightSets.filter((set) => set.rpe > 0);
          return {
            weekStart,
            travelCount: bucket.travelCount,
            topWeight,
            topWeightSetCount: topWeightSets.length,
            setsBelowTopWeight,
            maxRepsAtTopWeight: Math.max(0, ...topWeightSets.map((set) => set.reps)),
            minRepsAtTopWeight: topWeightSets.length ? Math.min(...topWeightSets.map((set) => set.reps)) : 0,
            averageRpeAtTopWeight: topWeightRpeSets.length
              ? topWeightRpeSets.reduce((sum, set) => sum + set.rpe, 0) / topWeightRpeSets.length
              : 0,
            completedSets: completed.length,
            failedSets: bucket.sets.filter((set) => !set.completed).length,
            averageRpe: rpeSets.length ? rpeSets.reduce((sum, set) => sum + set.rpe, 0) / rpeSets.length : 0,
            bestEstimatedOneRepMax: Math.max(0, ...completed.map(estimatedOneRepMax))
          };
        }).sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      }

      function recommendForExerciseWeek(exerciseName, weekStart, options = {}) {
        const summaries = summarizeExerciseByWeek(exerciseName, options);
        const selectedIndex = summaries.findIndex((summary) => summary.weekStart === weekStart);
        const current = summaries[selectedIndex >= 0 ? selectedIndex : 0];
        const previous = summaries[selectedIndex + 1];
        const older = summaries.slice(selectedIndex + 1, selectedIndex + 5);
        const profile = progressionProfileForExercise(exerciseName);
        const increment = profile.increment;
        if (!current) {
          return {
            decision: "hold",
            label: "Need more data",
            reason: "There is not enough history for this lift yet.",
            action: "Log at least one complete session, then review again.",
            evidence: ["No completed sets found for the selected exercise."],
            confidence: "low"
          };
        }
        const travelAdjusted = current.travelCount > 0;
        const hardWeek = current.averageRpe >= 9;
        const failedMultipleSets = current.failedSets >= 2;
        const performanceDrop = previous && current.bestEstimatedOneRepMax > 0 && current.bestEstimatedOneRepMax < previous.bestEstimatedOneRepMax * 0.92;
        const repeatedFailures = older.filter((week) => week.failedSets > 0 || week.averageRpe >= 9.5).length >= 2 && current.failedSets > 0;
        const flatWeeks = older.length >= 3 && older.every((week) => Math.abs(week.bestEstimatedOneRepMax - current.bestEstimatedOneRepMax) <= current.bestEstimatedOneRepMax * 0.025);
        const evidence = [
          current.completedSets + " completed set" + (current.completedSets === 1 ? "" : "s") + " and " + current.failedSets + " missed set" + (current.failedSets === 1 ? "" : "s") + ".",
          "Average RPE " + (current.averageRpe ? current.averageRpe.toFixed(1) : "not logged") + ".",
          "Best estimated 1RM " + (current.bestEstimatedOneRepMax ? current.bestEstimatedOneRepMax.toFixed(1) : "not available") + ".",
          current.topWeight > 0 ? current.topWeightSetCount + " of " + current.completedSets + " completed sets used the top load of " + current.topWeight + " " + data.settings.weightUnit + "." : "No weighted top load found."
        ];
        if (travelAdjusted) evidence.push("Travel was logged this week, so the recommendation is less punitive for a dip.");
        if (flatWeeks && (hardWeek || repeatedFailures)) {
          return { decision: "change", label: "Consider changing variation", reason: "This lift looks stalled across several recent weeks.", action: "Swap to a close variation for 4-6 weeks, then retest the original lift.", evidence, confidence: "medium" };
        }
        if ((failedMultipleSets || repeatedFailures || performanceDrop) && !travelAdjusted) {
          const target = roundToIncrement(current.topWeight * 0.9, increment);
          return { decision: "deload", label: "Deload", reason: "Recent performance suggests fatigue or an overly aggressive load.", action: "Reduce working weight about 10% next time, aiming near " + target + " " + data.settings.weightUnit + ", and keep 1-3 reps in reserve.", evidence, confidence: "high" };
        }
        if (hardWeek || current.failedSets > 0 || current.completedSets < 3 || travelAdjusted) {
          return { decision: "hold", label: "Hold", reason: travelAdjusted ? "The travel context makes this a good week to repeat before judging progress." : "The work was close enough to the limit that repeating is the cleaner next step.", action: "Repeat the same load and rep target next time; progress only if RPE settles below 9.", evidence, confidence: travelAdjusted ? "medium" : "high" };
        }
        if (current.topWeight > 0 && current.setsBelowTopWeight > 0 && (profile.kind === "isolation" || current.topWeightSetCount < Math.max(2, current.completedSets - 1))) {
          return {
            decision: "hold",
            label: "Consolidate load",
            reason: "Your top set is ahead of your back-off sets, so the next progression is making the current load repeatable.",
            action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " as the top load and work later sets up to that load before adding weight.",
            evidence,
            confidence: "high"
          };
        }
        const canAddLoad = current.topWeight > 0 && current.maxRepsAtTopWeight >= profile.upperRep && current.averageRpeAtTopWeight > 0 && current.averageRpeAtTopWeight <= 8.5;
        const nextWeight = nextLoadForExercise(exerciseName, current.topWeight);
        if (profile.kind === "isolation" && !canAddLoad) {
          const nextReps = Math.min(profile.upperRep, Math.max(profile.lowerRep, current.maxRepsAtTopWeight + 1));
          return { decision: "progress", label: "Progress reps", reason: "You completed the work, but this is an isolation lift where load jumps are large.", action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " and add reps first, targeting about " + nextReps + " reps before increasing load.", evidence, confidence: previous ? "high" : "medium" };
        }
        if (nextWeight === current.topWeight && current.topWeight > 0) {
          const nextReps = Math.min(profile.upperRep, Math.max(profile.lowerRep, current.maxRepsAtTopWeight + 1));
          return { decision: "progress", label: "Progress reps", reason: "The next load jump is too large relative to the current working weight.", action: "Keep " + current.topWeight + " " + data.settings.weightUnit + " and add reps toward " + nextReps + "-" + profile.upperRep + " before increasing load.", evidence, confidence: previous ? "high" : "medium" };
        }
        return { decision: "progress", label: "Progress load", reason: "You completed the work without a high-RPE warning or repeated misses.", action: current.topWeight > 0 ? "Add " + increment + " " + data.settings.weightUnit + " next time, targeting about " + nextWeight + " " + data.settings.weightUnit + "." : "Add reps or a harder bodyweight variation next time.", evidence, confidence: previous ? "high" : "medium" };
      }

      function templateExerciseCount(template) {
        return template.exercises.reduce((sum, exercise) => sum + Number(exercise.sets || 0), 0);
      }

      function researchVolumeTarget() {
        return researchRules.volume[data.settings.trainingStatus] || researchRules.volume.intermediate;
      }

      function goalContext() {
        if (data.settings.goal === "recomposition") return researchRules.recomposition;
        if (data.settings.goal === "cut") return "During a cut, protect performance with high protein, controlled volume, and conservative progression.";
        if (data.settings.goal === "maintain") return "For maintenance, prioritize consistency, sufficient effort, and avoiding unnecessary fatigue.";
        return "For hypertrophy, prioritize enough weekly hard sets, progressive overload, and recovery.";
      }

      function getLastCompletedSet(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        return scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .filter((entry) => !options.excludeSessionId || entry.session.id !== options.excludeSessionId)
          .sort((a, b) => b.session.date.localeCompare(a.session.date))[0];
      }

      function getMostRecentWorkoutSets(exerciseName, options = {}) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const completed = scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .filter((entry) => !options.excludeSessionId || entry.session.id !== options.excludeSessionId)
          .sort((a, b) => b.session.date.localeCompare(a.session.date) || a.set.setNumber - b.set.setNumber);
        const latestSessionId = completed[0]?.session.id;
        return latestSessionId ? completed.filter((entry) => entry.session.id === latestSessionId).map((entry) => entry.set).sort((a, b) => a.setNumber - b.setNumber) : [];
      }

      function coachTargetForTemplateExercise(templateExercise, options = {}) {
        const targetReps = Number(templateExercise.reps || 8);
        const plannedSets = Number(templateExercise.sets || 1);
        const profile = progressionProfileForExercise(templateExercise.name);
        const weeks = summarizeExerciseByWeek(templateExercise.name, options);
        const recommendation = weeks[0] ? recommendForExerciseWeek(templateExercise.name, weeks[0].weekStart, options) : null;
        const recentSets = getMostRecentWorkoutSets(templateExercise.name, options);
        const last = getLastCompletedSet(templateExercise.name, options);
        const increment = profile.increment;
        const recentTop = Math.max(0, ...recentSets.map((set) => set.weight), last?.set?.weight || 0);
        const recentReps = Math.max(0, ...recentSets.map((set) => set.reps), last?.set?.reps || 0);
        const recentRpe = Math.max(0, ...recentSets.map((set) => set.rpe || 0), last?.set?.rpe || 0);
        let sets = plannedSets;
        let reps = Math.max(targetReps, Math.min(profile.upperRep, recentReps || targetReps));
        let weight = recentTop;
        let rpe = 8;
        let reason = "No prior completed sets found. Use a controlled load near RPE 7-8.";

        if (recommendation?.decision === "progress") {
          const loadCandidate = nextLoadForExercise(templateExercise.name, recentTop);
          const shouldAddLoad = profile.kind !== "isolation" && recentTop > 0 && recentReps >= profile.upperRep && recentRpe <= 8.5 && loadCandidate > recentTop;
          if (shouldAddLoad) {
            reason = "Prior work supports a small load increase while staying in the target rep range.";
            weight = loadCandidate;
            reps = Math.max(profile.lowerRep, Math.min(targetReps, profile.upperRep));
          } else {
            reason = profile.kind === "isolation"
              ? "Progress this lift by adding reps first; load jumps are large for isolation work."
              : "Progress by adding reps before taking the next load jump.";
            reps = Math.min(profile.upperRep, Math.max(profile.lowerRep, recentReps + 1, targetReps));
          }
        } else if (recommendation?.decision === "deload") {
          reason = "Recent work suggests fatigue or misses. Reduce load and volume.";
          weight = recentTop > 0 ? roundToIncrement(recentTop * 0.9, increment) : 0;
          sets = Math.max(1, Math.ceil(plannedSets * 0.65));
          reps = Math.max(profile.lowerRep, Math.min(reps, profile.upperRep));
          rpe = 7;
        } else if (recommendation?.decision === "change") {
          reason = "This pattern looks stalled. Consider swapping the lift for 4-6 weeks.";
        } else if (recommendation) {
          reason = "Repeat the target and make it cleaner before adding workload.";
        }

        const weightText = weight > 0 ? weight + " " + data.settings.weightUnit : "bodyweight/control load";
        return {
          decision: recommendation?.decision || "hold",
          sets,
          reps,
          weight,
          rpe,
          weightUnit: data.settings.weightUnit,
          isBodyweight: weight === 0,
          text: "Target " + sets + " x " + reps + " @ " + weightText + ", aim RPE " + rpe + ". " + reason
        };
      }

      function targetText(target, reason) {
        const weightText = target.weight > 0 ? target.weight + " " + (target.weightUnit || data.settings.weightUnit) : "bodyweight/control load";
        return "Target " + target.sets + " x " + target.reps + " @ " + weightText + ", aim RPE " + target.rpe + ". " + reason;
      }

      function exerciseGuidanceFor(name) {
        const key = exerciseKey(name);
        const base = {
          sets: "2-4 hard sets",
          reps: "6-15 reps",
          effort: "RPE 7-9, 1-3 reps in reserve",
          cues: [
            "Use a controlled eccentric and pause if momentum creeps in.",
            "Stop the set when positions break, not when pride says one more.",
            "Progress only after target reps look repeatable and controlled."
          ]
        };
        const patterns = [
          { match: /squat|leg press|lunge|split squat/, sets: "3-5 hard sets", reps: "5-12 reps", cues: ["Brace before the descent and keep pressure through midfoot.", "Let knees track with toes; do not dive-bomb the bottom.", "Use a depth you can repeat without lumbar rounding."] },
          { match: /deadlift|rdl|romanian|hinge|good morning/, sets: "2-4 hard sets", reps: "5-10 reps", cues: ["Start by pushing hips back, not by squatting the weight.", "Keep lats tight and the load close to the body.", "End the set when back position or hamstring tension breaks."] },
          { match: /bench|press|push up|dip|chest/, sets: "3-5 hard sets", reps: "6-12 reps", cues: ["Set shoulder blades before the first rep and keep wrists stacked.", "Lower under control to a consistent touch point or depth.", "Press without bouncing or letting shoulders roll forward."] },
          { match: /row|pulldown|pull up|chin|lat pulldown|\blat\b/, sets: "3-5 hard sets", reps: "6-15 reps", cues: ["Lead with elbows and keep ribs down.", "Pause briefly in the shortened position instead of yanking.", "Control the stretch without losing shoulder position."] },
          { match: /shoulder|overhead|lateral raise|rear delt/, sets: "2-5 hard sets", reps: "8-20 reps", cues: ["Keep ribs stacked and avoid turning it into a low-back lift.", "Use a smooth path and stop before joint irritation.", "For raises, chase tension and control rather than load."] },
          { match: /curl|tricep|extension|pushdown|skull/, sets: "2-4 hard sets", reps: "8-20 reps", cues: ["Pin the upper arm and move through the elbow.", "Use full range you can control without swinging.", "Add reps before load when jumps are large."] },
          { match: /calf/, sets: "3-5 hard sets", reps: "8-20 reps", cues: ["Use a full stretch and hard top contraction.", "Pause instead of bouncing through the ankle.", "Keep reps consistent before adding load."] },
          { match: /plank|crunch|leg raise|hanging raise|knee raise|ab|core/, sets: "2-4 hard sets", reps: "8-20 reps or timed sets", cues: ["Brace as if resisting motion, not just chasing burn.", "Keep pelvis controlled and avoid low-back takeover.", "Make the range harder before making it sloppy."] }
        ];
        const found = patterns.find((item) => item.match.test(key));
        return found ? { ...base, ...found } : base;
      }

      function renderExerciseGuidance(exercise) {
        const guidance = exerciseGuidanceFor(exercise.name);
        return `
          <div class="exercise-guidance">
            <strong>Execution target</strong>
            <div class="guidance-grid">
              <div class="guidance-pill"><span>Sets</span><b>${escapeHtml(guidance.sets)}</b></div>
              <div class="guidance-pill"><span>Reps</span><b>${escapeHtml(guidance.reps)}</b></div>
              <div class="guidance-pill"><span>Effort</span><b>${escapeHtml(guidance.effort)}</b></div>
            </div>
            <ul class="cue-list">${guidance.cues.map((cue) => "<li>" + escapeHtml(cue) + "</li>").join("")}</ul>
          </div>
        `;
      }

      function recoverySessionLabel(recoveryAdvice, hasHistory) {
        if (recoveryAdvice?.decision === "rest") return "Session target: recovery / technique only";
        if (recoveryAdvice?.decision === "deload") return "Session target: deload";
        if (recoveryAdvice?.decision === "hold") return hasHistory ? "Session target: hold the plan" : "Session target: establish baseline";
        return hasHistory ? "Session target: progressive overload" : "Session target: establish baseline";
      }

      function recoverySessionDetail(recoveryAdvice) {
        if (recoveryAdvice?.decision === "rest") return "Today's readiness is low enough that hard loading is not the target. Rest is preferred; if you train, use reduced volume, reduced load, and technique-focused sets.";
        if (recoveryAdvice?.decision === "deload") return "Today's readiness is below your normal band. Use the plan as a structure, but reduce load 10-15%, reduce volume 30-50%, and keep effort around RPE 6-7.";
        if (recoveryAdvice?.decision === "hold") return "Today's readiness is inside your normal band. Train the plan as written and do not change load just because of normal day-to-day fluctuation.";
        if (recoveryAdvice?.decision === "progress") return "Today's readiness is above your normal band. You may take planned progressions if warmups move normally, but do not force a max.";
        return "";
      }

      function recommendForTemplate(template, recoveryAdvice, options = {}) {
        if (!template || template.exercises.length === 0) {
          return { label: "Build the plan first", detail: "Add exercises, sets, and target reps before starting this template.", items: [] };
        }
        const items = template.exercises.map((exercise) => {
          const target = recoveryAdvice ? adjustTargetForRecovery(coachTargetForTemplateExercise(exercise, options), recoveryAdvice) : coachTargetForTemplateExercise(exercise, options);
          return { name: exercise.name, text: target.text };
        });
        const totalSets = templateExerciseCount(template);
        const hasHistory = items.some((item) => getLastCompletedSet(item.name, options));
        const label = recoverySessionLabel(recoveryAdvice, hasHistory);
        const baseDetail = hasHistory
          ? "Use prior performance first. " + researchRules.progression + " " + goalContext()
          : "No prior completed sets found for this template. Use controlled sets near RPE 7-8, then let future sessions drive progression. " + goalContext();
        const recoveryDetail = recoverySessionDetail(recoveryAdvice);
        const detail = recoveryDetail ? recoveryDetail + " " + baseDetail : baseDetail;
        const context = " Research target: " + researchVolumeTarget() + ". " + researchRules.rest + " " + researchRules.protein;
        return { label, detail: detail + " Planned volume: " + totalSets + " working sets." + context, items };
      }

      function createTemplateFromSession(sessionId) {
        const session = data.sessions.find((item) => item.id === sessionId);
        if (!session) return null;
        const exercises = data.exercises
          .filter((exercise) => exercise.sessionId === session.id)
          .sort((a, b) => a.order - b.order)
          .map((exercise) => {
            const sets = setsForExercise(exercise.id);
            return {
              id: id(),
              name: exercise.name || "Exercise",
              sets: Math.max(sets.length, 1),
              reps: sets[0]?.reps || 8
            };
          });
        return { id: id(), name: (session.title || "Workout") + " Template", notes: "", exercises, createdAt: isoNow(), updatedAt: isoNow() };
      }

      function render() {
        const session = activeSession();
        if (!session) {
          root.innerHTML = '<div class="loading">Loading your training log...</div>';
          return;
        }
        root.innerHTML = `
          <div class="app-shell">
            <header class="brand-bar">
              <div class="brand-mark">CF</div>
              <div class="brand-title">Comprehensive <span>Fitness</span></div>
              <div class="brand-action">${data.settings.weightUnit.toUpperCase()}</div>
              <button class="theme-toggle" type="button" data-action="toggle-theme" title="Toggle light and dark theme">${themeLabel()}</button>
            </header>
            <main class="app-main">${renderView()}</main>
            <nav class="bottom-nav" aria-label="Main navigation">
              ${navButton("workout", "Workout")}
              ${navButton("dashboard", "Dashboard")}
              ${navButton("templates", "Templates")}
              ${navButton("review", "Charts")}
              ${navButton("settings", "Settings")}
            </nav>
          </div>
        `;
      }

      function navButton(target, label) {
        return '<button class="nav-button ' + (view === target ? "active" : "") + '" data-action="set-view" data-view="' + target + '" type="button"><span class="nav-icon">' + icon[target] + '</span><span>' + label + '</span></button>';
      }

      function renderView() {
        if (view === "dashboard") return renderDashboard();
        if (view === "templates") return renderTemplates();
        if (view === "review") return renderReview();
        if (view === "settings") return renderSettings();
        return renderWorkout();
      }

      function renderWorkout() {
        const session = activeSession();
        return `
          <section class="view">
            <div>
              <div class="section-kicker">Today's workout</div>
              <h1>Training log</h1>
            </div>
            ${renderQuickStartTemplates()}
            ${renderTodayPlan()}
            <div class="session-header">
              <div class="row split">
                <select data-action="change-session" aria-label="Workout session">
                  ${workoutSessionOptions(session).map((item) => '<option value="' + item.id + '" ' + (item.id === session.id ? "selected" : "") + '>' + escapeHtml(item.title) + " - " + item.date + '</option>').join("")}
                </select>
                <button class="icon-button" type="button" data-action="new-session" title="New workout">${icon.add}</button>
              </div>
              <div class="grid two">
                <input value="${escapeHtml(session.title)}" data-action="session-title" aria-label="Workout title" />
                <input type="date" value="${session.date}" data-action="session-date" aria-label="Workout date" />
              </div>
              <label class="toggle-line"><input type="checkbox" data-action="session-travel" ${session.isTravel ? "checked" : ""} />Travel session</label>
              <textarea data-action="session-notes" placeholder="Session notes" aria-label="Session notes">${escapeHtml(session.notes)}</textarea>
            </div>
            ${renderRecoveryPanel(session)}
            ${renderActiveWorkoutAdvice()}
            ${activeExercises().map(renderExercise).join("")}
            <div class="inline-panel">
              <h2>Add exercise</h2>
              <div class="row">
                <input value="${escapeHtml(addExerciseDraft)}" data-action="add-exercise-draft" placeholder="Exercise name" aria-label="New exercise name" />
                <button class="icon-button" type="button" data-action="add-exercise" title="Add exercise">${icon.add}</button>
              </div>
            </div>
            <button class="secondary-action" type="button" data-action="save-template">Save workout as template</button>
            ${renderTimer()}
          </section>
        `;
      }

      function renderTodayPlan() {
        const session = activeSession();
        const exercises = activeExercises();
        const readiness = recoveryRecommendationForSession(session);
        if (!exercises.length) {
          return `
            <article class="workout-advice">
              <h2>Today's plan</h2>
              <p class="advice-detail">Pick a template above to load exact lifts, target loads, reps, RPE, and rest times. If you build manually, the plan fills in as you add exercises.</p>
            </article>
          `;
        }
        return `
          <article class="workout-advice">
            <div class="row split">
              <h2>Today's plan</h2>
              <span class="status-pill ${readiness.band?.outside ? readiness.band.direction : "inside"}">${readiness.band?.outside ? readiness.band.direction + " band" : "inside band"}</span>
            </div>
            <p class="advice-detail">${escapeHtml(readiness.action)}</p>
            <div class="plan-list">
              ${exercises.map((exercise) => {
                const sets = setsForExercise(exercise.id);
                const first = sets[0] || createSet(exercise.id, 1);
                const loadText = first.weight > 0 ? first.weight + " " + (first.weightUnit || data.settings.weightUnit) : "BW/control";
                return `
                  <div class="plan-card">
                    <header><strong>${escapeHtml(exercise.name)}</strong><span class="status-pill" data-plan-count="${exercise.id}">${sets.length} sets</span></header>
                    <div class="plan-targets">
                      <span data-plan-reps="${exercise.id}">${sets.length || 1} x ${first.reps || 0}</span>
                      <span data-plan-load="${exercise.id}">${escapeHtml(loadText)}</span>
                      <span data-plan-rest="${exercise.id}">${data.settings.defaultRestSeconds}s rest</span>
                    </div>
                    <div class="plan-meta" data-plan-meta="${exercise.id}">Aim RPE ${first.rpe || 8}. ${escapeHtml(exercise.notes || "Use clean reps and stop when positions break.")}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </article>
        `;
      }

      function renderDashboard() {
        const volumes = weeklyMuscleVolume();
        const flags = fatigueFlags();
        return `
          <section class="view">
            <div>
              <div class="section-kicker">Dashboard</div>
              <h1>Volume and fatigue</h1>
            </div>
            <article class="workout-advice">
              <h2>Weekly muscle volume</h2>
              <p class="advice-detail">Completed hard sets are mapped to muscle groups. Target range adjusts with your training status.</p>
              <div class="dashboard-grid">
                ${volumes.map((bucket) => {
                  const max = Math.max(bucket.targetHigh, bucket.sets, 1);
                  const meter = Math.min(100, Math.round((bucket.sets / max) * 100));
                  const label = bucket.status === "low" ? "below target" : bucket.status === "over" ? "above target" : "in range";
                  const expanded = expandedVolumeMuscle === bucket.muscle;
                  return `
                    <button class="volume-card" type="button" data-action="toggle-volume-muscle" data-muscle="${escapeHtml(bucket.muscle)}" aria-expanded="${expanded ? "true" : "false"}">
                      <header><strong>${bucket.muscle}</strong><span class="status-pill ${bucket.status}">${label}</span></header>
                      <div class="meter" style="--meter:${meter}%"><span></span></div>
                      <small>${bucket.sets.toFixed(bucket.sets % 1 ? 1 : 0)} sets this week. Target ${bucket.targetLow}-${bucket.targetHigh}. ${bucket.exerciseCount || 0} tracked exercises.</small>
                      ${expanded ? renderVolumeDetails(bucket) : ""}
                    </button>
                  `;
                }).join("")}
              </div>
            </article>
            <article class="workout-advice">
              <h2>Fatigue flags</h2>
              ${flags.length ? '<div class="flag-list">' + flags.map((flag) => '<div class="flag-card ' + flag.level + '"><strong>' + escapeHtml(flag.scope + ": " + flag.name) + '</strong><span>' + escapeHtml(flag.reason) + '</span></div>').join("") + '</div>' : '<div class="empty-state">No fatigue flags right now. This can be true even when recovery is low; lift and muscle flags are based on training history.</div>'}
            </article>
            <article class="workout-advice">
              <h2>Recent history</h2>
              ${renderRecentSessions()}
            </article>
          </section>
        `;
      }

      function renderVolumeDetails(bucket) {
        if (!bucket.details.length) return '<div class="volume-detail empty">No completed sets mapped to this muscle this week.</div>';
        return `
          <div class="volume-detail">
            ${bucket.details.map((detail) => `
              <div>
                <strong>${escapeHtml(detail.name)}</strong>
                <span>${detail.sets.toFixed(detail.sets % 1 ? 1 : 0)} set${detail.sets === 1 ? "" : "s"} - ${escapeHtml(detail.sessions.join(", "))} - ${escapeHtml(detail.dates.join(", "))}</span>
              </div>
            `).join("")}
          </div>
        `;
      }

      function renderRecentSessions() {
        const sessions = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
        if (!sessions.length) return '<div class="empty-state">No saved workouts yet.</div>';
        return '<div class="flag-list">' + sessions.map((session) => {
          const exercises = data.exercises.filter((exercise) => exercise.sessionId === session.id);
          return '<button class="session-card" type="button" data-action="open-session" data-session-id="' + session.id + '"><div class="row split"><strong>' + escapeHtml(session.title || "Workout") + '</strong><span>' + formatDate(session.date) + '</span></div><small>' + escapeHtml(exercises.map((exercise) => exercise.name).join(", ") || "No exercises yet") + '</small></button>';
        }).join("") + '</div>';
      }

      function renderRecoveryPanel(session) {
        const recovery = sessionRecovery(session);
        const advice = recoveryRecommendationForSession(session);
        const band = advice.band || readinessBandStatus(session);
        return `
          <article class="recovery-panel">
            <div class="row split">
              <h2>Recovery readiness</h2>
              <span class="section-kicker">Today</span>
            </div>
            <div class="recovery-status ${advice.decision}">
              <strong>${escapeHtml(advice.label)}</strong>
              <span>${escapeHtml(advice.action)}</span>
              <span>${escapeHtml(advice.evidence.slice(0, 2).join(" "))}</span>
            </div>
            <div class="rule-card">
              Baseline readiness is ${band.center}. Normal band is ${band.center - band.band}-${band.center + band.band}. Today is ${band.score}, ${band.outside ? "outside" : "inside"} the band. Normal fluctuation keeps the plan unchanged; low outside-band days reduce work, and high outside-band days may allow progression.
            </div>
            <div class="recovery-inputs">
              <label>Sleep hours<input type="number" min="0" max="14" step="0.25" value="${escapeHtml(recovery.sleepHours)}" data-action="recovery-sleep-hours" /></label>
              <label>Sleep quality<select data-action="recovery-sleep-quality"><option value="">-</option>${[1,2,3,4,5].map((value) => '<option value="' + value + '" ' + (String(recovery.sleepQuality) === String(value) ? "selected" : "") + '>' + value + '/5</option>').join("")}</select></label>
              <label>HRV<input type="number" min="0" step="1" value="${escapeHtml(recovery.hrv)}" data-action="recovery-hrv" /></label>
              <label>Resting HR<input type="number" min="0" step="1" value="${escapeHtml(recovery.restingHr)}" data-action="recovery-resting-hr" /></label>
              <label>Soreness<select data-action="recovery-soreness"><option value="">-</option>${[1,2,3,4,5].map((value) => '<option value="' + value + '" ' + (String(recovery.soreness) === String(value) ? "selected" : "") + '>' + value + '/5</option>').join("")}</select></label>
              <label>Stress<select data-action="recovery-stress"><option value="">-</option>${[1,2,3,4,5].map((value) => '<option value="' + value + '" ' + (String(recovery.stress) === String(value) ? "selected" : "") + '>' + value + '/5</option>').join("")}</select></label>
              <label>Energy<select data-action="recovery-energy"><option value="">-</option>${[1,2,3,4,5].map((value) => '<option value="' + value + '" ' + (String(recovery.energy) === String(value) ? "selected" : "") + '>' + value + '/5</option>').join("")}</select></label>
              <label class="toggle-line"><input type="checkbox" data-action="recovery-outside-band" ${recovery.outsideBand ? "checked" : ""} />Mark outside band</label>
              <label class="toggle-line"><input type="checkbox" data-action="recovery-illness" ${recovery.illness ? "checked" : ""} />Illness or unusual pain</label>
            </div>
            <textarea data-action="recovery-outside-note" placeholder="Outside-band note, if today is meaningfully different" aria-label="Outside readiness band note">${escapeHtml(recovery.outsideBandNote)}</textarea>
          </article>
        `;
      }

      function renderQuickStartTemplates() {
        if (!data.templates.length) return "";
        const templates = data.templates.slice(0, 4);
        const recoveryAdvice = recoveryRecommendationForSession(activeSession());
        return `
          <div class="quick-template-strip">
            <div class="section-kicker">Start from template</div>
            <div class="quick-template-list">
              ${templates.map((template) => {
                const advice = recommendForTemplate(template, recoveryAdvice, { excludeSessionId: activeSession()?.id });
                const firstItem = advice.items[0]?.text || advice.detail;
                return `
                  <button class="quick-template-card" type="button" data-action="start-template" data-template-id="${template.id}">
                    <strong>${escapeHtml(template.name)}</strong>
                    <small>${template.exercises.length} exercises - ${templateExerciseCount(template)} working sets</small>
                    <span>${escapeHtml(firstItem)}</span>
                  </button>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      function renderActiveWorkoutAdvice() {
        const session = activeSession();
        if (!session?.templateId) return "";
        const template = data.templates.find((item) => item.id === session.templateId);
        if (!template) return "";
        return renderWorkoutAdvice(recommendForTemplate(template, recoveryRecommendationForSession(session), { excludeSessionId: session.id }));
      }

      function renderExercise(exercise) {
        return `
          <article class="exercise-card">
            <div class="row split">
              <input class="exercise-name" value="${escapeHtml(exercise.name)}" data-action="exercise-name" data-exercise-id="${exercise.id}" aria-label="Exercise name" />
              <div class="row">
                <button class="icon-button" type="button" data-action="move-exercise" data-direction="-1" data-exercise-id="${exercise.id}" title="Move exercise up">Up</button>
                <button class="icon-button" type="button" data-action="move-exercise" data-direction="1" data-exercise-id="${exercise.id}" title="Move exercise down">Dn</button>
                <button class="icon-button danger" type="button" data-action="delete-exercise" data-exercise-id="${exercise.id}" title="Delete exercise">${icon.delete}</button>
              </div>
            </div>
            <div class="set-head"><span>Set</span><span>Reps</span><span>Load</span><span>RPE</span><span>Done</span></div>
            ${setsForExercise(exercise.id).map(renderSet).join("")}
            <div class="row wrap">
              <button type="button" data-action="add-set" data-exercise-id="${exercise.id}">${icon.add} Set</button>
              <button type="button" data-action="duplicate-set" data-exercise-id="${exercise.id}">${icon.duplicate} Duplicate</button>
              <button type="button" data-action="start-timer" data-exercise-id="${exercise.id}">${icon.clock}</button>
            </div>
            ${renderExerciseGuidance(exercise)}
            <textarea data-action="exercise-notes" data-exercise-id="${exercise.id}" placeholder="Exercise notes" aria-label="Exercise notes">${escapeHtml(exercise.notes)}</textarea>
          </article>
        `;
      }

      function renderSet(set) {
        return `
          <div class="set-row">
            <strong>${set.setNumber}</strong>
            <input type="number" min="0" value="${set.reps}" data-action="set-reps" data-set-id="${set.id}" aria-label="Reps" />
            <input type="number" min="0" value="${set.weight}" data-action="set-weight" data-set-id="${set.id}" aria-label="Weight" />
            <input type="number" min="0" max="10" step="0.5" value="${set.rpe}" data-action="set-rpe" data-set-id="${set.id}" aria-label="RPE" />
            <button class="check-button ${set.completed ? "checked" : ""}" type="button" data-action="toggle-set" data-set-id="${set.id}" title="Toggle completed">${icon.done}</button>
            <label class="bodyweight"><input type="checkbox" data-action="set-bodyweight" data-set-id="${set.id}" ${set.isBodyweight ? "checked" : ""} />BW</label>
            <button class="mini-button" type="button" data-action="delete-set" data-set-id="${set.id}">Remove</button>
          </div>
        `;
      }

      function renderTimer() {
        if (!timer) return "";
        return `
          <div class="timer-bar ${timer.remainingSeconds === 0 ? "complete" : ""}">
            <div><strong>${formatTimer(timer.remainingSeconds)}</strong><span>Rest timer</span></div>
            <button class="icon-button" type="button" data-action="toggle-timer">${timer.isPaused ? icon.play : icon.pause}</button>
            <button class="icon-button" type="button" data-action="clear-timer">${icon.delete}</button>
          </div>
        `;
      }

      function renderWorkoutAdvice(advice) {
        return `
          <article class="workout-advice">
            <h2>${escapeHtml(advice.label)}</h2>
            <p class="advice-detail">${escapeHtml(advice.detail)}</p>
            ${advice.items.length ? '<ul class="advice-list">' + advice.items.map((item) => '<li><strong>' + escapeHtml(item.name) + '</strong><span>' + escapeHtml(item.text) + '</span></li>').join("") + '</ul>' : ""}
          </article>
        `;
      }

      function renderTemplates() {
        return `
          <section class="view">
            <h1>Templates</h1>
            <div class="inline-panel">
              <h2>New template</h2>
              <div class="inline-actions">
                <button type="button" data-action="new-template">Blank template</button>
                <button type="button" data-action="save-template">Use current workout</button>
              </div>
            </div>
            ${data.templates.length ? data.templates.map(renderTemplateCard).join("") : '<div class="empty-state">Create a leg day, push day, pull day, or any repeatable workout. Templates store exercises, sets, and target reps; you fill in weights during the workout.</div>'}
          </section>
        `;
      }

      function renderTemplateCard(template) {
        const advice = recommendForTemplate(template, recoveryRecommendationForSession(activeSession()), { excludeSessionId: activeSession()?.id });
        const confirmingDelete = pendingDeleteTemplateId === template.id;
        return `
          <article class="template-card">
            <div class="row split">
              <input class="exercise-name" value="${escapeHtml(template.name)}" data-action="template-name" data-template-id="${template.id}" aria-label="Template name" />
              ${confirmingDelete
                ? '<div class="row"><button class="mini-button danger" type="button" data-action="confirm-delete-template" data-template-id="' + template.id + '">Delete?</button><button class="mini-button" type="button" data-action="cancel-delete-template">Cancel</button></div>'
                : '<button class="icon-button danger" type="button" data-action="request-delete-template" data-template-id="' + template.id + '" title="Delete template">' + icon.delete + '</button>'}
            </div>
            <small>${template.exercises.length} exercises - ${templateExerciseCount(template)} working sets</small>
            ${renderWorkoutAdvice(advice)}
            <ul class="template-list">
              ${template.exercises.map((exercise) => `
                <li>
                  <input value="${escapeHtml(exercise.name)}" data-action="template-exercise-name" data-template-id="${template.id}" data-template-exercise-id="${exercise.id}" aria-label="Template exercise name" />
                  <div class="grid two">
                    <label class="template-meta">Sets<input type="number" min="1" value="${exercise.sets}" data-action="template-exercise-sets" data-template-id="${template.id}" data-template-exercise-id="${exercise.id}" /></label>
                    <label class="template-meta">Reps<input type="number" min="1" value="${exercise.reps}" data-action="template-exercise-reps" data-template-id="${template.id}" data-template-exercise-id="${exercise.id}" /></label>
                  </div>
                  <button class="mini-button danger" type="button" data-action="delete-template-exercise" data-template-id="${template.id}" data-template-exercise-id="${exercise.id}">Remove exercise</button>
                </li>
              `).join("")}
            </ul>
            <div class="inline-actions">
              <button type="button" data-action="add-template-exercise" data-template-id="${template.id}">${icon.add} Exercise</button>
              <button class="primary-action" type="button" data-action="start-template" data-template-id="${template.id}">Start workout</button>
            </div>
          </article>
        `;
      }
