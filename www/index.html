<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track strength workouts, rest timers, travel sessions, and transparent lift progression guidance." />
    <meta name="theme-color" content="#090d0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Comprehensive Fitness" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/resources/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/resources/icon-192.png" />
    <title>Comprehensive Fitness</title>
    <style>
      :root {
        --bg: #090d0e;
        --bg-soft: #0f1516;
        --panel: #151b1d;
        --panel-2: #1b2325;
        --panel-3: #20292b;
        --line: #2d383b;
        --line-strong: #3c4b4f;
        --text: #f4f7f2;
        --muted: #a9b2ae;
        --muted-2: #77827e;
        --green: #4aa3ff;
        --green-2: #9fd0ff;
        --green-dark: #162b46;
        --amber: #ffb12b;
        --red: #ff7f6b;
        --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      html { background: var(--bg); }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(19, 26, 27, 0.96), rgba(9, 13, 14, 1) 34%),
          var(--bg);
      }

      button, input, select, textarea { font: inherit; }

      button {
        align-items: center;
        background: linear-gradient(180deg, #222c2f, #182022);
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
        transition: border-color 140ms ease, color 140ms ease, transform 140ms ease, background 140ms ease;
      }

      button:hover { border-color: var(--green); }
      button:active { transform: translateY(1px); }

      input, select, textarea {
        background: #0f1516;
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        min-height: 48px;
        padding: 12px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus, button:focus-visible {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(74, 163, 255, 0.22);
        outline: none;
      }

      input[type="number"] {
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      h1, h2, p { margin-top: 0; }
      h1 {
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        letter-spacing: 0;
        margin-bottom: 2px;
      }
      h2 { letter-spacing: 0; }

      .app-shell {
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding-bottom: 104px;
      }

      .brand-bar {
        align-items: center;
        border-bottom: 1px solid rgba(60, 75, 79, 0.7);
        display: grid;
        gap: 12px;
        grid-template-columns: auto 1fr auto;
        margin: 0 14px;
        min-height: 76px;
        padding: max(14px, env(safe-area-inset-top)) 0 14px;
      }

      .brand-mark {
        align-items: center;
        background: linear-gradient(180deg, var(--green-2), var(--green));
        border-radius: 12px;
        color: #0b110d;
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 1000;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .brand-title {
        display: grid;
        font-size: 0.92rem;
        font-weight: 1000;
        letter-spacing: 0.03em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .brand-title span {
        color: var(--green);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
      }

      .brand-action {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--green);
        display: inline-flex;
        font-weight: 1000;
        gap: 6px;
        min-height: 38px;
        padding: 0 12px;
      }

      .app-main { padding: 16px 14px 0; }
      .loading, .empty-state {
        color: var(--muted);
        padding: 24px;
      }

      .empty-state {
        background: var(--panel);
        border: 1px dashed var(--line-strong);
        border-radius: 16px;
      }

      .view { display: grid; gap: 16px; }

      .section-kicker {
        color: var(--green);
        font-size: 0.76rem;
        font-weight: 1000;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .session-header {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.96), rgba(18, 24, 25, 0.96));
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .split { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .grid { display: grid; gap: 10px; }
      .two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

      .toggle-line, .bodyweight {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 0.92rem;
        font-weight: 800;
        gap: 9px;
      }

      .toggle-line input, .bodyweight input {
        accent-color: var(--green);
        height: 22px;
        min-height: 22px;
        width: 22px;
      }

      .exercise-card, .settings-panel, .recommendation, .template-card, .inline-panel, .workout-advice {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.98), rgba(16, 22, 23, 0.98));
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .exercise-card {
        gap: 14px;
        overflow: hidden;
      }

      .exercise-guidance {
        background: rgba(10, 18, 28, 0.64);
        border: 1px solid rgba(74, 163, 255, 0.24);
        border-radius: 14px;
        color: var(--muted);
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .exercise-guidance strong {
        color: var(--green-2);
        font-size: 0.92rem;
      }

      .guidance-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      }

      .guidance-pill {
        background: rgba(15, 21, 22, 0.82);
        border: 1px solid var(--line);
        border-radius: 12px;
        display: grid;
        gap: 3px;
        padding: 9px;
      }

      .guidance-pill span {
        color: var(--muted-2);
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .guidance-pill b {
        color: var(--text);
        font-size: 0.92rem;
      }

      .cue-list {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .exercise-name {
        background: transparent;
        border-color: transparent;
        font-size: 1.08rem;
        font-weight: 1000;
        padding-left: 0;
      }

      .exercise-name:focus { background: #0f1516; padding-left: 12px; }

      .icon-button {
        aspect-ratio: 1;
        justify-content: center;
        min-width: 48px;
        padding: 8px;
        width: 48px;
      }

      .danger, .danger-button {
        border-color: rgba(255, 127, 107, 0.46);
        color: #ffc3b8;
      }

      .set-head, .set-row, .trend-head, .trend-row {
        align-items: center;
        display: grid;
        gap: 7px;
      }

      .set-head, .set-row {
        grid-template-columns: 36px minmax(56px, 1fr) minmax(76px, 1.35fr) minmax(56px, 1fr) 48px;
      }

      .set-head, .trend-head {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .set-row {
        background: rgba(9, 13, 14, 0.58);
        border: 1px solid rgba(45, 56, 59, 0.85);
        border-radius: 14px;
        padding: 8px;
      }

      .set-row strong {
        color: var(--green);
        font-size: 1.1rem;
        text-align: center;
      }

      .set-row input {
        border-radius: 10px;
        min-height: 46px;
        padding: 8px;
      }

      .set-row .bodyweight, .set-row .mini-button { grid-column: span 2; }

      .mini-button {
        color: var(--muted);
        font-size: 0.82rem;
        min-height: 38px;
        padding: 8px 10px;
      }

      .check-button {
        aspect-ratio: 1;
        border-radius: 999px;
        color: var(--muted-2);
        justify-content: center;
        min-height: 44px;
        padding: 6px;
      }

      .check-button.checked {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      .primary-action {
        background: linear-gradient(180deg, var(--green-2), var(--green));
        border-color: var(--green);
        box-shadow: 0 14px 28px rgba(74, 163, 255, 0.2);
        color: #10160f;
        font-size: 1rem;
        font-weight: 1000;
        justify-content: center;
        min-height: 58px;
        text-transform: uppercase;
      }

      .secondary-action {
        color: var(--green);
        justify-content: center;
      }

      .template-card { text-align: left; }

      .template-card h2,
      .workout-advice h2,
      .inline-panel h2 {
        font-size: 1.12rem;
        margin: 0;
      }

      .workout-advice {
        border-color: rgba(74, 163, 255, 0.58);
      }

      .workout-advice h2 {
        color: var(--green-2);
        font-size: 1.28rem;
      }

      .recovery-panel {
        background: linear-gradient(180deg, rgba(18, 34, 55, 0.96), rgba(16, 22, 23, 0.98));
        border: 1px solid rgba(74, 163, 255, 0.42);
        border-radius: 18px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .recovery-panel h2 {
        margin: 0;
      }

      .recovery-status {
        border-radius: 14px;
        display: grid;
        gap: 5px;
        padding: 11px;
      }

      .recovery-status.progress { background: rgba(74, 163, 255, 0.14); border: 1px solid rgba(74, 163, 255, 0.5); }
      .recovery-status.hold { background: rgba(255, 177, 43, 0.12); border: 1px solid rgba(255, 177, 43, 0.46); }
      .recovery-status.deload, .recovery-status.rest { background: rgba(255, 127, 107, 0.12); border: 1px solid rgba(255, 127, 107, 0.46); }

      .recovery-status strong {
        color: var(--text);
      }

      .recovery-status span {
        color: var(--muted);
        line-height: 1.4;
      }

      .recovery-inputs {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
      }

      .recovery-inputs label {
        color: var(--muted);
        display: grid;
        font-size: 0.82rem;
        font-weight: 800;
        gap: 5px;
      }

      .dashboard-grid,
      .plan-list,
      .flag-list,
      .chart-list {
        display: grid;
        gap: 10px;
      }

      .volume-card,
      .plan-card,
      .flag-card,
      .chart-card,
      .rule-card {
        background: rgba(9, 13, 14, 0.55);
        border: 1px solid rgba(45, 56, 59, 0.82);
        border-radius: 14px;
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .volume-card header,
      .plan-card header,
      .chart-card header {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .status-pill {
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 1000;
        padding: 4px 8px;
        text-transform: uppercase;
      }

      .status-pill.low,
      .status-pill.caution,
      .flag-card.caution { border-color: var(--amber); color: #ffd899; }
      .status-pill.high,
      .status-pill.over,
      .flag-card.over { border-color: var(--red); color: #ffc3b8; }
      .status-pill.good,
      .status-pill.inside,
      .flag-card.good { border-color: var(--green); color: var(--green-2); }

      .meter {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
      }

      .meter span {
        background: linear-gradient(90deg, var(--green), var(--green-2));
        display: block;
        height: 100%;
        width: var(--meter, 0%);
      }

      .plan-meta,
      .flag-card span,
      .chart-card small,
      .rule-card {
        color: var(--muted);
        line-height: 1.4;
      }

      .plan-targets {
        display: grid;
        gap: 7px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .plan-targets span {
        background: rgba(15, 21, 22, 0.9);
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 900;
        padding: 8px;
        text-align: center;
      }

      .chart-svg {
        background: rgba(15, 21, 22, 0.72);
        border: 1px solid var(--line);
        border-radius: 12px;
        height: 132px;
        overflow: hidden;
        width: 100%;
      }

      .chart-svg svg {
        display: block;
        height: 100%;
        width: 100%;
      }

      .quick-template-strip {
        display: grid;
        gap: 10px;
      }

      .quick-template-list {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      }

      .quick-template-card {
        align-items: stretch;
        background: linear-gradient(180deg, rgba(22, 43, 70, 0.94), rgba(18, 24, 25, 0.98));
        border-color: rgba(74, 163, 255, 0.5);
        border-radius: 18px;
        display: grid;
        gap: 7px;
        min-height: 126px;
        padding: 13px;
        text-align: left;
      }

      .quick-template-card strong {
        color: var(--text);
        font-size: 1rem;
      }

      .quick-template-card small,
      .quick-template-card span {
        color: var(--muted);
        line-height: 1.35;
      }

      .quick-template-card span {
        color: #d7eaff;
        font-size: 0.86rem;
      }

      .template-meta,
      .advice-detail,
      .template-card small {
        color: var(--muted);
      }

      .advice-detail {
        line-height: 1.45;
        margin: 0;
      }

      .template-list,
      .advice-list {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 0;
      }

      .template-list li,
      .advice-list li {
        background: rgba(9, 13, 14, 0.55);
        border: 1px solid rgba(45, 56, 59, 0.82);
        border-radius: 14px;
        display: grid;
        gap: 6px;
        list-style: none;
        padding: 11px;
      }

      .advice-list strong { color: var(--text); }
      .advice-list span { color: var(--muted); line-height: 1.4; }

      .inline-panel {
        border-color: rgba(74, 163, 255, 0.56);
      }

      .inline-actions {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .export-box {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        min-height: 180px;
      }

      .timer-bar {
        align-items: center;
        background: linear-gradient(180deg, rgba(73, 47, 10, 0.96), rgba(37, 26, 11, 0.98));
        border: 1px solid rgba(255, 177, 43, 0.78);
        border-radius: 18px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 48px 48px;
        left: 14px;
        margin: 0 auto;
        max-width: 892px;
        padding: 12px;
        position: fixed;
        right: 14px;
        z-index: 5;
      }

      .timer-bar strong {
        color: var(--amber);
        display: block;
        font-size: 1.75rem;
        line-height: 1;
      }

      .timer-bar span {
        color: #ffd899;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .timer-bar.complete { border-color: var(--green); }

      .session-card {
        align-items: stretch;
        border-radius: 18px;
        display: grid;
        gap: 7px;
        text-align: left;
      }

      .session-card p, .session-card small {
        color: var(--muted);
        margin: 0;
      }

      .recommendation span {
        background: rgba(244, 247, 242, 0.95);
        border-radius: 999px;
        color: #111715;
        font-size: 0.76rem;
        font-weight: 900;
        justify-self: start;
        padding: 5px 9px;
      }

      .recommendation h2 { margin: 0; }
      .recommendation p { color: var(--muted); margin: 0; }
      .recommendation strong { color: var(--text); line-height: 1.35; }
      .recommendation ul { color: #d7ded8; margin: 0; padding-left: 18px; }
      .recommendation.progress { border-color: var(--green); }
      .recommendation.hold { border-color: var(--amber); }
      .recommendation.deload, .recommendation.change { border-color: var(--red); }

      .trend-table {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.98), rgba(16, 22, 23, 0.98));
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
      }

      .trend-head, .trend-row {
        grid-template-columns: 1.55fr 0.7fr 0.7fr 0.65fr;
        padding: 11px;
      }

      .trend-row {
        border-top: 1px solid var(--line);
        color: #d9dfdb;
      }

      .settings-panel label {
        color: #d7ded8;
        display: grid;
        gap: 7px;
      }

      .settings-note,
      .settings-links {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
        margin: 0;
      }

      .settings-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .settings-links a { color: var(--green); }

      .import-button {
        align-items: center;
        background: linear-gradient(180deg, #222c2f, #182022);
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        cursor: pointer;
        display: inline-flex;
        flex-direction: row;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
      }

      .import-button input { display: none; }

      .bottom-nav {
        background: rgba(11, 15, 16, 0.96);
        border-top: 1px solid rgba(60, 75, 79, 0.86);
        bottom: 0;
        display: grid;
        gap: 4px;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        left: 0;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        position: fixed;
        right: 0;
        z-index: 4;
      }

      .nav-button {
        background: transparent;
        border-color: transparent;
        border-radius: 14px;
        color: var(--muted);
        flex-direction: column;
        font-size: 0.68rem;
        font-weight: 900;
        gap: 3px;
        justify-content: center;
        min-height: 64px;
        padding: 7px 4px;
      }

      .nav-icon {
        align-items: center;
        border: 1px solid rgba(119, 130, 126, 0.28);
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.66rem;
        height: 28px;
        justify-content: center;
        min-width: 28px;
        padding: 0 7px;
      }

      .nav-button.active {
        color: var(--green-2);
      }

      .nav-button.active .nav-icon {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      @media (max-width: 390px) {
        .two { grid-template-columns: 1fr; }
        .set-head, .set-row {
          grid-template-columns: 30px minmax(48px, 1fr) minmax(62px, 1.15fr) minmax(48px, 1fr) 44px;
          gap: 5px;
        }
        .set-row { padding: 7px; }
        .set-row input { font-size: 0.95rem; padding: 7px 5px; }
      }

      @media (min-width: 720px) {
        .brand-bar { margin: 0 22px; }
        .app-main { padding: 22px 22px 0; }
        .bottom-nav {
          left: 50%;
          max-width: 920px;
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const STORAGE_KEY = "comprehensive-fitness-data-v1";
      const root = document.getElementById("root");
      const defaultReadinessBaseline = { sleepHours: 7.5, sleepQuality: 4, hrv: "", restingHr: "", soreness: 2, stress: 2, energy: 4, band: 8 };
      const defaultSettings = { weightUnit: "lb", defaultRestSeconds: 120, goal: "hypertrophy", trainingStatus: "intermediate", readinessBaseline: { ...defaultReadinessBaseline } };
      const researchRules = {
        volume: {
          novice: "8-12 hard sets per muscle weekly",
          intermediate: "12-18 hard sets per muscle weekly",
          advanced: "15-25 hard sets per muscle weekly"
        },
        frequency: "Train each muscle at least 2x/week when possible; frequency mainly helps distribute weekly volume.",
        effort: "Most productive hypertrophy sets should land around 0-5 reps in reserve, roughly RPE 7-10.",
        rest: "Rest at least 90 seconds on compound lifts and at least 60 seconds on isolation lifts to preserve volume load.",
        progression: "Progress by adding load or reps when target work is completed with manageable RPE; hold or deload when performance drops or fatigue accumulates.",
        deload: "After repeated misses, performance drops, or 4-8 hard weeks, reduce volume 30-50% and/or load 10-20% for about one week.",
        protein: "For hypertrophy/recomposition, the evidence-based daily protein range is about 1.6-2.2 g/kg; higher may help during aggressive cuts.",
        recomposition: "For recomposition, keep resistance training, high protein, and a moderate deficit; deficits over about 500 kcal/day tend to impair lean-mass gain.",
        sleep: "Sleep under 7 hours can limit recovery; 7-9 hours is the practical adult target."
      };
      let data = emptyData();
      let view = "workout";
      let activeSessionId = "";
      let timer = null;
      let timerInterval = 0;
      let selectedExercise = "";
      let selectedWeek = "";
      let addExerciseDraft = "";
      let exportText = "";
      let pendingClearData = false;
      let settingsMessage = "";
      let saveTimer = 0;

      const icon = {
        workout: "Lift",
        dashboard: "Dash",
        templates: "Plan",
        history: "Past",
        review: "Chart",
        settings: "Data",
        add: "+",
        clock: "Rest",
        done: "OK",
        delete: "X",
        pause: "Pause",
        play: "Start",
        duplicate: "Copy",
        download: "Export",
        upload: "Import"
      };

      function emptyData() {
        return { sessions: [], exercises: [], sets: [], templates: [], settings: { ...defaultSettings } };
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function isoNow() {
        return new Date().toISOString();
      }

      function startOfWeekIso(dateIso) {
        const date = new Date(dateIso + "T00:00:00");
        const day = date.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        date.setDate(date.getDate() + diff);
        return date.toISOString().slice(0, 10);
      }

      function formatDate(dateIso) {
        return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" }).format(new Date(dateIso + "T00:00:00"));
      }

      function formatWeek(dateIso) {
        return "Week of " + formatDate(startOfWeekIso(dateIso));
      }

      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function loadData() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          data = stored ? { ...emptyData(), ...stored, settings: { ...defaultSettings, ...stored.settings } } : emptyData();
        } catch {
          data = emptyData();
        }
        data.settings.readinessBaseline = { ...defaultReadinessBaseline, ...(data.settings.readinessBaseline || {}) };
        data.templates = Array.isArray(data.templates) ? data.templates : [];
        if (data.sessions.length === 0) data.sessions.push(createSession());
        activeSessionId = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date))[0].id;
      }

      function saveData() {
        window.clearTimeout(saveTimer);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveData, 500);
      }

      function commit(nextData, shouldRender = true) {
        data = nextData;
        if (shouldRender) saveData();
        else scheduleSave();
        if (shouldRender) render();
      }

      function createSession(title) {
        const now = isoNow();
        const sameDayCount = data.sessions.filter((session) => session.date === todayIso()).length + 1;
        return { id: id(), date: todayIso(), title: title || "Workout " + sameDayCount, isTravel: false, notes: "", recovery: defaultRecovery(), createdAt: now, updatedAt: now };
      }

      function defaultRecovery() {
        return { sleepHours: "", sleepQuality: "", hrv: "", restingHr: "", soreness: "", stress: "", energy: "", outsideBand: false, outsideBandNote: "", illness: false };
      }

      function sessionRecovery(session) {
        return { ...defaultRecovery(), ...(session?.recovery || {}) };
      }

      function createSet(exerciseId, setNumber, previous) {
        return {
          id: id(),
          exerciseId,
          setNumber,
          reps: previous?.reps ?? 8,
          weight: previous?.weight ?? 0,
          weightUnit: previous?.weightUnit ?? data.settings.weightUnit,
          isBodyweight: previous?.isBodyweight ?? false,
          rpe: previous?.rpe ?? 7,
          completed: previous?.completed ?? true
        };
      }

      function activeSession() {
        return data.sessions.find((session) => session.id === activeSessionId) || data.sessions[0];
      }

      function activeExercises() {
        const session = activeSession();
        return session ? data.exercises.filter((exercise) => exercise.sessionId === session.id).sort((a, b) => a.order - b.order) : [];
      }

      function workoutSessionOptions(session) {
        const recent = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 60);
        return Array.from(new Map([session, ...recent].filter(Boolean).map((item) => [item.id, item])).values());
      }

      function setsForExercise(exerciseId) {
        return data.sets.filter((set) => set.exerciseId === exerciseId).sort((a, b) => a.setNumber - b.setNumber);
      }

      function estimatedOneRepMax(set) {
        if (set.weight <= 0 || set.reps <= 0) return 0;
        return set.weight * (1 + set.reps / 30);
      }

      function roundToIncrement(value, increment) {
        return Math.max(increment, Math.round(value / increment) * increment);
      }

      function getExerciseNames() {
        return Array.from(new Set(data.exercises.map((exercise) => exercise.name.trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      }

      function exerciseKey(name) {
        return String(name || "")
          .toLowerCase()
          .replace(/\([^)]*\)/g, "")
          .replace(/\b(barbell|dumbbell|machine|cable|bodyweight)\b/g, "")
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      function exerciseMatches(storedName, requestedName) {
        const stored = String(storedName || "").trim().toLowerCase();
        const requested = String(requestedName || "").trim().toLowerCase();
        return stored === requested || exerciseKey(storedName) === exerciseKey(requestedName);
      }

      function getExerciseSets(exerciseName) {
        const exercises = data.exercises.filter((exercise) => exerciseMatches(exercise.name, exerciseName));
        const ids = new Set(exercises.map((exercise) => exercise.id));
        return { exercises, sets: data.sets.filter((set) => ids.has(set.exerciseId)) };
      }

      function summarizeExerciseByWeek(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const grouped = new Map();
        scoped.sets.forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session) return;
          const week = startOfWeekIso(session.date);
          const bucket = grouped.get(week) || { sessions: new Set(), travelCount: 0, sets: [] };
          if (!bucket.sessions.has(session.id) && session.isTravel) bucket.travelCount += 1;
          bucket.sessions.add(session.id);
          bucket.sets.push(set);
          grouped.set(week, bucket);
        });
        return Array.from(grouped.entries()).map(([weekStart, bucket]) => {
          const completed = bucket.sets.filter((set) => set.completed);
          const rpeSets = bucket.sets.filter((set) => set.rpe > 0);
          return {
            weekStart,
            travelCount: bucket.travelCount,
            topWeight: Math.max(0, ...bucket.sets.map((set) => set.weight)),
            completedSets: completed.length,
            failedSets: bucket.sets.filter((set) => !set.completed).length,
            averageRpe: rpeSets.length ? rpeSets.reduce((sum, set) => sum + set.rpe, 0) / rpeSets.length : 0,
            bestEstimatedOneRepMax: Math.max(0, ...completed.map(estimatedOneRepMax))
          };
        }).sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      }

      function recommendForExerciseWeek(exerciseName, weekStart) {
        const summaries = summarizeExerciseByWeek(exerciseName);
        const selectedIndex = summaries.findIndex((summary) => summary.weekStart === weekStart);
        const current = summaries[selectedIndex >= 0 ? selectedIndex : 0];
        const previous = summaries[selectedIndex + 1];
        const older = summaries.slice(selectedIndex + 1, selectedIndex + 5);
        const increment = data.settings.weightUnit === "kg" ? 2.5 : 5;
        if (!current) {
          return {
            decision: "hold",
            label: "Need more data",
            reason: "There is not enough history for this lift yet.",
            action: "Log at least one complete session, then review again.",
            evidence: ["No completed sets found for the selected exercise."],
            confidence: "low"
          };
        }
        const travelAdjusted = current.travelCount > 0;
        const hardWeek = current.averageRpe >= 9;
        const failedMultipleSets = current.failedSets >= 2;
        const performanceDrop = previous && current.bestEstimatedOneRepMax > 0 && current.bestEstimatedOneRepMax < previous.bestEstimatedOneRepMax * 0.92;
        const repeatedFailures = older.filter((week) => week.failedSets > 0 || week.averageRpe >= 9.5).length >= 2 && current.failedSets > 0;
        const flatWeeks = older.length >= 3 && older.every((week) => Math.abs(week.bestEstimatedOneRepMax - current.bestEstimatedOneRepMax) <= current.bestEstimatedOneRepMax * 0.025);
        const evidence = [
          current.completedSets + " completed set" + (current.completedSets === 1 ? "" : "s") + " and " + current.failedSets + " missed set" + (current.failedSets === 1 ? "" : "s") + ".",
          "Average RPE " + (current.averageRpe ? current.averageRpe.toFixed(1) : "not logged") + ".",
          "Best estimated 1RM " + (current.bestEstimatedOneRepMax ? current.bestEstimatedOneRepMax.toFixed(1) : "not available") + "."
        ];
        if (travelAdjusted) evidence.push("Travel was logged this week, so the recommendation is less punitive for a dip.");
        if (flatWeeks && (hardWeek || repeatedFailures)) {
          return { decision: "change", label: "Consider changing variation", reason: "This lift looks stalled across several recent weeks.", action: "Swap to a close variation for 4-6 weeks, then retest the original lift.", evidence, confidence: "medium" };
        }
        if ((failedMultipleSets || repeatedFailures || performanceDrop) && !travelAdjusted) {
          const target = roundToIncrement(current.topWeight * 0.9, increment);
          return { decision: "deload", label: "Deload", reason: "Recent performance suggests fatigue or an overly aggressive load.", action: "Reduce working weight about 10% next time, aiming near " + target + " " + data.settings.weightUnit + ", and keep 1-3 reps in reserve.", evidence, confidence: "high" };
        }
        if (hardWeek || current.failedSets > 0 || current.completedSets < 3 || travelAdjusted) {
          return { decision: "hold", label: "Hold", reason: travelAdjusted ? "The travel context makes this a good week to repeat before judging progress." : "The work was close enough to the limit that repeating is the cleaner next step.", action: "Repeat the same load and rep target next time; progress only if RPE settles below 9.", evidence, confidence: travelAdjusted ? "medium" : "high" };
        }
        const nextWeight = roundToIncrement(current.topWeight + increment, increment);
        return { decision: "progress", label: "Progress", reason: "You completed the work without a high-RPE warning or repeated misses.", action: current.topWeight > 0 ? "Add " + increment + " " + data.settings.weightUnit + " next time, targeting about " + nextWeight + " " + data.settings.weightUnit + "." : "Add reps or a harder bodyweight variation next time.", evidence, confidence: previous ? "high" : "medium" };
      }

      function templateExerciseCount(template) {
        return template.exercises.reduce((sum, exercise) => sum + Number(exercise.sets || 0), 0);
      }

      function researchVolumeTarget() {
        return researchRules.volume[data.settings.trainingStatus] || researchRules.volume.intermediate;
      }

      function goalContext() {
        if (data.settings.goal === "recomposition") return researchRules.recomposition;
        if (data.settings.goal === "cut") return "During a cut, protect performance with high protein, controlled volume, and conservative progression.";
        if (data.settings.goal === "maintain") return "For maintenance, prioritize consistency, sufficient effort, and avoiding unnecessary fatigue.";
        return "For hypertrophy, prioritize enough weekly hard sets, progressive overload, and recovery.";
      }

      function getLastCompletedSet(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        return scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .sort((a, b) => b.session.date.localeCompare(a.session.date))[0];
      }

      function getMostRecentWorkoutSets(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const completed = scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .sort((a, b) => b.session.date.localeCompare(a.session.date) || a.set.setNumber - b.set.setNumber);
        const latestSessionId = completed[0]?.session.id;
        return latestSessionId ? completed.filter((entry) => entry.session.id === latestSessionId).map((entry) => entry.set).sort((a, b) => a.setNumber - b.setNumber) : [];
      }

      function coachTargetForTemplateExercise(templateExercise) {
        const targetReps = Number(templateExercise.reps || 8);
        const plannedSets = Number(templateExercise.sets || 1);
        const weeks = summarizeExerciseByWeek(templateExercise.name);
        const recommendation = weeks[0] ? recommendForExerciseWeek(templateExercise.name, weeks[0].weekStart) : null;
        const recentSets = getMostRecentWorkoutSets(templateExercise.name);
        const last = getLastCompletedSet(templateExercise.name);
        const increment = data.settings.weightUnit === "kg" ? 2.5 : 5;
        const recentTop = Math.max(0, ...recentSets.map((set) => set.weight), last?.set?.weight || 0);
        const recentReps = Math.max(0, ...recentSets.map((set) => set.reps), last?.set?.reps || 0);
        let sets = plannedSets;
        let reps = targetReps;
        let weight = recentTop;
        let rpe = 8;
        let reason = "No prior completed sets found. Use a controlled load near RPE 7-8.";

        if (recommendation?.decision === "progress") {
          reason = "Prior work supports progressive overload.";
          if (recentTop > 0) weight = roundToIncrement(recentTop + increment, increment);
          else reps = Math.max(targetReps, recentReps + 1);
        } else if (recommendation?.decision === "deload") {
          reason = "Recent work suggests fatigue or misses. Reduce load and volume.";
          weight = recentTop > 0 ? roundToIncrement(recentTop * 0.9, increment) : 0;
          sets = Math.max(1, Math.ceil(plannedSets * 0.65));
          rpe = 7;
        } else if (recommendation?.decision === "change") {
          reason = "This pattern looks stalled. Consider swapping the lift for 4-6 weeks.";
        } else if (recommendation) {
          reason = "Repeat the target and make it cleaner before adding workload.";
        }

        const weightText = weight > 0 ? weight + " " + data.settings.weightUnit : "bodyweight/control load";
        return {
          decision: recommendation?.decision || "hold",
          sets,
          reps,
          weight,
          rpe,
          weightUnit: data.settings.weightUnit,
          isBodyweight: weight === 0,
          text: "Target " + sets + " x " + reps + " @ " + weightText + ", aim RPE " + rpe + ". " + reason
        };
      }

      function exerciseGuidanceFor(name) {
        const key = exerciseKey(name);
        const base = {
          sets: "2-4 hard sets",
          reps: "6-15 reps",
          effort: "RPE 7-9, 1-3 reps in reserve",
          cues: [
            "Use a controlled eccentric and pause if momentum creeps in.",
            "Stop the set when positions break, not when pride says one more.",
            "Progress only after target reps look repeatable and controlled."
          ]
        };
        const patterns = [
          { match: /squat|leg press|lunge|split squat/, sets: "3-5 hard sets", reps: "5-12 reps", cues: ["Brace before the descent and keep pressure through midfoot.", "Let knees track with toes; do not dive-bomb the bottom.", "Use a depth you can repeat without lumbar rounding."] },
          { match: /deadlift|rdl|romanian|hinge|good morning/, sets: "2-4 hard sets", reps: "5-10 reps", cues: ["Start by pushing hips back, not by squatting the weight.", "Keep lats tight and the load close to the body.", "End the set when back position or hamstring tension breaks."] },
          { match: /bench|press|push up|dip|chest/, sets: "3-5 hard sets", reps: "6-12 reps", cues: ["Set shoulder blades before the first rep and keep wrists stacked.", "Lower under control to a consistent touch point or depth.", "Press without bouncing or letting shoulders roll forward."] },
          { match: /row|pulldown|pull up|chin|lat/, sets: "3-5 hard sets", reps: "6-15 reps", cues: ["Lead with elbows and keep ribs down.", "Pause briefly in the shortened position instead of yanking.", "Control the stretch without losing shoulder position."] },
          { match: /shoulder|overhead|lateral raise|rear delt/, sets: "2-5 hard sets", reps: "8-20 reps", cues: ["Keep ribs stacked and avoid turning it into a low-back lift.", "Use a smooth path and stop before joint irritation.", "For raises, chase tension and control rather than load."] },
          { match: /curl|tricep|extension|pushdown|skull/, sets: "2-4 hard sets", reps: "8-20 reps", cues: ["Pin the upper arm and move through the elbow.", "Use full range you can control without swinging.", "Add reps before load when jumps are large."] },
          { match: /calf/, sets: "3-5 hard sets", reps: "8-20 reps", cues: ["Use a full stretch and hard top contraction.", "Pause instead of bouncing through the ankle.", "Keep reps consistent before adding load."] },
          { match: /plank|crunch|raise|ab|core/, sets: "2-4 hard sets", reps: "8-20 reps or timed sets", cues: ["Brace as if resisting motion, not just chasing burn.", "Keep pelvis controlled and avoid low-back takeover.", "Make the range harder before making it sloppy."] }
        ];
        const found = patterns.find((item) => item.match.test(key));
        return found ? { ...base, ...found } : base;
      }

      function renderExerciseGuidance(exercise) {
        const guidance = exerciseGuidanceFor(exercise.name);
        return `
          <div class="exercise-guidance">
            <strong>Execution target</strong>
            <div class="guidance-grid">
              <div class="guidance-pill"><span>Sets</span><b>${escapeHtml(guidance.sets)}</b></div>
              <div class="guidance-pill"><span>Reps</span><b>${escapeHtml(guidance.reps)}</b></div>
              <div class="guidance-pill"><span>Effort</span><b>${escapeHtml(guidance.effort)}</b></div>
            </div>
            <ul class="cue-list">${guidance.cues.map((cue) => "<li>" + escapeHtml(cue) + "</li>").join("")}</ul>
          </div>
        `;
      }

      function recommendForTemplate(template) {
        if (!template || template.exercises.length === 0) {
          return { label: "Build the plan first", detail: "Add exercises, sets, and target reps before starting this template.", items: [] };
        }
        const items = template.exercises.map((exercise) => {
          const target = coachTargetForTemplateExercise(exercise);
          return { name: exercise.name, text: target.text };
        });
        const totalSets = templateExerciseCount(template);
        const hasHistory = items.some((item) => getLastCompletedSet(item.name));
        const label = hasHistory ? "Session target: progressive overload" : "Session target: establish baseline";
        const detail = hasHistory
          ? "Use prior performance first. " + researchRules.progression + " " + goalContext()
          : "No prior completed sets found for this template. Use controlled sets near RPE 7-8, then let future sessions drive progression. " + goalContext();
        const context = " Research target: " + researchVolumeTarget() + ". " + researchRules.rest + " " + researchRules.protein;
        return { label, detail: detail + " Planned volume: " + totalSets + " working sets." + context, items };
      }

      function createTemplateFromSession(sessionId) {
        const session = data.sessions.find((item) => item.id === sessionId);
        if (!session) return null;
        const exercises = data.exercises
          .filter((exercise) => exercise.sessionId === session.id)
          .sort((a, b) => a.order - b.order)
          .map((exercise) => {
            const sets = setsForExercise(exercise.id);
            return {
              id: id(),
              name: exercise.name || "Exercise",
              sets: Math.max(sets.length, 1),
              reps: sets[0]?.reps || 8
            };
          });
        return { id: id(), name: (session.title || "Workout") + " Template", notes: "", exercises, createdAt: isoNow(), updatedAt: isoNow() };
      }

      function render() {
        const session = activeSession();
        if (!session) {
          root.innerHTML = '<div class="loading">Loading your training log...</div>';
          return;
        }
        root.innerHTML = `
          <div class="app-shell">
            <header class="brand-bar">
              <div class="brand-mark">CF</div>
              <div class="brand-title">Comprehensive <span>Fitness</span></div>
              <div class="brand-action">${data.settings.weightUnit.toUpperCase()}</div>
            </header>
            <main class="app-main">${renderView()}</main>
            <nav class="bottom-nav" aria-label="Main navigation">
              ${navButton("workout", "Workout")}
              ${navButton("dashboard", "Dashboard")}
              ${navButton("templates", "Templates")}
              ${navButton("review", "Charts")}
              ${navButton("settings", "Settings")}
            </nav>
          </div>
        `;
      }

      function navButton(target, label) {
        return '<button class="nav-button ' + (view === target ? "active" : "") + '" data-action="set-view" data-view="' + target + '" type="button"><span class="nav-icon">' + icon[target] + '</span><span>' + label + '</span></button>';
      }

      function renderView() {
        if (view === "dashboard") return renderDashboard();
        if (view === "templates") return renderTemplates();
        if (view === "review") return renderReview();
        if (view === "settings") return renderSettings();
        return renderWorkout();
      }

      function renderWorkout() {
        const session = activeSession();
        return `
          <section class="view">
            <div>
              <div class="section-kicker">Today's workout</div>
              <h1>Training log</h1>
            </div>
            ${renderQuickStartTemplates()}
            ${renderTodayPlan()}
            <div class="session-header">
              <div class="row split">
                <select data-action="change-session" aria-label="Workout session">
                  ${workoutSessionOptions(session).map((item) => '<option value="' + item.id + '" ' + (item.id === session.id ? "selected" : "") + '>' + escapeHtml(item.title) + " - " + item.date + '</option>').join("")}
                </select>
                <button class="icon-button" type="button" data-action="new-session" title="New workout">${icon.add}</button>
              </div>
              <div class="grid two">
                <input value="${escapeHtml(session.title)}" data-action="session-title" aria-label="Workout title" />
                <input type="date" value="${session.date}" data-action="session-date" aria-label="Workout date" />
              </div>
              <label class="toggle-line"><input type="checkbox" data-action="session-travel" ${session.isTravel ? "checked" : ""} />Travel session</label>
              <textarea data-action="session-notes" placeholder="Session notes" aria-label="Session notes">${escapeHtml(session.notes)}</textarea>
            </div>
            ${renderRecoveryPanel(session)}
            ${renderActiveWorkoutAdvice()}
            ${activeExercises().map(renderExercise).join("")}
            <div class="inline-panel">
              <h2>Add exercise</h2>
              <div class="row">
                <input value="${escapeHtml(addExerciseDraft)}" data-action="add-exercise-draft" placeholder="Exercise name" aria-label="New exercise name" />
                <button class="icon-button" type="button" data-action="add-exercise" title="Add exercise">${icon.add}</button>
              </div>
            </div>
            <button class="secondary-action" type="button" data-action="save-template">Save workout as template</button>
            ${renderTimer()}
          </section>
        `;
      }

      function renderTodayPlan() {
        const session = activeSession();
        const exercises = activeExercises();
        const readiness = recoveryRecommendationForSession(session);
        if (!exercises.length) {
          return `
            <article class="workout-advice">
              <h2>Today's plan</h2>
              <p class="advice-detail">Pick a template above to load exact lifts, target loads, reps, RPE, and rest times. If you build manually, the plan fills in as you add exercises.</p>
            </article>
          `;
        }
        return `
          <article class="workout-advice">
            <div class="row split">
              <h2>Today's plan</h2>
              <span class="status-pill ${readiness.band?.outside ? readiness.band.direction : "inside"}">${readiness.band?.outside ? readiness.band.direction + " band" : "inside band"}</span>
            </div>
            <p class="advice-detail">${escapeHtml(readiness.action)}</p>
            <div class="plan-list">
              ${exercises.map((exercise) => {
                const sets = setsForExercise(exercise.id);
                const first = sets[0] || createSet(exercise.id, 1);

      function exerciseProgressSeries(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const byWeek = new Map();
        scoped.sets.filter((set) => set.completed && set.reps > 0).forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session) return;
          const week = startOfWeekIso(session.date);
          const bucket = byWeek.get(week) || { week, e1rm: 0, volume: 0, repsByWeight: new Map() };
          bucket.e1rm = Math.max(bucket.e1rm, estimatedOneRepMax(set));
          bucket.volume += set.weight * set.reps;
          const weightKey = String(set.weight || 0);
          bucket.repsByWeight.set(weightKey, Math.max(bucket.repsByWeight.get(weightKey) || 0, set.reps));
          byWeek.set(week, bucket);
        });
        const weeks = Array.from(byWeek.values()).sort((a, b) => a.week.localeCompare(b.week)).slice(-16);
        const allWeights = new Map();
        weeks.forEach((week) => week.repsByWeight.forEach((reps, weight) => allWeights.set(weight, (allWeights.get(weight) || 0) + 1)));
        const commonWeight = Array.from(allWeights.entries()).sort((a, b) => b[1] - a[1] || Number(b[0]) - Number(a[0]))[0]?.[0] || "0";
        return {
          e1rm: weeks.map((week) => ({ label: week.week.slice(5), value: Math.round(week.e1rm * 10) / 10 })),
          volume: weeks.map((week) => ({ label: week.week.slice(5), value: Math.round(week.volume) })),
          repsAtWeight: weeks.map((week) => ({ label: week.week.slice(5), value: week.repsByWeight.get(commonWeight) || 0 })),
          commonWeight: Number(commonWeight)
        };
      }

      function renderChart(title, points, emptyText) {
        const values = points.map((point) => point.value).filter((value) => value > 0);
        if (!values.length) return '<div class="chart-card"><header><strong>' + escapeHtml(title) + '</strong></header><small>' + escapeHtml(emptyText) + '</small></div>';
        const max = Math.max(...values);
        const min = Math.min(...values);
        const spread = Math.max(1, max - min);
        const width = 320;
        const height = 100;
        const chartPoints = points.map((point, index) => {
          const x = points.length === 1 ? width / 2 : (index / (points.length - 1)) * width;
          const y = height - ((point.value - min) / spread) * 78 - 11;
          return { ...point, x, y };
        });
        const polyline = chartPoints.filter((point) => point.value > 0).map((point) => point.x.toFixed(1) + "," + point.y.toFixed(1)).join(" ");
        return `
          <div class="chart-card">
            <header><strong>${escapeHtml(title)}</strong><span class="status-pill">${values.length} points</span></header>
            <div class="chart-svg">
              <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(title)} chart">
                <polyline points="${polyline}" fill="none" stroke="#4aa3ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
                ${chartPoints.filter((point) => point.value > 0).map((point) => '<circle cx="' + point.x.toFixed(1) + '" cy="' + point.y.toFixed(1) + '" r="4" fill="#9fd0ff"></circle>').join("")}
              </svg>
            </div>
            <small>${escapeHtml(points[0]?.label || "")} to ${escapeHtml(points[points.length - 1]?.label || "")}. Range ${min}-${max}.</small>
          </div>
        `;
      }

            </div>

        `;
      }

      function patchSession(patch, shouldRender = true) {
        const session = activeSession();
        if (shouldRender) {
          commit({ ...data, sessions: data.sessions.map((item) => item.id === session.id ? { ...item, ...patch, updatedAt: isoNow() } : item) }, true);
          return;
        }
        const index = data.sessions.findIndex((item) => item.id === session.id);
        if (index >= 0) {
          data.sessions[index] = { ...data.sessions[index], ...patch, updatedAt: isoNow() };
          scheduleSave();
        }
      }

      function patchRecovery(patch, shouldRender = true) {
        const session = activeSession();
        patchSession({ recovery: { ...sessionRecovery(session), ...patch } }, shouldRender);
      }

      function patchReadinessBaseline(patch, shouldRender = true) {
        commit({ ...data, settings: { ...data.settings, readinessBaseline: { ...readinessBaseline(), ...patch } } }, shouldRender);
      }

      function patchExercise(exerciseId, patch, shouldRender = true) {
        if (shouldRender) {
          commit({ ...data, exercises: data.exercises.map((exercise) => exercise.id === exerciseId ? { ...exercise, ...patch } : exercise) }, true);

      function patchSet(setId, patch, shouldRender = true) {

      function addExercise() {

        const exercise = { id: id(), sessionId: session.id, name: name.trim(), notes: "", order: activeExercises().length };

      function addTemplate() {

      function patchTemplate(templateId, patch, shouldRender = true) {

      function patchTemplateExercise(templateId, exerciseId, patch, shouldRender = true) {

          ...data,

      function saveActiveSessionAsTemplate() {
        const template = createTemplateFromSession(activeSessionId);

      function startTemplate(templateId) {
        const template = data.templates.find((item) => item.id === templateId);
        if (!template) return;
        const currentSession = activeSession();
        const replaceCurrent = currentSession && currentSession.date === todayIso() && currentSession.source !== "strong";
        const session = replaceCurrent
          ? { ...currentSession, title: template.name, templateId: template.id, updatedAt: isoNow() }
          : createSession(template.name);
        session.templateId = template.id;
        const recoveryAdvice = recoveryRecommendationForSession(session);
        const exercises = [];
        const sets = [];
        template.exercises.forEach((templateExercise, index) => {
          const exercise = { id: id(), sessionId: session.id, name: templateExercise.name, notes: "", order: index };
          const target = adjustTargetForRecovery(coachTargetForTemplateExercise(templateExercise), recoveryAdvice);
          exercise.notes = "Coach target: " + target.text;
          exercises.push(exercise);
          for (let setNumber = 1; setNumber <= target.sets; setNumber += 1) {
            sets.push(createSet(exercise.id, setNumber, { reps: target.reps, weight: target.weight, weightUnit: target.weightUnit, isBodyweight: target.isBodyweight, rpe: target.rpe, completed: true }));
          }
        });
        activeSessionId = session.id;
        view = "workout";
        if (replaceCurrent) {
          const oldExerciseIds = new Set(data.exercises.filter((exercise) => exercise.sessionId === session.id).map((exercise) => exercise.id));
          commit({
            ...data,
            sessions: data.sessions.map((item) => item.id === session.id ? session : item),
            exercises: [...data.exercises.filter((exercise) => exercise.sessionId !== session.id), ...exercises],
            sets: [...data.sets.filter((set) => !oldExerciseIds.has(set.exerciseId)), ...sets]
          });
        } else {
          commit({ ...data, sessions: [session, ...data.sessions], exercises: [...data.exercises, ...exercises], sets: [...data.sets, ...sets] });
        }
      }

      function addSet(exerciseId, duplicate) {
        const sets = setsForExercise(exerciseId);
        commit({ ...data, sets: [...data.sets, createSet(exerciseId, sets.length + 1, duplicate ? sets[sets.length - 1] : undefined)] });
      }

      function moveExercise(exerciseId, direction) {
        const session = activeSession();
        const exercises = activeExercises();
        const index = exercises.findIndex((exercise) => exercise.id === exerciseId);
        const nextIndex = index + Number(direction);
        if (!session || index < 0 || nextIndex < 0 || nextIndex >= exercises.length) return;
        const reordered = [...exercises];
        const [moved] = reordered.splice(index, 1);
        reordered.splice(nextIndex, 0, moved);
        const orderMap = new Map(reordered.map((exercise, order) => [exercise.id, order]));
        commit({ ...data, exercises: data.exercises.map((exercise) => exercise.sessionId === session.id ? { ...exercise, order: orderMap.get(exercise.id) ?? exercise.order } : exercise) });
      }

      function startTimer(exerciseId) {
        timer = { exerciseId, durationSeconds: data.settings.defaultRestSeconds, remainingSeconds: data.settings.defaultRestSeconds, isActive: true, isPaused: false };
        startTimerInterval();
        render();
      }

      function startTimerInterval() {
        window.clearInterval(timerInterval);
        timerInterval = window.setInterval(() => {
          if (!timer || timer.isPaused || !timer.isActive) return;
          timer.remainingSeconds = Math.max(0, timer.remainingSeconds - 1);
          timer.isActive = timer.remainingSeconds > 0;
          render();
        }, 1000);
      }

      function formatTimer(seconds) {
        const minutes = Math.floor(seconds / 60);
        return minutes + ":" + String(seconds % 60).padStart(2, "0");
      }

      function exportData() {

        const anchor = document.createElement("a");

        anchor.click();

          anchor.remove();
