<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track strength workouts, rest timers, travel sessions, and transparent lift progression guidance." />
    <meta name="theme-color" content="#090d0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Comprehensive Fitness" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/resources/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/resources/icon-192.png" />
    <title>Comprehensive Fitness</title>
    <style>
      :root {
        --bg: #090d0e;
        --bg-soft: #0f1516;
        --panel: #151b1d;
        --panel-2: #1b2325;
        --panel-3: #20292b;
        --line: #2d383b;
        --line-strong: #3c4b4f;
        --text: #f4f7f2;
        --muted: #a9b2ae;
        --muted-2: #77827e;
        --green: #7bd342;
        --green-2: #a1ef66;
        --green-dark: #23351f;
        --amber: #ffb12b;
        --red: #ff7f6b;
        --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }

      html { background: var(--bg); }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(19, 26, 27, 0.96), rgba(9, 13, 14, 1) 34%),
          var(--bg);
      }

      button, input, select, textarea { font: inherit; }

      button {
        align-items: center;
        background: linear-gradient(180deg, #222c2f, #182022);
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
        transition: border-color 140ms ease, color 140ms ease, transform 140ms ease, background 140ms ease;
      }

      button:hover { border-color: var(--green); }
      button:active { transform: translateY(1px); }

      input, select, textarea {
        background: #0f1516;
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        min-height: 48px;
        padding: 12px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus, button:focus-visible {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(123, 211, 66, 0.18);
        outline: none;
      }

      input[type="number"] {
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      h1, h2, p { margin-top: 0; }
      h1 {
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        letter-spacing: 0;
        margin-bottom: 2px;
      }
      h2 { letter-spacing: 0; }

      .app-shell {
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding-bottom: 104px;
      }

      .brand-bar {
        align-items: center;
        border-bottom: 1px solid rgba(60, 75, 79, 0.7);
        display: grid;
        gap: 12px;
        grid-template-columns: auto 1fr auto;
        margin: 0 14px;
        min-height: 76px;
        padding: max(14px, env(safe-area-inset-top)) 0 14px;
      }

      .brand-mark {
        align-items: center;
        background: linear-gradient(180deg, var(--green-2), var(--green));
        border-radius: 12px;
        color: #0b110d;
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 1000;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .brand-title {
        display: grid;
        font-size: 0.92rem;
        font-weight: 1000;
        letter-spacing: 0.03em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .brand-title span {
        color: var(--green);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
      }

      .brand-action {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--green);
        display: inline-flex;
        font-weight: 1000;
        gap: 6px;
        min-height: 38px;
        padding: 0 12px;
      }

      .app-main { padding: 16px 14px 0; }
      .loading, .empty-state {
        color: var(--muted);
        padding: 24px;
      }

      .empty-state {
        background: var(--panel);
        border: 1px dashed var(--line-strong);
        border-radius: 16px;
      }

      .view { display: grid; gap: 16px; }

      .section-kicker {
        color: var(--green);
        font-size: 0.76rem;
        font-weight: 1000;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .session-header {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.96), rgba(18, 24, 25, 0.96));
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
        position: sticky;
        top: 8px;
        z-index: 3;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .split { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .grid { display: grid; gap: 10px; }
      .two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

      .toggle-line, .bodyweight {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 0.92rem;
        font-weight: 800;
        gap: 9px;
      }

      .toggle-line input, .bodyweight input {
        accent-color: var(--green);
        height: 22px;
        min-height: 22px;
        width: 22px;
      }

      .exercise-card, .settings-panel, .recommendation, .template-card, .inline-panel, .workout-advice {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.98), rgba(16, 22, 23, 0.98));
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .exercise-card {
        gap: 14px;
        overflow: hidden;
      }

      .exercise-name {
        background: transparent;
        border-color: transparent;
        font-size: 1.08rem;
        font-weight: 1000;
        padding-left: 0;
      }

      .exercise-name:focus { background: #0f1516; padding-left: 12px; }

      .icon-button {
        aspect-ratio: 1;
        justify-content: center;
        min-width: 48px;
        padding: 8px;
        width: 48px;
      }

      .danger, .danger-button {
        border-color: rgba(255, 127, 107, 0.46);
        color: #ffc3b8;
      }

      .set-head, .set-row, .trend-head, .trend-row {
        align-items: center;
        display: grid;
        gap: 7px;
      }

      .set-head, .set-row {
        grid-template-columns: 36px minmax(56px, 1fr) minmax(76px, 1.35fr) minmax(56px, 1fr) 48px;
      }

      .set-head, .trend-head {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .set-row {
        background: rgba(9, 13, 14, 0.58);
        border: 1px solid rgba(45, 56, 59, 0.85);
        border-radius: 14px;
        padding: 8px;
      }

      .set-row strong {
        color: var(--green);
        font-size: 1.1rem;
        text-align: center;
      }

      .set-row input {
        border-radius: 10px;
        min-height: 46px;
        padding: 8px;
      }

      .set-row .bodyweight, .set-row .mini-button { grid-column: span 2; }

      .mini-button {
        color: var(--muted);
        font-size: 0.82rem;
        min-height: 38px;
        padding: 8px 10px;
      }

      .check-button {
        aspect-ratio: 1;
        border-radius: 999px;
        color: var(--muted-2);
        justify-content: center;
        min-height: 44px;
        padding: 6px;
      }

      .check-button.checked {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      .primary-action {
        background: linear-gradient(180deg, var(--green-2), var(--green));
        border-color: var(--green);
        box-shadow: 0 14px 28px rgba(123, 211, 66, 0.18);
        color: #10160f;
        font-size: 1rem;
        font-weight: 1000;
        justify-content: center;
        min-height: 58px;
        text-transform: uppercase;
      }

      .secondary-action {
        color: var(--green);
        justify-content: center;
      }

      .template-card { text-align: left; }

      .template-card h2,
      .workout-advice h2,
      .inline-panel h2 {
        font-size: 1.12rem;
        margin: 0;
      }

      .workout-advice {
        border-color: rgba(123, 211, 66, 0.55);
      }

      .workout-advice h2 {
        color: var(--green-2);
        font-size: 1.28rem;
      }

      .quick-template-strip {
        display: grid;
        gap: 10px;
      }

      .quick-template-list {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      }

      .quick-template-card {
        align-items: stretch;
        background: linear-gradient(180deg, rgba(35, 53, 31, 0.92), rgba(18, 24, 25, 0.98));
        border-color: rgba(123, 211, 66, 0.46);
        border-radius: 18px;
        display: grid;
        gap: 7px;
        min-height: 126px;
        padding: 13px;
        text-align: left;
      }

      .quick-template-card strong {
        color: var(--text);
        font-size: 1rem;
      }

      .quick-template-card small,
      .quick-template-card span {
        color: var(--muted);
        line-height: 1.35;
      }

      .quick-template-card span {
        color: #dce8d4;
        font-size: 0.86rem;
      }

      .template-meta,
      .advice-detail,
      .template-card small {
        color: var(--muted);
      }

      .advice-detail {
        line-height: 1.45;
        margin: 0;
      }

      .template-list,
      .advice-list {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 0;
      }

      .template-list li,
      .advice-list li {
        background: rgba(9, 13, 14, 0.55);
        border: 1px solid rgba(45, 56, 59, 0.82);
        border-radius: 14px;
        display: grid;
        gap: 6px;
        list-style: none;
        padding: 11px;
      }

      .advice-list strong { color: var(--text); }
      .advice-list span { color: var(--muted); line-height: 1.4; }

      .inline-panel {
        border-color: rgba(123, 211, 66, 0.52);
      }

      .inline-actions {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .export-box {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        min-height: 180px;
      }

      .timer-bar {
        align-items: center;
        background: linear-gradient(180deg, rgba(73, 47, 10, 0.96), rgba(37, 26, 11, 0.98));
        border: 1px solid rgba(255, 177, 43, 0.78);
        border-radius: 18px;
        bottom: calc(88px + env(safe-area-inset-bottom));
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.45);
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 48px 48px;
        left: 14px;
        margin: 0 auto;
        max-width: 892px;
        padding: 12px;
        position: fixed;
        right: 14px;
        z-index: 5;
      }

      .timer-bar strong {
        color: var(--amber);
        display: block;
        font-size: 1.75rem;
        line-height: 1;
      }

      .timer-bar span {
        color: #ffd899;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .timer-bar.complete { border-color: var(--green); }

      .session-card {
        align-items: stretch;
        border-radius: 18px;
        display: grid;
        gap: 7px;
        text-align: left;
      }

      .session-card p, .session-card small {
        color: var(--muted);
        margin: 0;
      }

      .recommendation span {
        background: rgba(244, 247, 242, 0.95);
        border-radius: 999px;
        color: #111715;
        font-size: 0.76rem;
        font-weight: 900;
        justify-self: start;
        padding: 5px 9px;
      }

      .recommendation h2 { margin: 0; }
      .recommendation p { color: var(--muted); margin: 0; }
      .recommendation strong { color: var(--text); line-height: 1.35; }
      .recommendation ul { color: #d7ded8; margin: 0; padding-left: 18px; }
      .recommendation.progress { border-color: var(--green); }
      .recommendation.hold { border-color: var(--amber); }
      .recommendation.deload, .recommendation.change { border-color: var(--red); }

      .trend-table {
        background: linear-gradient(180deg, rgba(27, 35, 37, 0.98), rgba(16, 22, 23, 0.98));
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
      }

      .trend-head, .trend-row {
        grid-template-columns: 1.55fr 0.7fr 0.7fr 0.65fr;
        padding: 11px;
      }

      .trend-row {
        border-top: 1px solid var(--line);
        color: #d9dfdb;
      }

      .settings-panel label {
        color: #d7ded8;
        display: grid;
        gap: 7px;
      }

      .settings-note,
      .settings-links {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
        margin: 0;
      }

      .settings-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .settings-links a { color: var(--green); }

      .import-button {
        align-items: center;
        background: linear-gradient(180deg, #222c2f, #182022);
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        cursor: pointer;
        display: inline-flex;
        flex-direction: row;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
      }

      .import-button input { display: none; }

      .bottom-nav {
        background: rgba(11, 15, 16, 0.96);
        border-top: 1px solid rgba(60, 75, 79, 0.86);
        bottom: 0;
        display: grid;
        gap: 4px;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        left: 0;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        position: fixed;
        right: 0;
        z-index: 4;
      }

      .nav-button {
        background: transparent;
        border-color: transparent;
        border-radius: 14px;
        color: var(--muted);
        flex-direction: column;
        font-size: 0.68rem;
        font-weight: 900;
        gap: 3px;
        justify-content: center;
        min-height: 64px;
        padding: 7px 4px;
      }

      .nav-icon {
        align-items: center;
        border: 1px solid rgba(119, 130, 126, 0.28);
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.66rem;
        height: 28px;
        justify-content: center;
        min-width: 28px;
        padding: 0 7px;
      }

      .nav-button.active {
        color: var(--green-2);
      }

      .nav-button.active .nav-icon {
        background: var(--green-dark);
        border-color: var(--green);
        color: var(--green-2);
      }

      @media (max-width: 390px) {
        .two { grid-template-columns: 1fr; }
        .set-head, .set-row {
          grid-template-columns: 30px minmax(48px, 1fr) minmax(62px, 1.15fr) minmax(48px, 1fr) 44px;
          gap: 5px;
        }
        .set-row { padding: 7px; }
        .set-row input { font-size: 0.95rem; padding: 7px 5px; }
      }

      @media (min-width: 720px) {
        .brand-bar { margin: 0 22px; }
        .app-main { padding: 22px 22px 0; }
        .bottom-nav {
          left: 50%;
          max-width: 920px;
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const STORAGE_KEY = "comprehensive-fitness-data-v1";
      const root = document.getElementById("root");
      const defaultSettings = { weightUnit: "lb", defaultRestSeconds: 120, goal: "hypertrophy", trainingStatus: "intermediate" };
      const researchRules = {
        volume: {
          novice: "8-12 hard sets per muscle weekly",
          intermediate: "12-18 hard sets per muscle weekly",
          advanced: "15-25 hard sets per muscle weekly"
        },
        frequency: "Train each muscle at least 2x/week when possible; frequency mainly helps distribute weekly volume.",
        effort: "Most productive hypertrophy sets should land around 0-5 reps in reserve, roughly RPE 7-10.",
        rest: "Rest at least 90 seconds on compound lifts and at least 60 seconds on isolation lifts to preserve volume load.",
        progression: "Progress by adding load or reps when target work is completed with manageable RPE; hold or deload when performance drops or fatigue accumulates.",
        deload: "After repeated misses, performance drops, or 4-8 hard weeks, reduce volume 30-50% and/or load 10-20% for about one week.",
        protein: "For hypertrophy/recomposition, the evidence-based daily protein range is about 1.6-2.2 g/kg; higher may help during aggressive cuts.",
        recomposition: "For recomposition, keep resistance training, high protein, and a moderate deficit; deficits over about 500 kcal/day tend to impair lean-mass gain.",
        sleep: "Sleep under 7 hours can limit recovery; 7-9 hours is the practical adult target."
      };
      let data = emptyData();
      let view = "workout";
      let activeSessionId = "";
      let timer = null;
      let timerInterval = 0;
      let selectedExercise = "";
      let selectedWeek = "";
      let addExerciseDraft = "";
      let exportText = "";
      let pendingClearData = false;
      let settingsMessage = "";

      const icon = {
        workout: "Lift",
        templates: "Plan",
        history: "Past",
        review: "Coach",
        settings: "Data",
        add: "+",
        clock: "Rest",
        done: "OK",
        delete: "X",
        pause: "Pause",
        play: "Start",
        duplicate: "Copy",
        download: "Export",
        upload: "Import"
      };

      function emptyData() {
        return { sessions: [], exercises: [], sets: [], templates: [], settings: { ...defaultSettings } };
      }

      function todayIso() {
        return new Date().toISOString().slice(0, 10);
      }

      function isoNow() {
        return new Date().toISOString();
      }

      function startOfWeekIso(dateIso) {
        const date = new Date(dateIso + "T00:00:00");
        const day = date.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        date.setDate(date.getDate() + diff);
        return date.toISOString().slice(0, 10);
      }

      function formatDate(dateIso) {
        return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" }).format(new Date(dateIso + "T00:00:00"));
      }

      function formatWeek(dateIso) {
        return "Week of " + formatDate(startOfWeekIso(dateIso));
      }

      function id() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(16).slice(2);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function loadData() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          data = stored ? { ...emptyData(), ...stored, settings: { ...defaultSettings, ...stored.settings } } : emptyData();
        } catch {
          data = emptyData();
        }
        data.templates = Array.isArray(data.templates) ? data.templates : [];
        if (data.sessions.length === 0) data.sessions.push(createSession());
        activeSessionId = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date))[0].id;
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function commit(nextData, shouldRender = true) {
        data = nextData;
        saveData();
        if (shouldRender) render();
      }

      function createSession(title) {
        const now = isoNow();
        const sameDayCount = data.sessions.filter((session) => session.date === todayIso()).length + 1;
        return { id: id(), date: todayIso(), title: title || "Workout " + sameDayCount, isTravel: false, notes: "", createdAt: now, updatedAt: now };
      }

      function createSet(exerciseId, setNumber, previous) {
        return {
          id: id(),
          exerciseId,
          setNumber,
          reps: previous?.reps ?? 8,
          weight: previous?.weight ?? 0,
          weightUnit: previous?.weightUnit ?? data.settings.weightUnit,
          isBodyweight: previous?.isBodyweight ?? false,
          rpe: previous?.rpe ?? 7,
          completed: previous?.completed ?? true
        };
      }

      function activeSession() {
        return data.sessions.find((session) => session.id === activeSessionId) || data.sessions[0];
      }

      function activeExercises() {
        const session = activeSession();
        return session ? data.exercises.filter((exercise) => exercise.sessionId === session.id).sort((a, b) => a.order - b.order) : [];
      }

      function setsForExercise(exerciseId) {
        return data.sets.filter((set) => set.exerciseId === exerciseId).sort((a, b) => a.setNumber - b.setNumber);
      }

      function estimatedOneRepMax(set) {
        if (set.weight <= 0 || set.reps <= 0) return 0;
        return set.weight * (1 + set.reps / 30);
      }

      function roundToIncrement(value, increment) {
        return Math.max(increment, Math.round(value / increment) * increment);
      }

      function getExerciseNames() {
        return Array.from(new Set(data.exercises.map((exercise) => exercise.name.trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      }

      function getExerciseSets(exerciseName) {
        const normalized = exerciseName.trim().toLowerCase();
        const exercises = data.exercises.filter((exercise) => exercise.name.trim().toLowerCase() === normalized);
        const ids = new Set(exercises.map((exercise) => exercise.id));
        return { exercises, sets: data.sets.filter((set) => ids.has(set.exerciseId)) };
      }

      function summarizeExerciseByWeek(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        const grouped = new Map();
        scoped.sets.forEach((set) => {
          const exercise = exerciseById.get(set.exerciseId);
          const session = exercise ? sessionById.get(exercise.sessionId) : null;
          if (!session) return;
          const week = startOfWeekIso(session.date);
          const bucket = grouped.get(week) || { sessions: new Set(), travelCount: 0, sets: [] };
          if (!bucket.sessions.has(session.id) && session.isTravel) bucket.travelCount += 1;
          bucket.sessions.add(session.id);
          bucket.sets.push(set);
          grouped.set(week, bucket);
        });
        return Array.from(grouped.entries()).map(([weekStart, bucket]) => {
          const completed = bucket.sets.filter((set) => set.completed);
          const rpeSets = bucket.sets.filter((set) => set.rpe > 0);
          return {
            weekStart,
            travelCount: bucket.travelCount,
            topWeight: Math.max(0, ...bucket.sets.map((set) => set.weight)),
            completedSets: completed.length,
            failedSets: bucket.sets.filter((set) => !set.completed).length,
            averageRpe: rpeSets.length ? rpeSets.reduce((sum, set) => sum + set.rpe, 0) / rpeSets.length : 0,
            bestEstimatedOneRepMax: Math.max(0, ...completed.map(estimatedOneRepMax))
          };
        }).sort((a, b) => b.weekStart.localeCompare(a.weekStart));
      }

      function recommendForExerciseWeek(exerciseName, weekStart) {
        const summaries = summarizeExerciseByWeek(exerciseName);
        const selectedIndex = summaries.findIndex((summary) => summary.weekStart === weekStart);
        const current = summaries[selectedIndex >= 0 ? selectedIndex : 0];
        const previous = summaries[selectedIndex + 1];
        const older = summaries.slice(selectedIndex + 1, selectedIndex + 5);
        const increment = data.settings.weightUnit === "kg" ? 2.5 : 5;
        if (!current) {
          return {
            decision: "hold",
            label: "Need more data",
            reason: "There is not enough history for this lift yet.",
            action: "Log at least one complete session, then review again.",
            evidence: ["No completed sets found for the selected exercise."],
            confidence: "low"
          };
        }
        const travelAdjusted = current.travelCount > 0;
        const hardWeek = current.averageRpe >= 9;
        const failedMultipleSets = current.failedSets >= 2;
        const performanceDrop = previous && current.bestEstimatedOneRepMax > 0 && current.bestEstimatedOneRepMax < previous.bestEstimatedOneRepMax * 0.92;
        const repeatedFailures = older.filter((week) => week.failedSets > 0 || week.averageRpe >= 9.5).length >= 2 && current.failedSets > 0;
        const flatWeeks = older.length >= 3 && older.every((week) => Math.abs(week.bestEstimatedOneRepMax - current.bestEstimatedOneRepMax) <= current.bestEstimatedOneRepMax * 0.025);
        const evidence = [
          current.completedSets + " completed set" + (current.completedSets === 1 ? "" : "s") + " and " + current.failedSets + " missed set" + (current.failedSets === 1 ? "" : "s") + ".",
          "Average RPE " + (current.averageRpe ? current.averageRpe.toFixed(1) : "not logged") + ".",
          "Best estimated 1RM " + (current.bestEstimatedOneRepMax ? current.bestEstimatedOneRepMax.toFixed(1) : "not available") + "."
        ];
        if (travelAdjusted) evidence.push("Travel was logged this week, so the recommendation is less punitive for a dip.");
        if (flatWeeks && (hardWeek || repeatedFailures)) {
          return { decision: "change", label: "Consider changing variation", reason: "This lift looks stalled across several recent weeks.", action: "Swap to a close variation for 4-6 weeks, then retest the original lift.", evidence, confidence: "medium" };
        }
        if ((failedMultipleSets || repeatedFailures || performanceDrop) && !travelAdjusted) {
          const target = roundToIncrement(current.topWeight * 0.9, increment);
          return { decision: "deload", label: "Deload", reason: "Recent performance suggests fatigue or an overly aggressive load.", action: "Reduce working weight about 10% next time, aiming near " + target + " " + data.settings.weightUnit + ", and keep 1-3 reps in reserve.", evidence, confidence: "high" };
        }
        if (hardWeek || current.failedSets > 0 || current.completedSets < 3 || travelAdjusted) {
          return { decision: "hold", label: "Hold", reason: travelAdjusted ? "The travel context makes this a good week to repeat before judging progress." : "The work was close enough to the limit that repeating is the cleaner next step.", action: "Repeat the same load and rep target next time; progress only if RPE settles below 9.", evidence, confidence: travelAdjusted ? "medium" : "high" };
        }
        const nextWeight = roundToIncrement(current.topWeight + increment, increment);
        return { decision: "progress", label: "Progress", reason: "You completed the work without a high-RPE warning or repeated misses.", action: current.topWeight > 0 ? "Add " + increment + " " + data.settings.weightUnit + " next time, targeting about " + nextWeight + " " + data.settings.weightUnit + "." : "Add reps or a harder bodyweight variation next time.", evidence, confidence: previous ? "high" : "medium" };
      }

      function templateExerciseCount(template) {
        return template.exercises.reduce((sum, exercise) => sum + Number(exercise.sets || 0), 0);
      }

      function researchVolumeTarget() {
        return researchRules.volume[data.settings.trainingStatus] || researchRules.volume.intermediate;
      }

      function goalContext() {
        if (data.settings.goal === "recomposition") return researchRules.recomposition;
        if (data.settings.goal === "cut") return "During a cut, protect performance with high protein, controlled volume, and conservative progression.";
        if (data.settings.goal === "maintain") return "For maintenance, prioritize consistency, sufficient effort, and avoiding unnecessary fatigue.";
        return "For hypertrophy, prioritize enough weekly hard sets, progressive overload, and recovery.";
      }

      function getLastCompletedSet(exerciseName) {
        const scoped = getExerciseSets(exerciseName);
        const exerciseById = new Map(scoped.exercises.map((exercise) => [exercise.id, exercise]));
        const sessionById = new Map(data.sessions.map((session) => [session.id, session]));
        return scoped.sets
          .filter((set) => set.completed)
          .map((set) => {
            const exercise = exerciseById.get(set.exerciseId);
            const session = exercise ? sessionById.get(exercise.sessionId) : null;
            return session ? { set, session } : null;
          })
          .filter(Boolean)
          .sort((a, b) => b.session.date.localeCompare(a.session.date))[0];
      }

      function recommendForTemplate(template) {
        if (!template || template.exercises.length === 0) {
          return { label: "Build the plan first", detail: "Add exercises, sets, and target reps before starting this template.", items: [] };
        }
        const items = template.exercises.map((exercise) => {
          const weeks = summarizeExerciseByWeek(exercise.name);
          const recommendation = weeks[0] ? recommendForExerciseWeek(exercise.name, weeks[0].weekStart) : null;
          const last = getLastCompletedSet(exercise.name);
          const loadText = last?.set?.weight > 0 ? "last logged " + last.set.weight + " " + last.set.weightUnit : "choose a load you can control";
          const base = exercise.sets + " x " + exercise.reps + " target, " + loadText;
          if (!recommendation) return { name: exercise.name, text: base + "; start around RPE 7-8 and leave 1-3 reps in reserve." };
          if (recommendation.decision === "progress") return { name: exercise.name, text: base + "; progress with a small load increase or add 1 rep per set if load jumps are too large." };
          if (recommendation.decision === "deload") return { name: exercise.name, text: base + "; reduce load about 10% or cut one set while keeping clean reps." };
          if (recommendation.decision === "change") return { name: exercise.name, text: base + "; consider a close variation for 4-6 weeks if this keeps stalling." };
          return { name: exercise.name, text: base + "; hold the target and improve execution before adding workload." };
        });
        const totalSets = templateExerciseCount(template);
        const hasHistory = items.some((item) => getLastCompletedSet(item.name));
        const label = hasHistory ? "Session target: progressive overload" : "Session target: establish baseline";
        const detail = hasHistory
          ? "Use prior performance first. " + researchRules.progression + " " + goalContext()
          : "No prior completed sets found for this template. Use controlled sets near RPE 7-8, then let future sessions drive progression. " + goalContext();
        const context = " Research target: " + researchVolumeTarget() + ". " + researchRules.rest + " " + researchRules.protein;
        return { label, detail: detail + " Planned volume: " + totalSets + " working sets." + context, items };
      }

      function createTemplateFromSession(sessionId) {
        const session = data.sessions.find((item) => item.id === sessionId);
        if (!session) return null;
        const exercises = data.exercises
          .filter((exercise) => exercise.sessionId === session.id)
          .sort((a, b) => a.order - b.order)
          .map((exercise) => {
            const sets = setsForExercise(exercise.id);
            return {
              id: id(),
              name: exercise.name || "Exercise",
              sets: Math.max(sets.length, 1),
              reps: sets[0]?.reps || 8
            };
          });
        return { id: id(), name: (session.title || "Workout") + " Template", notes: "", exercises, createdAt: isoNow(), updatedAt: isoNow() };
      }

              <button type="button" data-action="export-data">${icon.download} data</button>
              ${exportText ? '<textarea class="export-box" readonly aria-label="Exported backup JSON">' + escapeHtml(exportText) + '</textarea>' : ""}
              <label class="import-button">${icon.upload} data<input type="file" accept="application/json" data-action="import-data" /></label>
              ${pendingClearData ? '<div class="inline-panel"><strong>Clear all local workout data?</strong><div class="inline-actions"><button class="danger-button" type="button" data-action="confirm-clear-data">Clear data</button><button type="button" data-action="cancel-clear-data">Cancel</button></div></div>' : '<button class="danger-button" type="button" data-action="clear-data">' + icon.delete + ' Clear local data</button>'}
            </div>
          </section>
        `;
      }

      function patchSession(patch, shouldRender = true) {
        const session = activeSession();
        commit({ ...data, sessions: data.sessions.map((item) => item.id === session.id ? { ...item, ...patch, updatedAt: isoNow() } : item) }, shouldRender);
      }

      function patchExercise(exerciseId, patch, shouldRender = true) {
        commit({ ...data, exercises: data.exercises.map((exercise) => exercise.id === exerciseId ? { ...exercise, ...patch } : exercise) }, shouldRender);
      }

      function patchSet(setId, patch, shouldRender = true) {
        commit({ ...data, sets: data.sets.map((set) => set.id === setId ? { ...set, ...patch } : set) }, shouldRender);
      }

      function addSession() {
        const session = createSession();
        activeSessionId = session.id;
        view = "workout";
        commit({ ...data, sessions: [session, ...data.sessions] });
      }

      function addExercise() {
        const session = activeSession();
        const name = addExerciseDraft;
        if (!session || !name || !name.trim()) return;
        const exercise = { id: id(), sessionId: session.id, name: name.trim(), notes: "", order: activeExercises().length };
        addExerciseDraft = "";
        commit({ ...data, exercises: [...data.exercises, exercise], sets: [...data.sets, createSet(exercise.id, 1)] });
      }

      function addTemplate() {
        const template = { id: id(), name: "New Template", notes: "", exercises: [{ id: id(), name: "Exercise", sets: 3, reps: 8 }], createdAt: isoNow(), updatedAt: isoNow() };
        view = "templates";
        commit({ ...data, templates: [template, ...data.templates] });
      }

      function patchTemplate(templateId, patch, shouldRender = true) {
        commit({ ...data, templates: data.templates.map((template) => template.id === templateId ? { ...template, ...patch, updatedAt: isoNow() } : template) }, shouldRender);
      }

      function patchTemplateExercise(templateId, exerciseId, patch, shouldRender = true) {
        commit({
          ...data,
          templates: data.templates.map((template) => template.id === templateId
            ? { ...template, exercises: template.exercises.map((exercise) => exercise.id === exerciseId ? { ...exercise, ...patch } : exercise), updatedAt: isoNow() }
            : template)
        }, shouldRender);
      }

      function addTemplateExercise(templateId) {
        commit({
          ...data,
          templates: data.templates.map((template) => template.id === templateId
            ? { ...template, exercises: [...template.exercises, { id: id(), name: "Exercise", sets: 3, reps: 8 }], updatedAt: isoNow() }
            : template)
        });
      }

      function saveActiveSessionAsTemplate() {
        const template = createTemplateFromSession(activeSessionId);
        if (!template || template.exercises.length === 0) {
          view = "templates";
          addTemplate();
          return;
        }
        view = "templates";
        commit({ ...data, templates: [template, ...data.templates] });
      }

      function startTemplate(templateId) {
        const template = data.templates.find((item) => item.id === templateId);
        if (!template) return;
        const session = createSession(template.name);
        session.templateId = template.id;
        const exercises = [];
        const sets = [];
        template.exercises.forEach((templateExercise, index) => {
          const exercise = { id: id(), sessionId: session.id, name: templateExercise.name, notes: "", order: index };
          exercises.push(exercise);
          for (let setNumber = 1; setNumber <= Number(templateExercise.sets || 1); setNumber += 1) {
            sets.push(createSet(exercise.id, setNumber, { reps: Number(templateExercise.reps || 8), weight: 0, weightUnit: data.settings.weightUnit, isBodyweight: false, rpe: 7, completed: true }));
          }
        });
        activeSessionId = session.id;
        view = "workout";
        commit({ ...data, sessions: [session, ...data.sessions], exercises: [...data.exercises, ...exercises], sets: [...data.sets, ...sets] });
      }

      function addSet(exerciseId, duplicate) {
        const sets = setsForExercise(exerciseId);
        commit({ ...data, sets: [...data.sets, createSet(exerciseId, sets.length + 1, duplicate ? sets[sets.length - 1] : undefined)] });
      }

      function startTimer(exerciseId) {
        timer = { exerciseId, durationSeconds: data.settings.defaultRestSeconds, remainingSeconds: data.settings.defaultRestSeconds, isActive: true, isPaused: false };
        startTimerInterval();
        render();
      }

      function startTimerInterval() {
        window.clearInterval(timerInterval);
        timerInterval = window.setInterval(() => {
          if (!timer || timer.isPaused || !timer.isActive) return;
          timer.remainingSeconds = Math.max(0, timer.remainingSeconds - 1);
          timer.isActive = timer.remainingSeconds > 0;
          render();
        }, 1000);
      }

      function formatTimer(seconds) {
        const minutes = Math.floor(seconds / 60);
        return minutes + ":" + String(seconds % 60).padStart(2, "0");
      }

      function exportData() {
        exportText = JSON.stringify(data, null, 2);
        const blob = new Blob([exportText], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "comprehensive-fitness-" + todayIso() + ".json";
        anchor.style.display = "none";
        document.body.appendChild(anchor);
        anchor.click();
        window.setTimeout(() => {
          anchor.remove();
          URL.revokeObjectURL(url);
        }, 1000);
        render();
      }

      function importDataFile(file) {
        file.text().then((text) => {
          try {
            const imported = JSON.parse(text);
            if (!Array.isArray(imported.sessions) || !Array.isArray(imported.exercises) || !Array.isArray(imported.sets)) throw new Error("Import must include sessions, exercises, and sets arrays.");
            data = { ...emptyData(), ...imported, settings: { ...defaultSettings, ...imported.settings } };
            data.templates = Array.isArray(data.templates) ? data.templates : [];
            activeSessionId = data.sessions[0]?.id || "";
            settingsMessage = "Import complete.";
            saveData();
            render();
          } catch (error) {
            settingsMessage = error instanceof Error ? error.message : "Import failed.";
            render();
          }
        });
      }

      function isNumericEditAction(action) {
        return ["set-reps", "set-weight", "set-rpe", "template-exercise-sets", "template-exercise-reps", "rest-seconds"].includes(action);
      }

      root.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (target.tagName === "INPUT" && isNumericEditAction(action)) {
          target.dataset.replaceOnNextInput = "true";
          target.dataset.previousValue = target.value;
          target.select();
        }
        if (action === "set-view") { view = target.dataset.view; render(); }
        if (action === "new-session") addSession();
        if (action === "new-template") addTemplate();
        if (action === "save-template") saveActiveSessionAsTemplate();
        if (action === "start-template") startTemplate(target.dataset.templateId);
        if (action === "add-template-exercise") addTemplateExercise(target.dataset.templateId);
        if (action === "delete-template") commit({ ...data, templates: data.templates.filter((template) => template.id !== target.dataset.templateId) });
        if (action === "delete-template-exercise") {
          commit({
            ...data,
            templates: data.templates.map((template) => template.id === target.dataset.templateId
              ? { ...template, exercises: template.exercises.filter((exercise) => exercise.id !== target.dataset.templateExerciseId), updatedAt: isoNow() }
              : template)
          });
        }
        if (action === "add-exercise") addExercise();
        if (action === "delete-exercise") commit({ ...data, exercises: data.exercises.filter((exercise) => exercise.id !== target.dataset.exerciseId), sets: data.sets.filter((set) => set.exerciseId !== target.dataset.exerciseId) });
        if (action === "add-set") addSet(target.dataset.exerciseId, false);
        if (action === "duplicate-set") addSet(target.dataset.exerciseId, true);
        if (action === "delete-set") commit({ ...data, sets: data.sets.filter((set) => set.id !== target.dataset.setId) });
        if (action === "toggle-set") {
          const set = data.sets.find((item) => item.id === target.dataset.setId);
          if (set) patchSet(set.id, { completed: !set.completed });
        }
        if (action === "start-timer") startTimer(target.dataset.exerciseId);
        if (action === "toggle-timer" && timer) { timer.isPaused = !timer.isPaused; render(); }
        if (action === "clear-timer") { timer = null; render(); }
        if (action === "open-session") { activeSessionId = target.dataset.sessionId; view = "workout"; render(); }
        if (action === "export-data") exportData();
        if (action === "clear-data") { pendingClearData = true; render(); }
        if (action === "cancel-clear-data") { pendingClearData = false; render(); }
        if (action === "confirm-clear-data") {
          const session = createSession();
          activeSessionId = session.id;
          pendingClearData = false;
          exportText = "";
          commit({ ...emptyData(), sessions: [session] });
        }
      });

      root.addEventListener("change", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (action === "change-session") { activeSessionId = target.value; render(); }
        if (action === "session-date") patchSession({ date: target.value });
        if (action === "session-travel") patchSession({ isTravel: target.checked });
        if (action === "set-bodyweight") patchSet(target.dataset.setId, { isBodyweight: target.checked });
        if (action === "review-exercise") { selectedExercise = target.value; selectedWeek = ""; render(); }
        if (action === "review-week") { selectedWeek = target.value; render(); }
        if (action === "weight-unit") commit({ ...data, settings: { ...data.settings, weightUnit: target.value } });
        if (action === "training-goal") commit({ ...data, settings: { ...data.settings, goal: target.value } });
        if (action === "training-status") commit({ ...data, settings: { ...data.settings, trainingStatus: target.value } });
        if (action === "import-data" && target.files[0]) importDataFile(target.files[0]);
      });

      root.addEventListener("focusin", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT") return;
        if (isNumericEditAction(target.dataset.action)) {
          target.dataset.replaceOnNextInput = "true";
          target.dataset.previousValue = target.value;
          target.select();
        }
      });

      root.addEventListener("beforeinput", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT" || !isNumericEditAction(target.dataset.action)) return;
        if (target.dataset.replaceOnNextInput === "true" && event.inputType && event.inputType.startsWith("insert")) {
          event.preventDefault();
          target.value = event.data || "";
          target.dataset.replaceOnNextInput = "false";
          target.dispatchEvent(new Event("input", { bubbles: true }));
        } else {
          target.dataset.replaceOnNextInput = "false";
        }
      });

      root.addEventListener("keydown", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target || target.tagName !== "INPUT" || !isNumericEditAction(target.dataset.action)) return;
        if (target.dataset.replaceOnNextInput !== "true") return;
        if (event.ctrlKey || event.metaKey || event.altKey || event.key.length !== 1 || !/[\d.]/.test(event.key)) {
          target.dataset.replaceOnNextInput = "false";
          return;
        }
        event.preventDefault();
        target.value = event.key;
        target.dataset.replaceOnNextInput = "false";
        target.dispatchEvent(new Event("input", { bubbles: true }));
      });

      root.addEventListener("input", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (target.tagName === "INPUT" && isNumericEditAction(action) && target.dataset.replaceOnNextInput === "true") {
          const previousValue = target.dataset.previousValue || "";
          let replacement = target.value;
          if (previousValue && replacement.startsWith(previousValue)) replacement = replacement.slice(previousValue.length);
          target.value = replacement;
          target.dataset.replaceOnNextInput = "false";
        }
        if (action === "add-exercise-draft") addExerciseDraft = target.value;
        if (action === "session-title") patchSession({ title: target.value }, false);
        if (action === "session-notes") patchSession({ notes: target.value }, false);
        if (action === "exercise-name") patchExercise(target.dataset.exerciseId, { name: target.value }, false);
        if (action === "exercise-notes") patchExercise(target.dataset.exerciseId, { notes: target.value }, false);
        if (action === "set-reps") patchSet(target.dataset.setId, { reps: Number(target.value) }, false);
        if (action === "set-weight") patchSet(target.dataset.setId, { weight: Number(target.value) }, false);
        if (action === "set-rpe") patchSet(target.dataset.setId, { rpe: Number(target.value) }, false);
        if (action === "template-name") patchTemplate(target.dataset.templateId, { name: target.value }, false);
        if (action === "template-exercise-name") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { name: target.value }, false);
        if (action === "template-exercise-sets") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { sets: Number(target.value) }, false);
        if (action === "template-exercise-reps") patchTemplateExercise(target.dataset.templateId, target.dataset.templateExerciseId, { reps: Number(target.value) }, false);
        if (action === "rest-seconds") commit({ ...data, settings: { ...data.settings, defaultRestSeconds: Number(target.value) } }, false);
      });

      loadData();
      saveData();
      render();

      if ("serviceWorker" in navigator && window.isSecureContext) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => undefined);
        });
      }
    </script>
  </body>
</html>
