    <title>Comprehensive Fitness</title>
    <style>
      :root {

        --green-dark: hsl(212 47% 18%);
        --amber: hsl(37 69% 60%);

        --shadow: 0 12px 32px rgba(0, 0, 0, 0.16);
        --color-accent: var(--current);
        --color-accent-subtle: var(--current-dark);
        --color-text: var(--text);
        --color-muted: var(--muted);
        --color-background: var(--bg);
        --color-surface: var(--surface);
        --color-border: var(--line);
        --color-border-strong: var(--line-strong);
        --color-success: var(--success);
        --color-warning: var(--amber);
        --color-danger: var(--red);
        --color-rest: var(--rest-accent);
        color: var(--text);

      [data-theme="light"] {
        --bg: hsl(210 22% 96%);
        --bg-soft: hsl(210 31% 95%);
        --panel: hsl(0 0% 100%);
        --panel-2: hsl(210 40% 98%);
        --panel-3: hsl(210 31% 95%);
        --line: hsl(214 25% 87%);
        --line-strong: hsl(212 23% 69%);
        --text: hsl(215 48% 14%);
        --muted: hsl(213 16% 44%);
        --muted-2: hsl(212 14% 55%);
        --green: hsl(212 60% 24%);
        --green-2: hsl(211 54% 31%);
        --green-dark: hsl(212 45% 94%);
        --amber: hsl(37 82% 33%);
        --rest-accent: hsl(35 81% 36%);
        --rest-text: hsl(35 89% 24%);
        --red: hsl(0 46% 50%);
        --success: hsl(156 55% 31%);
        --success-dark: rgba(35, 122, 87, 0.1);
        --current: hsl(212 60% 24%);
        --current-dark: hsl(212 45% 94%);
        --action: hsl(212 60% 24%);
        --on-action: hsl(0 0% 100%);
        --surface: hsl(210 40% 98%);
        --surface-strong: hsl(0 0% 100%);

      }

      [data-color-package="redwood-circuit"] { --current: #294e75; --action: #294e75; --green: #294e75; --green-2: #587895; --success: #557b5c; --amber: #9d591d; --rest-accent: #c28b43; --red: #913a30; }
      [data-color-package="mediterranean-set"] { --current: #285fc7; --action: #285fc7; --green: #285fc7; --green-2: #5a80d1; --success: #687d2b; --amber: #a65d12; --rest-accent: #d1ae12; --red: #b34432; }
      [data-color-package="modern-primary"] { --current: #1769d2; --action: #1769d2; --green: #1769d2; --green-2: #4d91e0; --success: #168358; --amber: #ad620d; --rest-accent: #dba900; --red: #c2382f; }
      [data-color-package="night-stadium"] { --current: #4fa3ff; --action: #1769aa; --green: #4fa3ff; --green-2: #82bdff; --success: #42ce79; --amber: #f4c84c; --rest-accent: #f29c38; --rest-text: #ffd278; --red: #ff6b61; }

      [data-theme="light"][data-color-package="heritage-atlas"] { --bg: #f5e9c9; --bg-soft: #eee0bc; --panel: #fffdf5; --panel-2: #f9f1dc; --panel-3: #f1e3c1; --surface: #fff9e9; --surface-strong: #fffdf5; --input-bg: #fffdf5; --nav-bg: rgba(255,253,245,.96); --current-dark: #e5edf8; --success-dark: rgba(40,112,82,.12); }
      [data-theme="light"][data-color-package="signal-garden"] { --bg: #fff8e8; --bg-soft: #f7edcf; --panel: #fff; --panel-2: #f1f8ff; --panel-3: #fff0bd; --surface: #f6fbff; --surface-strong: #fff; --input-bg: #fff; --nav-bg: rgba(255,255,255,.96); --current-dark: #e5f2ff; --green-2: #1259a6; --success-dark: rgba(22,138,84,.12); }
      [data-theme="light"][data-color-package="alpine-ledger"] { --bg: #edf4f1; --bg-soft: #e0ece7; --panel: #fff; --panel-2: #edf7fa; --panel-3: #dcebee; --surface: #f5faf8; --surface-strong: #fff; --input-bg: #fff; --nav-bg: rgba(255,255,255,.96); --current-dark: #e6f1f8; }
      [data-theme="light"][data-color-package="training-hall"] { --bg: #f4ebdd; --bg-soft: #ebddca; --panel: #fffcf7; --panel-2: #f7efe2; --panel-3: #eee0c9; --surface: #fff8ef; --surface-strong: #fffcf7; --input-bg: #fffdf9; --nav-bg: rgba(255,252,247,.96); --current-dark: #e8eef9; }
      [data-theme="light"][data-color-package="harbor-pulse"] { --bg: #f4e5ce; --bg-soft: #ead7bb; --panel: #fffdf8; --panel-2: #eaf7fc; --panel-3: #f7e5b4; --surface: #f5fbfd; --surface-strong: #fffdf8; --input-bg: #fff; --nav-bg: rgba(255,253,248,.96); --current-dark: #e1f2fb; }
      [data-theme="light"][data-color-package="prairie-electric"] { --bg: #f2e2b9; --bg-soft: #e8d59f; --panel: #fffdf6; --panel-2: #f1f3ff; --panel-3: #f1dfaa; --surface: #faf8ef; --surface-strong: #fffdf6; --input-bg: #fff; --nav-bg: rgba(255,253,246,.96); --current-dark: #e9edff; }
      [data-theme="light"][data-color-package="redwood-circuit"] { --bg: #f5e9d8; --bg-soft: #eadbc6; --panel: #fffdfc; --panel-2: #f1f5f0; --panel-3: #eadcc7; --surface: #faf7f2; --surface-strong: #fffdfc; --input-bg: #fff; --nav-bg: rgba(255,253,252,.96); --current-dark: #e8eef3; }
      [data-theme="light"][data-color-package="mediterranean-set"] { --bg: #f3efd9; --bg-soft: #e8e2c5; --panel: #fffef7; --panel-2: #f2f5ff; --panel-3: #f4e8ad; --surface: #faf9ef; --surface-strong: #fffef7; --input-bg: #fff; --nav-bg: rgba(255,254,247,.96); --current-dark: #e8eeff; }
      [data-theme="light"][data-color-package="modern-primary"] { --bg: #f7f5ef; --bg-soft: #ece9df; --panel: #fff; --panel-2: #f1f6ff; --panel-3: #fff1ba; --surface: #f7f9fc; --surface-strong: #fff; --input-bg: #fff; --nav-bg: rgba(255,255,255,.96); --current-dark: #e5f0ff; }
      [data-theme="light"][data-color-package="night-stadium"] { --bg: #0c1727; --bg-soft: #101d30; --panel: #142237; --panel-2: #182941; --panel-3: #20344f; --surface: #182941; --surface-strong: #20344f; --input-bg: #101d30; --nav-bg: rgba(12,23,39,.97); --line: #334c69; --line-strong: #527292; --text: #f4f8ff; --muted: #b3c2d6; --muted-2: #91a5bd; --current-dark: #173a5e; --success-dark: rgba(66,206,121,.14); }

      [data-theme="light"]:not([data-color-package="night-stadium"]) { --bg: #fff; --bg-soft: #fff; }

      * { box-sizing: border-box; }

      html { background: var(--bg); }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow-x: clip;
        background: var(--bg);
      }

      body.modal-open { overflow: hidden; }

      .skip-link {
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        height: 1px;
        overflow: visible;
        position: fixed;
        white-space: nowrap;
        width: 1px;
        z-index: 100;
      }

      .skip-link:focus {
        background: var(--color-background);
        border: 2px solid var(--color-text);
        border-radius: 8px;
        clip: auto;
        clip-path: none;
        color: var(--color-text);
        height: auto;
        left: max(12px, env(safe-area-inset-left));
        outline: 2px solid var(--color-text);
        outline-offset: 2px;
        overflow: visible;
        padding: 10px 12px;
        top: max(12px, env(safe-area-inset-top));
        width: auto;
      }

      button, input, select, textarea { font: inherit; }

      button {
        align-items: center;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        min-height: 48px;
        padding: 12px 14px;
        transition: border-color 140ms ease, color 140ms ease, transform 140ms ease, background 140ms ease;
      }

      button:hover { border-color: var(--green); }
      button:active, button.is-pressing, select:active, select.is-pressing, summary[data-action]:active, summary[data-action].is-pressing, label.toggle-line:active, label.toggle-line.is-pressing, .alert-setting-card:active, .alert-setting-card.is-pressing, .volume-card:active, .volume-card.is-pressing { filter: brightness(.96); transform: translateY(1px) scale(.975); }
      .feedback-medium.is-pressing { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--current) 56%, transparent); }
      .feedback-success.is-pressing { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--success) 68%, transparent); }
      .feedback-warning.is-pressing, .feedback-error.is-pressing { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--red) 70%, transparent); }
      button:disabled { cursor: not-allowed; opacity: .45; transform: none; }

      input, select, textarea {
        background: var(--input-bg);
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        color: var(--text);
        min-height: 48px;
        padding: 12px 6px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus, button:focus-visible {
        border-color: var(--green);
        box-shadow: 0 1px 0 var(--green);
        outline: none;
      }

      input[type="number"] {
        font-size: 1.05rem;
        font-weight: 800;
        text-align: center;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      h1, h2, p { margin-top: 0; }
      h1 {
        font-size: clamp(1.35rem, 5vw, 1.8rem);
        letter-spacing: 0;
        margin-bottom: 2px;
      }
      h2 { letter-spacing: 0; }

      .app-shell {
        margin: 0 auto;
        max-width: 920px;
        min-height: 100vh;
        padding-bottom: calc(104px + env(safe-area-inset-bottom));
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .brand-bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 12px;
        grid-template-columns: auto 1fr auto auto;
        margin: 0 14px;
        min-height: 76px;
        padding: max(14px, env(safe-area-inset-top)) 0 14px;
      }

      .brand-mark {
        align-items: center;
        background: var(--green-dark);
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        color: var(--green-2);
        display: inline-flex;
        font-size: 0.9rem;
        font-weight: 1000;
        height: 42px;
        justify-content: center;
        width: 42px;
      }

      .brand-mark { overflow: hidden; }
      .brand-mark img { height: 100%; object-fit: cover; object-position: 50% 29%; transform: scale(1.55); width: 100%; }

      .brand-title {
        display: grid;
        font-size: 0.92rem;
        font-weight: 1000;
        letter-spacing: 0.03em;
        line-height: 1.05;
        text-transform: uppercase;
      }

      .brand-title span {
        color: var(--green);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
      }

      .brand-action {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--green);
        display: inline-flex;
        font-weight: 1000;
        gap: 6px;
        min-height: 38px;
        padding: 0 12px;
      }

      .theme-toggle {
        border-color: var(--line-strong);
        color: var(--green);
        min-height: 38px;
        padding: 0 10px;
      }

      .app-main { padding: 16px 14px 0; }
      .app-main:focus { outline: none; }
      .loading, .empty-state {
        color: var(--muted);
        padding: 24px;
      }

      .empty-state {
        background: transparent;
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
      }

      .view { display: grid; gap: 16px; }

      .section-kicker {
        color: var(--green);
        font-size: 0.76rem;
        font-weight: 1000;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .session-header {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .split { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .grid { display: grid; gap: 10px; }
      .two { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }

      .toggle-line, .bodyweight {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 0.92rem;
        font-weight: 800;
        gap: 9px;
        min-height: 36px;
        padding: 5px 0;
      }

      .deload-toggle {
        align-items: center;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        display: inline-flex;
        font-size: 0.82rem;
        font-weight: 900;
        gap: 8px;
        padding: 6px 0 10px;
        width: fit-content;
      }

      .deload-toggle input { height: 20px; width: 20px; }
      .deload-toggle.active { border-color: var(--amber); color: var(--amber); }
      .deload-toggle span { font-size: 0.72rem; text-transform: uppercase; }

      .toggle-line input[type="checkbox"], .bodyweight input[type="checkbox"], .deload-toggle input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        background: var(--input-bg);
        border: 1.5px solid color-mix(in srgb, var(--muted) 55%, transparent);
        border-radius: 6px;
        box-shadow: inset 0 0 0 1px color-mix(in srgb, white 35%, transparent);
        display: inline-grid;
        flex: 0 0 auto;
        height: 22px;
        min-height: 22px;
        margin: 0;
        place-content: center;
        transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
        width: 22px;
      }

      .toggle-line input[type="checkbox"]::before, .bodyweight input[type="checkbox"]::before, .deload-toggle input[type="checkbox"]::before {
        background: white;
        clip-path: polygon(14% 48%, 0 64%, 40% 100%, 100% 20%, 83% 5%, 38% 72%);
        content: "";
        height: 10px;
        transform: scale(0);
        transition: transform 120ms ease;
        width: 12px;
      }

      .toggle-line input[type="checkbox"]:checked, .bodyweight input[type="checkbox"]:checked {
        background: var(--current);
        border-color: var(--current);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--current) 18%, transparent);
      }

      .deload-toggle input[type="checkbox"]:checked { background: var(--amber); border-color: var(--amber); }
      .toggle-line input[type="checkbox"]:checked::before, .bodyweight input[type="checkbox"]:checked::before, .deload-toggle input[type="checkbox"]:checked::before { transform: scale(1); }
      .toggle-line input[type="checkbox"]:focus-visible, .bodyweight input[type="checkbox"]:focus-visible, .deload-toggle input[type="checkbox"]:focus-visible { outline: 2px solid var(--current); outline-offset: 2px; }

      .exercise-card, .settings-panel, .recommendation, .template-card, .inline-panel, .workout-advice {
        background: transparent;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .exercise-card {
        gap: 14px;
        overflow: hidden;
        position: relative;
      }

      .exercise-card::before,
      .workout-advice::before,
      .recovery-panel::before {
        background: var(--green);
        content: "";
        height: calc(100% - 22px);
        left: 0;
        opacity: 0.52;
        position: absolute;
        top: 11px;
        width: 1px;
      }

      .exercise-guidance {
        border-block: 1px solid var(--line);
        color: var(--muted);
        display: grid;
        gap: 8px;
        padding: 11px 0;
      }

      .guidance-benchmark-heading {
        align-items: center;
        display: flex;
        gap: 10px;
        justify-content: space-between;
      }

      .guidance-benchmark-heading > div {
        display: grid;
        gap: 2px;
      }

      .guidance-benchmark-heading strong {
        color: var(--text);
        font-size: .82rem;
      }

      .guidance-benchmark-heading span {
        color: var(--muted);
        font-size: .62rem;
      }

      .guidance-benchmark-heading > b {
        color: var(--muted);
        font-size: .62rem;
        white-space: nowrap;
      }

      .guidance-benchmark-values {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .guidance-benchmark-values span {
        background: color-mix(in srgb, var(--current) 10%, var(--surface));
        border-radius: 999px;
        color: var(--current);
        font-size: .65rem;
        font-weight: 800;
        padding: 5px 8px;
      }

      .muscle-select-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      }

      .muscle-select-grid label {
        color: var(--muted);
        display: grid;
        font-size: 0.78rem;
        font-weight: 900;
        gap: 4px;
      }

      .muscle-select-grid select {
        min-height: 42px;
        padding: 8px 4px;
      }

      .cue-list {
        display: grid;
        gap: 5px;
        margin: 0;
        padding-left: 18px;
      }

      .exercise-name {
        background: transparent;
        border-color: transparent;
        font-size: 1.08rem;
        font-weight: 1000;
        min-width: 0;
        padding-left: 0;
      }

      .exercise-name:focus { background: var(--input-bg); padding-left: 12px; }

      .exercise-header { align-items: start; display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr) auto; }
      .exercise-name-field, .autosize-title-field { line-height: 1.25; overflow: hidden; resize: none; white-space: pre-wrap; width: 100%; }
      .exercise-name-field { min-height: 38px; padding: 7px 4px 7px 0; }
      .autosize-title-field { min-height: 48px; }
      .exercise-header .exercise-actions { align-items: center; display: flex; flex: 0 0 auto; gap: 6px; }

      .icon-button {
        aspect-ratio: 1;
        justify-content: center;
        min-width: 48px;
        padding: 8px;
        width: 48px;
      }

      .danger, .danger-button {
        border-color: rgba(255, 127, 107, 0.46);
