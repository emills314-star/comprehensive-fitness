name: Public CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  domain-and-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run check:workflows
      - run: npm run check:privacy
      - run: npm run audit:dependencies:full
      - run: npm run audit:dependencies:production
      - run: npm test

  research-and-pwa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:privacy
      - run: npm run research:validate
      - run: npm run verify:pwa

  chromium-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:privacy
      - run: npx playwright install --with-deps chromium
      - run: npm run audit:ui
      - name: Upload UI failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: public-ci-ui-failure-${{ github.run_number }}
          path: artifacts/ui-audit/test-results
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: false
