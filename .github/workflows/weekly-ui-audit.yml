name: Weekly UI/UX audit

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:privacy
      - run: npx playwright install --with-deps chromium
      - name: Run visual and accessibility audit
        id: audit
        continue-on-error: true
        run: npm run audit:ui
      - name: Build structured report
        if: always()
        run: npm run audit:ui:report
      - name: Upload report, screenshots, diffs, and traces
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: weekly-ui-audit-${{ github.run_number }}
          path: artifacts/ui-audit
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: false
      - name: Fail visibly when the audit failed
        if: steps.audit.outcome != 'success'
        run: exit 1
